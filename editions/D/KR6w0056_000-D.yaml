body:
  text: 𡨋樞會要序晦堂𦒳人以善權方便接物利生隨機淺深應病與藥雖九流異習辯劇連環折伏慢幢渙然冰釋故名公鉅人宰官居士以見晚為恨唱導之暇取宗鏡錄揔括精微綴為一集命之曰𡨋樞會要學者簡而易覽助發上機默契正宗不墮邪見可謂因風吹火融入光明藏中心法雙忘凡聖平等一薄伽梵門人普燈以是鏤板謁予為序因筆三昧少助讚揚滎陽興嗣述凡遇標起處是宗鏡錄中卷軸板數如欲廣覽請自尋檢本文
