body:
  text: 黃龍庵主祖心集第三十六卷十五板聖心無有取相之知故云無知非謂無真知也何者般若靈鑒無種不知不同太虚一向無知也然則斷見無知略有十一種論中略言三種十一種一者太虛一向空故二者木石謂無情故三者聾𥌒謂根不具無見聞故此上三種是論所破四者愚癡謂無智慧於境不了故五者顛狂惡鬼惑心失本性故六者心亂境多惑心不能决斷故七者悶絕心神暗黑如死人故八者昬醉為藥所迷故九者睡眠神識困熟故十者無想定外道伏惑心想不行故十一者滅盡定二乗住寂心智止滅故此上並是惑倒非般若無知也第三十七卷五板初破無明見佛性開寶藏顯真如名發心住乃至等覺無明微薄智慧轉著如從初月至十四日月光𡸁圎暗𡸁盡若人應以佛身得度者即八相成道應以九法界身得度者以普門示現如經廣是名分真菩提亦名分真止觀分真智斷究竟即菩提者等覺一轉入于妙覺智光圎滿不可復增名菩提果大涅槃斷更無可斷名果果等覺不通唯佛能通過等無道可故名究竟菩提十板原夫立教皆為對機機冝不同教分多種且如觀色一性五教證入不同初小乗見是實色不性空始教見此色法隨緣所成必無自性即空無所有如波歸水終教見色空無礙以真空不守自性隨緣成色即是幻色遂頼空成即此頼空之色虚相無體𢘆自性盡而空現是故色即空而常泯空即色而常存要由自盡之色方是空色成色之空乃是真空舉體融無有障礙如水入波頓教一色法無非真理所収是故此色即真理一味等更無別法而可顯水波雙絕圎教起即全収一多攝同時成立一塊圎明隨舉即色隨舉即空味自在隨智取用何以故隨舉一門無不顯現古德云皆本一心而貫諸法夫一心者萬法之揔也分而為戒定慧開而為六度散而為萬行萬行未甞非一心一心未甞違萬行然則一心者萬法之所生而不屬於萬法得之者則於法自在矣見之者則於教無礙矣本非法不可以法本非教不可以教傳豈可以䡄迹而尋哉故知但研精一法內照分明自然柔軟入神順法界之性無心合道履一際之門華嚴𥝠記云無無著迴向者只了一切皆如故所以無著耳知一切皆無縛脫一法既尒一切法皆然所以一切法即一法一法即一切法若一切法皆無性即是分身佛集寶塔出現湏入芥耳如是洞達一解千從則知佛向無所有中出生法於畢竟空中建立以無生無性故回轉由心遂得集散同時大小即入所以森羅趣報化影像乃至無量德業廣大神通於宗鏡中一時顯現且如龍蜃等類全是業果生死之身尚現不思議之力用何況悟根本心具如實智而不能現廣大之神用乎八板華嚴經云佛子如羅睺阿脩羅王本身長七百由旬化形長十六萬八千由旬於大海中出其半身與湏山而正齊等佛子彼阿脩羅王雖化其身長十六萬八千由旬然亦不壞本身之相諸蘊界處悉皆如本心不錯亂不於變化身而作他想於其本身生非己想本受生身恒受諸樂化身常現種種自在神通威力佛子阿脩羅王有貪恚癡具足憍慢尚能如是變現其身何况菩摩訶能深了達心法如幻一切𠀍間皆悉如夢一切諸佛出興於𠀍皆如影像一切𠀍界猶如變化言語音聲悉皆如響見如實法以如實法而為其身知一切法本性清淨了知身心無有實體其身普住無量境界以佛智慧廣大光明淨修一切菩提之行乃至如有幻師隨於一處作諸幻術不以幻地故壞於本地不以幻日故幻於本曰菩摩訶亦復如是於無國土現有國土於有國土現無國土於有眾生現無眾生於無眾生現有眾生無色現色色現無色初不亂後後不亂初菩了知一切𠀍法悉亦如是同於幻化知法幻故知智幻知智幻故知業幻知智幻業幻已起於幻智觀一切業如𠀍幻者不於處外而現其幻亦不於幻外而有其處菩摩訶亦復如是不於虚空外入𠀍間亦不於𠀍間外入虚空何以故虛空𠀍間無差別故住於𠀍間亦住虚空菩摩訶於虚空中能見能修一切𠀍間種種差別妙莊嚴業於一念頃悉能了知無數𠀍界若成若壞亦知諸劫相續次第能於一念現無數劫亦不令其一念廣大菩摩訶得不思議解脫幻智到於彼岸住於幻際入𠀍幻數思惟諸法悉皆如幻不違幻𠀍盡於幻智了知三𠀍與幻無別决定通達心無邊際如諸如來住如幻智其心平等菩摩訶亦復如是知諸𠀍間皆悉如幻於一切處皆無所著無有我所如彼幻師作諸幻事雖不與彼幻事同住而於幻事亦無迷惑菩摩訶亦復如是知一切法到於彼岸心不計我能入於法亦不於法而有錯亂十一板略明無分別智證理法界以為五門一能所歷然謂以無分別智證無差別理如日合空雖不可分而日非空空非日光二能所無二以知一切法即自心性以即體之智還照心體舉一全収舉理収智智非理外舉智収理智體即寂如一明珠珠自有光光還照珠三能所俱泯由智即理故智非智以全同理無自體故由理即智故理非理以全同智無自立故如波即水動相便虚如水即波靜相亦隱動靜兩亡性相齊離四存泯無礙離相離性則能所雙泯不壞性相能所歷然如波與水雖動靜兩亡不壞波濕五舉一全収上列四門欲彰異理既融攝曾無二原如海一滴具百川味十四板華嚴䟽云生之無生真性湛然無生之生業果宛然是知若即念存有念即是常見離生求無生即是斷見皆不達實相無生無滅之理若正了無生則無生無不生豈定執有生無生之二見乎所以云誰無念誰無生若實無生無不生喚取機関木人問求佛施功早晚成若以息念歸無念如同寒木死灰與木人何別豈有成佛之期耶斯乃尚未知即念而無念寧知一念頓圎乎第三十八卷二板昔佛在𠀍時有一道人在河邊樹下學道十二年中貪想不除走心散意但念云欲目色耳聲鼻香口味身受心法身靜意遊曾無寧息十二年中不能得道佛知可度化作沙門往至其所樹下共宿湏月明有龜㺃相逢便欲噉龜龜縮其頭尾及其四脚藏於甲中不能得噉水㺃少遠復出頭足行步如故不能奈何遂便得脫於是道人問化沙門此龜有護命之鎧水㺃不能得其便沙門荅言吾念𠀍人不如此龜不知無常放恣六情外魔得便形壞神去生死無端輪轉五道苦𢙉百千皆意所造冝自勉勵求滅度安於是化沙門即偈言藏六如龜防意如城慧與魔戰勝則無患是以意地若息則六趣俱閑一切境魔不能為便如龜藏六善護其命八板十玄門者一同時具足相應門智儼法師釋云此約相應無前後此十玄門一一皆具十法同時具足一教二理事三境智四行位五因果六依正七體用八人法九逆順十感應隨有一處即具此十法悉皆同時具足十一板十定品云譬如有人為鬼所持其身戰動不能自安鬼不現身令他身然菩摩訶住此三昧亦復如是自身入定他身起他身入定自身起佛子譬如死屍以呪力故而能起行隨所作事皆得成就屍之與呪雖各差別而能和合成就彼事菩摩訶住此三昧亦復如是同境入定異境起異境入定同境起佛子譬如比丘得心自在或以一身作多身或以多身作一身非一身沒多身生非多身沒一身生菩摩訶住此三昧亦復如是一身入定多身起多身入定一身起佛子譬如大地其味一種所生苗稼種種味別地雖無差別然味有殊異菩住此三昧亦復如是無所分別然有一種入定多種起多種入定一種起十四板問若此宗明即入不論神力乃言自體常如此者斯則渾無疆界無終無始何緣得辯因果教等十法耶荅即以隨智差別故舉一為主餘皆為伴猶如帝網舉一孔為首眾孔現中一孔既尒一切孔現亦如是又如諸方菩皆來證誠同其名号一切十方證誠皆亦如是所以成其無盡復無盡而不失因果先後次第而體無增減故經云一切眾生成佛佛界不增眾生界不減十六板理事融通非一非異非有非無不墜邊邪方能悟入如理無分限揔曰無邊事有分限故名有邊若依理成事理性全隱則無邊即邊若會事歸理事相全盡則邊即無邊今則不尒不失理而事現云無邊之邊不壞事而理顯云邊之無邊若定言一異非一非異非非一非非異等盡同戱論不契真如故三無性論復次無戱論故名為真實無戱論者於相等離一異虛妄故乃至若真如與相等異即有三過失一者此真如即非相等實體二者修觀行則不依相等為方便得通達真如三者覺真如已則應未達相等諸法不相𨵿故也若真如與相等是一亦有三過一者真如既無差別相等亦應無差別二者若見相等即見真如三者若見真如不能清淨如見相等則無有聖人無得解脫無有涅槃𠀍出𠀍異是故由離一異等無戲論故無變異無變異故即是真實性也是知非一非異非有非空此宗鏡之文理事玄奧如弄珠鈴之者其珠不住空中不落地上不在手裏既不在三處亦不住一處不住空中即喻不住空觀不落地上即喻不住假觀不在手裏即喻不住中觀既不住三亦不成一則非一非三而三而一斯為妙矣若未偶斯旨所有見聞皆墮斷常不成玄妙若入宗鏡無往不真昔所不知而今得知昔所不見而今得見如大涅槃經云於一心中則具足現五趣身所以者何以得如來大涅槃經之勢力故是則名為昔所不得而今得之乃至於一念中遍知六趣眾生之心是名菩昔所不知而今得知第三十九卷一板夫覺王明勑大教指歸末法比丘須依四念處修道其旨如何荅此出大般涅槃經最後𡸁示揔前教迹同此指歸以四念處即是宗鏡所明一切眾生身受心法如經云佛告阿難如汝所問佛涅槃後依何住者阿難依四念處嚴心而住觀身性相同於虚空名身念處觀受不在內外不住中間名受念處觀心但有名字名字性離名心念處觀法不得善法不得不善法名法念處阿難一切行者應當依此四念處住四板圎教四念處者念是觀慧大論云念想智皆一法異名初錄心名念次習行名想後成辦名智處者境也皆不離婆若能觀之智照而常寂名之為念所觀之境寂而常照名之為處境寂智亦寂智照境亦照一相無相無相一相即是實相實相即是一實諦亦名虚空佛性亦名大般涅槃如是境智無二無異如如之境即如如之智智即是境智及智處皆名為般若亦例云智及處智皆名為所諦是故非境之境而為境非智之智而為智亦名心寂三昧亦名色寂三昧亦是明心三昧亦是明色三昧八板若不依宗鏡中四念處行道設有智解修行皆成外道所以云若無念慧一切行法皆非佛法非行道人皆空剃頭如放収者空著染衣如木頭掛幡雖執瓶錫如病人乞具雖讀誦經書如盲人誦賦雖復禮拜如碓上下雖復興造媒衒客作種樹易貨沉淪生死如蠶自纏無解脫期捨身命財但得名施非波羅蜜雖復持戒不免雞㺃雖復精進精進無秀媚雖復坐禪如彼株𣐎雖復知解狂顛智慧常在此岸不到彼岸不降愛見不破取相不得入道品非賢聖位問此平等法性一乗妙心一切眾生聲聞緣覺菩諸佛悉皆共稟云何於異生界等此一靈性念念處輪迴於聲聞乗同共一法中而不得此事荅如黃石中金以福德爐火因緣成就若大福人得金中福人得銀下福人得銅此亦如是凡夫唯得煩惱無明聲聞人但證無常生滅唯佛菩究竟常樂涅槃大集經云如然燈噐金則黃光銅則赤光其色雖異燈無差別九板普賢行願品頌云智海廣難量不測反增謗牛飲水成乳虵飲水成毒智學成菩提愚學為生死如是不了知斯由少學過大涅槃經云或有服甘露傷命而早夭或有服甘露壽命得長存或有服毒生有緣服毒死無礙智甘露所謂大乗典如是大乗典亦名雜毒藥如酥醍醐等及以諸石蜜服消則為藥不消則為毒方等亦如是智者為甘露愚不知佛性服之則成毒十一板問既以真心為宗為本如何辯其功能湛然常住盡未來際荅此心法妙故如神不可測無依無住非古非今只是有而不可見聞非是一向空寂蘊無盡之妙用不斷不常具莫測之靈通非隱非顯古德云因雖涅槃永寂而智體不無不尒將何窮未來際故知此之心神凡聖之本盡未來際無有斷絕諸佛常正念此法祖師唯的指此宗斯乃無相之真真何有盡無為之道道何有窮如幽谷之風相續而微聲不斷若洪鍾之響隨扣而清韻常生十二板無生云若無有妙神一向空寂者則不應有佛出𠀍法度人故知本地有妙神不空不斷乃至師子吼言佛性者名第一空第一空名為智慧智慧即是妙神故云因滅是色獲得常住解脫之色故知如中含有妙色五䕃常住不動第四十卷一板問有何勝廣集一心正宗於末學進修得疾入道不荅若以宗鏡示人直至道場疾證菩提更無迂曲法華經偈云演唱實相開闡一乗法廣導諸眾生令速成菩提此是千聖入道之門諸諸佛證真之路若有入者一入全真地凡夫位齊諸佛法華經云乗此寶乗直至道場可謂頓入頓超諸乗匪及以三乗之人不知諸塵唯是識故執心外實有境界凡夫二乗雖有發心趣向解脫而猶有生死可猒涅槃可欣不了唯心道理若知一切法唯是識量捨彼事識外計分別既了唯心趣理速疾異前漸悟故論云速趣涅槃又云凡夫二乗不覺頼耶但依分別事識資持力故而發心修行以不達本故向大菩提踈而且遠故云漸也菩既了頼耶本識則依此識資持力故而發心修行以了本故向大菩提親而且近故云速也此宗鏡中開示大意唯論自心妙達何待他文為未薦者假以文言示令親悟纔聞便入目擊道存故正觀云直聞其言病即除愈三板未入茲門觸途虚幻待真立俗對色名空纔證斯宗萬緣俱寂如異色之鳥投須而純變金光猶三十三天入雜林而更無分別是以諸法無體相待而成皆無待而成待若執有法相待成則不成待以有自體各定不假相待故中觀論偈云若法有待成未成云何待若成已有待成已何用待若法因待成是法先未成未成則無無則云何有因待若是法先已成已成何用因待是二俱不相因待是知未成已成俱無有待若悟入宗鏡之時了知虚空尚是幻生豈更有法可為對待是知一切諸法皆以實際為定量則無變異四板如經問何等是真智慧荅曰無變異相如眾生無變異相真智慧亦無變異又問云何是眾生相荅假名字畢竟離是眾生相如是相則無變異乃至如虚空無變異相一切諸法亦無變異相云何無變異以無二故亦無無二方成真智但云無有二非是有無二如華嚴經偈云常於諸法不作二亦復不作於不二於二不二並皆離知其悉是語言道是知一切言語皆從覺觀而生纔有覺觀便形紋綵發萌芽於境上起朕兆於心中心境對治便為質礙若入宗鏡自絕言思妙旨通了無所得又若一切修行趣佛乗人但先得旨之後方可以佛知見治諸餘習以正定水瑩淨禪支用多聞慧助生觀力乃至習誦熏修萬行嚴餙若未入宗鏡不了自心縱多聞習誦俱不成就五板如海幢身分之上善見一念之中普賢毛孔之內盡十方法界虛空界所有一切凡聖境界淨穢國土靡所不現可證宗鏡無外無法不含如卷大海之波瀾収歸一滴猶撮十方之剎土指在一塵九板雖一切時演開示而𢘆遠離妄想分別雖知諸法無作而能示現一切作業雖知諸佛無有二相而能顯示一切諸佛雖知無色而演諸色第四十一卷一板一切法性皆離言故亦通四種法界皆不可名無得物之功物無當名之實理本無言故事理交徹不可作事理事事相即不可作一多如楞伽雖明五法名相妄想正智如如五皆空寂何者謂迷如理以成名相妄想是生悟名相之本如妄便稱智則無名相妄想唯如智矣智因如立智體亦空如假智明本來常寂故並空矣三板夫入宗鏡法尒亡言非智所知唯信所及如讚般若偈云若人見般若論心皆絕猶如日出時朝露一時失故祖師云論即不即不論若欲論終非論昔梁武帝於華林園重雲殿集四部眾自講三慧般若經時傅大士在會太子遣問大士何不論荅曰皇帝菩所非長非短非廣非狹非有邊非無邊如如正理復有何言劉中丞又問大士何不往復眾所願聞荅曰日月停景四時和適又中天竺有出家外道馬鳴𠀍智辯才善通言論唱言若諸比丘能與我論者可打揵搥如其不能不足公鳴揵搥受人供養時長老𦚰到彼國言但鳴揵搥設彼來者吾自對之即鳴揵搥外道乃問今日何故打此木耶荅言北方有長老沙門來鳴揵搥外道問言欲論耶荅曰然於是廣備論場大眾雲集乃至長老脇言吾既年邁故從遠來又先在此座理應先語外道言亦可尒現所吾盡當破長老脇即言當令天下太平大王長壽國土豐樂無諸災患外道默然不知所言論法無對即墮負處伏為弟子剃除鬚髮度為沙受具足戒又有學人請忠國師和尚立師云立了也學人罔措被師喝出非公境界故知若入宗鏡玄鑒豁然如臨鏡中自見面像見即便見更俟發言耶六板問若如上所道體自然則祖佛何煩出𠀍荅教云不得一法疾與授記祖師云不得一法号曰傳心了煩惱性空即佛出𠀍故經云貪瞋癡出即是佛出但令眾生絕凡聖之情無出沒之相閑居靜處無所施為達斯法門是真佛出如斯事是真實慈問既無心念木石何殊又絕見聞如何覺悟荅只為強覺妄知而能障道唯當脫粘內伏發自靈知根塵既消光明頓發十板今立第一心法能變識有三一第八異熟識變二第七思量識變三第六了別境識變既唯識變我法皆虛因此二空故契會玄旨以我空故煩惱障斷以法空故所知障消煩惱障斷故證真解脫所知障斷故獲大菩提然後行滿因門心𡨋果海則境識俱寂唯一真空問從上宗乗唯令絕學單刀直入教外別傳何假智慧多聞廣論性相言繁理隱水動珠昬荅顯宗破執權柫學路討論達旨融通非離文字解脫法華經云若有利根智慧明了多聞強識乃可謂大凡叅玄之士須具二眼一己眼明宗二智眼辯惑所以禪宗云單明自己不了目前如此之人只具一眼理孤事寡終不圎通隻翼單輪豈能飛運若執只要單刀直入不用廣叅者則善財初見妙德發明之後不合遍叅法界故知初後心等理行同時所以善財至勒佛果圎後却指再見初友文殊如先德云文殊之妙智宛是初心普賢之玄門曾無別體是則理事𡨋齊於一指本末非越於剎那曷乃守一疑諸頓迷法界捨此取彼宰割虚空又若以智慧為非則大智文殊不應稱法王之子若以多聞是過則無聞比丘不合作地獄之人應須以智慧合其多聞終不執詮而認指以多聞而廣其智慧免成孤陋而面墻所以云有智無行國之師有行無智國之用有智有行國之寶無智無行國之賊是以智應須學行應須修闕智則為道之讎無行乃國之賊當知名相関鏁非智鑰而難開情想勾匪慧刀而莫斷應須責己筞發進修是以履圎通之人豈墮絕言之見發菩提之者不生斷滅之心若能直了自心即是單刀直入最為省要以一解千從攝法無餘故亦是教外別傳離此別無奇特又此宗鏡大意以妙悟見諦為期不取依通齊文作解法既真實行須契同唯在心知不俟言為未了者亦不絕言究竟相應終須親省此是十方諸佛同證同古今不易一際法門如經云我不見有一佛國土其中如來不此法是以佛佛道同心心理合故知離宗鏡外無法可以凡有言教俱不出平等性故終無有二所以經云如大師子殺香象時皆盡其力殺兔亦尒不生輕想諸佛如來亦復如是為諸菩及一闡提演法時功用無二仰惟聖旨鑒戒昭然豈可於平等至教之中起差別解耶於一真眾生界中生勝劣見耶若入宗鏡之中自免斯咎今所錄者一一皆是古佛聖教於無量億劫捨無數身命普為一切眾生求此難得阿耨菩提法付囑諸大菩為末代求無上菩提之人千途異共顯一心云何負恩不生信受十二板善知識者難得遭逢譬如梵天投一芥子安下界針鋒之上猶易值明師道友得聞正法甚難如西天九十六種外道皆求出離因遇邪師反沉生死是以涅槃經云具四因緣能證涅槃之道一者親近善友二者聽聞正法三者如理思惟四者如修行若不遇善友不得聞正法何者因聞正法則能思惟信入正念修行有如是法利應須慇重生難遭想第四十二卷三板華嚴經因果同時者俱無前後因果及同時情量繫著妄想有無俱不俱常不常等繫著因果但了法體非所施設非因果繫名為因果非情所立同時前後之妄想也四板華嚴經中無有假法諸法揔真純真無假更無相似存真存假經云眾生界即佛界也如文殊以理會行普賢以行會理二人體用相徹以成一真法界前後相収品品之中相該攝前後相徹文更収一法門中具多法也是故經偈云於多法中為一法於一法中為眾多然此心是法界之都無法不攝非但凡聖因果乃至逆順善惡同歸若一一悟是自心則事事無非正理如經云提婆達多不可思議所修行業皆同如來六群比丘實非弊惡所行之法皆同佛行有修善者地獄受果惡行之人天上受報如不達斯文則逆順分𡵨焉能羙惡同化然初章之內已述正宗若上上機人則一聞千悟斯皆宿習見解生知若是中下之根須慿開導因他助發方悟圎成為此因緣微細纂集所以云若有一微塵處未了此猶有無明在以不了處為障翳故何况自身根門之內日用之中有無量應𢚩法門全未明一如生盲人每日喫一百味飯雖然得喫品饌何分若言無分又每日得喫若言有分設問揔不知若欲為未了之人慿何剖㭊只成自誑反墮無知自眼未開焉治他目是以善財首見文殊已明根本智入聖智流中然後遍叅道友為求差別智習菩行門遇無猒足國王如幻法門見勝熱婆羅門無盡輪解脫尚乃迷宗失旨對境茫然故知佛法玄微非淺智所及何乃將蚊子足擬窮滄溟之底用蜘蛛絲欲懸妙高之山益抱慚顏須申懺悔五板問依上標宗甚諧正脉何用更引言詮廣開諸道荅馬鳴祖師雖標唯心一法開出真如生滅二門達磨直指一心建立隨緣無礙四行詳夫宗本無異因人得名故云祖師頓悟直入名禪宗諸佛果德根本名佛性菩萬行原名心地眾生輪迴起處名識藏萬法所依名法性能生般若名智海不可定一執多生諸情見是以金光明經云法性甚深無量無量者非別有一法名為無量毗盧那遍一切處一切諸法皆是佛法甚深者非別有一法名為甚深即事而真無非實相可謂一中之多當存而正泯多中之一在卷而亦舒八板經云縱此心者喪人善事制之一處無事不辦是故比丘當勤精進折伏汝心故知生死難出應須兢慎且如二乗聖人及自在菩俱出三界之外尚有變易之身四種生死何况三界之內現行煩惱業繫凡夫分𫨻死乎四種生死者則是一切阿羅漢辟支佛大地菩由四種障不得如來四德一方便生死二因緣生死三有有生死四無有生死無上依經云佛告阿難於三界中有四種難一者煩惱難二者業難三者生報難四者過失難無明住地所起方便生死如三界內煩惱難無明住地所起因緣生死如三界內業難無明住地所起有有生死如三界內生報難無明住地所起無有生死如三界內過失難應如是知阿難四種生死未除滅故三種意生身無有常樂我淨波羅蜜果唯佛法身是常是樂是我是淨波羅蜜汝應知愛別離苦者大涅槃經因愛生憂因愛生怖若離於愛何憂何怖法華經云諸苦所因貪欲為本淨名經云從癡有愛則我病生怨憎會苦者大涅槃經云觀於五道一切受生悉是怨憎合會大苦若未了無生於所生之處無非是怨無非是苦何者為境所縛不得自在故求不得苦者有其二種一者所希望處求不能得二者多役功力不得果報五盛䕃苦者生苦老苦病苦死苦愛別離苦怨憎會苦求不得苦是名為五盛䕃苦以執䕃是有為䕃所籠便成䕃魔眾苦所集五濁者一劫濁四濁增劇聚在此時瞋恚增劇刀兵起貪欲增劇飢餓起愚癡增劇疾疫起三災起故煩惱倍隆諸見轉熾麄弊色心惡名穢稱摧年減壽眾濁交湊如水奔昬風波皷怒魚龍攪撓無一𣽓頼時使之然如劫初光音天墮地地使有欲如忉利天入麄澁園園生闘心是名劫濁相煩惱濁者貪海納流未曾飽足瞋虺吸毒燒諸𠀍間癡闇頑嚚過於漆墨慢高下視陵忽無度疑網無信不可告實是為煩惱濁相見濁者無人謂有人有道謂無道十六知見六十二見等猶如羅網又似稠林緾縛屈曲不能得出是見濁相眾生濁者𭣄於色心立一宰主譬如黐膠無物不著流浪六道處處受生如貧如痤名長名富是為眾生濁相命濁相者朝生暮殞晝出夕沒波轉煙迴眴息不住是命濁相居此濁亂之時障增劇境飄識熖燒盡善根業動心風吹殘白法著瞋魑魅之鬼趣墮癡羅剎之網中為貪愛王之拘留被魔怨主之駈役孰能䪺省俲此圎修十二板首楞嚴經云如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄又云善星比丘妄一切法空生身䧟入阿鼻地獄故知若未入宗鏡先悟實相真心假饒大辯神通長劫禪誦終不免斯𠧨若達此旨凡所施為舉足下足自然不離一心涅槃之道如月上女經云舎利弗告月上女言汝於今者欲何所去月上女報言汝問今欲向何所去者我今亦如舎利弗去作如是去耳舎利弗報月上女言我今欲入毗耶離城汝於今者乃從彼出云何報言我今乃如舎利弗去作如是去尒時月上復報舎利弗言然舎利弗舉足下足凡依何處舎利弗言我舉足下足並依虚空女言我亦如是舉足下足悉依虚空而虚空界不作分別是故我言亦如舎利去作如是去耳女言舎利弗此事且然今舎利弗行何行舎利弗言我向涅槃如是行也月上女言舎利弗一切諸法豈不向涅槃行也我今者亦向涅槃行也舎利弗問月上若一切法向涅槃者汝今云何不滅度月上女言舎利弗若向涅槃即不滅度何以故其涅槃行不生不滅不可得見體無分別無可滅度者釋曰其涅槃行不生不滅者即自心無生之縱千途出沒匪離涅槃之門任萬法縱撗豈越無生之道故法華經偈云佛子住此地即是佛受用常在於其中經行及坐臥第四十三卷四板大涅槃經云復次菩修於死想觀是壽命常為無量怨讎所遶念念減無有增長猶山瀑水不得停住亦如朝露勢不久停如囚趨市步步近死如𭷣羊詣於屠所迦葉菩言𠀍尊云何智者觀念念滅善男子譬如四人皆善射術聚在一處各射一方俱作是念我等四箭俱發俱墮復有一人作是念言如是四箭及其未墮我能一時以手接取善男子如是之人可疾不迦葉菩言如是𠀍尊佛言善男子地行鬼疾復速是人有飛行鬼復速地行四天王疾復速飛行日月神天復速四天王堅疾天復速日月眾生壽命復速堅疾善男子一息一眴眾生壽命四百生滅智者若能觀命如是是名能觀念念滅也善男子智者觀命繫屬死王我若能離如是死王則得永斷無常壽命七板楞伽經云心外見法名為外道若悟自心即是涅槃離生死故論云心外有法生死轉迴若了一心生死永絕若悟自心即是實相離虚妄故法華經云唯此一事實餘二則非真若悟自心即是智誠離愚癡故九板華嚴論云大光王入菩大慈為首三昧顯所行慈心業用饒益自在令後學者倣之以明無依之智入一切眾生心與之同體無有別性有情無情皆悉同體入此三昧所感業故令一切眾生及以樹林湧泉悉皆歸流悉皆枝悉皆稽首夜义羅剎悉皆息惡以明智隨一切眾生皆與同其業用一性無二如𠀍間帝王有慈悲於人龍神順伏鳳集麟翔何况人焉而不歸仰况此大光王智徹真原行齊法界慈心為首神會含靈與眾物而同光為萬有之根末如摩尼寶與物同色而本色不違如聖智無心以物心為心而物無違也明同體大慈悲心與物同用對現色身而令發明故山原及諸草樹無不回轉向王禮敬陂池泉井及以河海悉皆騰溢注王前者以智境大慈法合如此若眾生情識所變之境即眾生不能為之如蓮華藏𠀍界中境界盡作佛事以是智境非情所為故聖者以智歸情令有情眾生報得無情草木山泉河海悉皆隨智回轉以末為本故如𠀍間有志孝於心冰池湧魚冬竹抽笋尚自如斯况真智從慈者歟故知得法界之妙用用何有盡從真性中緣起起無不妙則理無不事佛法即𠀍法豈可揀是除非邪事無不理𠀍法即佛法寧須俗崇真耶但是未入宗鏡境智未亡興夢念而異法現前發燄想而殊途交應致茲取捨違背圎常所以不能喧靜同觀善惡俱化者未聞宗鏡故耳十一板十地菩座體但言滿三千大千𠀍界之量普賢座量量等虚空一切法界大蓮華藏故明知十地菩智量猶隔以此來陞此座如許乖冝入出如許不可三昧之門猶有寂用有限障未得十地果位後普賢菩大自在故故三求普賢三重昇進却生想念方始現身及十三昧境界之事意責彼十地猶有求於出𠀍間生死境界未得等於十方任用自在以此如來教令却生想念去彼十地中染習出𠀍淨心故此明十地緣真俗出𠀍餘習氣惑故已上意明治十地菩緣真俗二習未忘寂亂二習未盡於諸三昧有出入習故未得常入生死猶如虚空無作者而常普遍非限量所収第四十四卷一板忠國師臨終之時學人乞師一言師云教有明文依而行之即無累矣吾何言哉如斯慇懃真實付囑豈𡱈己見生上慢心終不妄如來無上甘露不可思議大悲所薰金口所宣難思聖教如云依而行之者且依何旨趣不可是依文字語句而行不可是依路道理而行直須親悟其宗不可輙生孟浪若决定信入者了了自知何須他聞甚深法如清風届耳三板但隨生滅之緣遺此妙明之性是以一切祖教皆指見性識心不從生因之所生唯從了因之所了相麄易辨性密難明隨轉處而莫知在照時而方了如今不見者皆被三惑心𭷣六塵境換不知境元是我成主被客迷但能隨流得性之時自然無惑復有云般若唯以心神契會以心傳心方成密付六板經云我正夢時惑此舂音將為皷響阿難是人夢中豈憶靜搖開閉通塞其形雖𥧌聞性不昬縱汝形銷命光遷謝此性云何為汝消滅故知不認自體𢘆常之聞性却徇聲塵生滅之聞相遂乃聞賛而生喜聞毀而起瞋以迷本聞故隨聲流轉七板經云生滅既滅寂滅現前忽然超越𠀍出𠀍間十方圎明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道眾生與諸眾生同一悲仰是以初從聞性入時先亡動靜聲塵之境次亡能聞所聞之心既心境俱亡又不住無心境及能覺所覺之智則覺智俱空此空亦空方成圎覺故云空覺極圎空所空滅始盡生滅之原到寂滅本妙覺心之地八板若不觀心內證法師律師禪師各有十種過患如像法决疑經云三師破壞佛法略各有十過法師十過者一但外求文解而不內觀修心釋論云有論而無慧所不應受二不融經意息爭趣道但執己非他我慢自高不識見心苦集三不遵遺囑不依念處修道不依木义而住非佛弟子四非禪不慧偏慧不禪一翅一輪豈能遠運五法本無破貪求名利弘宣寧會聖旨六貴耳入口出何利於己經云如人數他寶自無半錢分無行而宣何利於他七設證得法不過解意根卜度非解脫道非究竟法八又多加水乳無道之教教誤後生九四眾失真法利轉就澆漓十非但不能光顯佛法亦乃破於佛法也禪師十過者一經云假名阿練若納衣在空閑自謂行真道好我等過二者恃行陵他不識戒取苦集煩惱三無慧修定音禪無目寧出生死耶四不遵遺囑不依念處修道不依木义而住非佛弟子五無慧之禪多發鬼定生破壞佛法死墮鬼道六名利坐禪如扇提羅死墮地獄七設證得禪即墮長壽天難八加水乳禪教授學徒紹三塗種子九四眾不霑真法之潤轉就澆漓十非止不能光顯三寶亦乃破佛法也律師十過者一但執外律不識內戒故被淨名訶二執律名相諍計是非不識見心苦集三然戒定慧相資方能進道但律不慧不禪何能進道四弘在名譽志不存道果在三塗五不遵遺囑不依念處修道不依木义而住六執律方便小教以為正理而障大道七師師執律不同弘則多加水乳八不依聖教傳授誤累後生九四眾不霑真法轉就澆漓十非止不能光顯三寶亦乃破佛法也是知若不觀心具如上之大失第四十五卷四板前據台教明五百番安心法門皆為逗機對病施藥今依祖教更有一門最為省要所為無心何者若有心則不安無心則自樂故先德偈云莫與心為伴無心心自安若將心作伴動即被心謾五板大寶積經佛言文殊汝入不思議三昧耶文殊師利言不也𠀍尊我即不思議不見有心能思議者云何而言入不思議三昧我初發心欲入是定而今思惟實無心相而入三昧如人學射久習則巧後雖無心以久習故箭發皆中我亦如是初覺不思議三昧繫心一緣若久習成就更無心想𢘆與定俱六板問本自無心妄依何起荅為不了本自無心名妄若知本自無心則妄無所起真無所得問何故有心即妄無心即無妄荅以法界性空寂無主宰故有心即有主宰有主宰即有分劑無心即無主宰無主宰即無分劑無分劑即無生死問無心者為當離心是無心即心得無心荅曰即心得無心問即心是有心云何得無心荅不壞心相而無分別問豈不辯知也荅即辯知無能所是無心也豈渾無用始是無心譬如明鏡照物豈有心耶當知一切眾生𢘆自無心心體本來常寂寂而常用用而常寂隨境鑒辯皆是實性自尒非是有心方始用也只為眾生不了自心常寂妄計有心心便成境以即心無心故心𢘆是理即理無理故理𢘆是心故不動心相心𢘆是理故不得心相不得心相故即是眾生不生不動心相故即是佛亦不生以生佛俱不生故即凢聖常自平等法界性也純一道清淨更無異法當知但有心分別作解之處俱是虚妄猶如夢中若未全覺所見纖毫亦猶是夢中事但得無心即同覺後絕諸境界但有一微塵可作修證不思議解處俱不離三界夢中所見經云無有少法可得佛即授記七板又且無心者不得作有無情見之解若將心作無此即成有若一切處無心如土木瓦礫此成斷滅皆屬意根強知妄識邊事是以稱不思議定者以有無情見不及故又澄湛是事當體是理事有顯理之功亦有覆理之理有成事之力亦有奪事之能各取則兩傷並觀則俱是何謂顯理若妙性未發須假事行助顯莊嚴如水澄清魚石自現何謂成事若功行未圎必伏理觀引發開導何謂覆理若一向執事坐禪返迷己眼未識玄旨徒勞念靜何謂奪事若天真頓朗如日消冰何須調心𭣣攝伏捺故經偈云若學諸三昧是動非是禪心隨境界流云何名為定問既不得作有無之解如何是正了無心荅石虎山前闘蘆華水底沉九板若不先軫候察其病原何以依方施其妙藥只如淨名居士位臨等覺尚有原品無明實因疾未盡現受後有生死實果疾猶存如淨名䟽問實報無障礙土何得猶有煩惱四分之緣疾荅開菩自體法界緣集即有四分所以然者取自體一實諦即是貪愛捨二邊生死即是瞋斷迷一實諦無明未盡故猶有癡也三分等取即是等分此即是根本之三毒故請觀音經云淨於三毒根成佛道無疑何况業繫凡夫分𫨻生死之病然今時多不就己子細推尋及廣披聖典教觀俱昧理行全唯尚隨語依通一時遣蕩拂迹而迹不泯歸空而空不亡以不出法塵全為影事十二板華嚴經云佛子譬如金師善巧鍊金數數入火轉轉明淨調柔成就隨意堪用菩亦復如是供養諸佛教化眾生皆為修行清淨法地所有善根悉以迴向一切智地轉轉明淨調柔成就隨意堪用然雖萬行磨鍊皆是自法所行如先德云一切佛事無邊化門皆依自法融轉而行即自心中有真如體大今日體解引出法身由心中有真如相大今日了達引出報身由身中有真如用大今日修行引出化身乃至十波羅蜜一切塵沙萬行但是自心中引出未曾心外得一法行一行若言更有從外新得者即是魔王外道第四十六卷八板易云寂然不動感而遂通天下之故禮云人生而靜天之性也感物而動性之欲也後儒皆以言詞小同不觀前後本所建立致欲渾和三教但見言有小同豈知有大異是知不入正宗焉知言同意別未明己眼寧鑒名異體同所以徇語者迷據文者惑恐叅大旨故錄示之且如外道自然以為至道不成方便仍壞正因佛教亦自然𨿽成正教猶是悉檀對治未為究竟以此一例其餘可知十二板略標一百二十種見解並是迷宗失旨背湛乖真捏目生華迷頭認影若敲冰而索火如緣木以求魚畏影逃空捫風捉電苦非甘種砂豈飯因皆不能以法性融通一旨和會盡迷方便悉入見緾不達正宗皆投見網綿密難出如曲木曳於稠林勢猛力強猶濬河漂於香象所以天魔外道本無其種修行失念遂沠其原故知但有所重所依立知立解絲毫見處不亡皆成外道如華嚴經頌云以法無性故無有能了知如是解諸法究竟無所解以法無自體憑何所作解如辯兔角之大小了龜毛之短長理事俱虚可取笑於天下情塵自隔實喪道於目前如華嚴論云見在即凡情亡即佛祖師云不用求真唯須息見十三板佛藏經云佛言舎利弗諸佛阿耨多羅三藐三菩提唯是一義所謂離也何等為離離諸欲諸見欲者即是無明見者即是憶念何以故一切諸法憶念為本所有念想即為是見見即是邪是以若能離見即成諸佛十方稽首萬類歸依如中觀論云瞿曇大聖主怜愍是法悉斷一切見我今稽首禮十四板若究竟欲免斷常邊邪之見須明華嚴六相門則能任法施為身亡能所隨緣動寂不壞有無具大揔持究竟無過矣此六相義是辯𠀍間法自在無礙正顯緣起無分別理若善見者得智揔持門不墮諸見不可廢一取一雙立雙亡雖揔同時繁興不有縱各具別𡨋寂非無不可以有心知不可以無心會詳法界內無揔別之文就果海中絕成壞之旨今依因門智照古德略以喻明六相義者一揔相二別相三同相四異相五成相六壞相揔相者譬如一舎是揔相椽等是別相椽等諸緣和同作舎各不相違非作餘物故名同相椽等諸緣遞相望一一不同名異相椽等諸緣一多相成名成相椽等諸緣各自住法本不作故名壞相第四十八卷十一板問佛種從緣起者即是熏習約法報化三身中是何佛種從緣起荅是報身佛由熏成故以智為種法身是無為斷惑所顯不從種子生以法報具足能起化現即化身是法報之用唯報佛性即是一切眾生聞熏種子且如𠀍間甘露葉上霧露潤濕滴入土中一滴成一連珠又更濕潤生長芽莖報佛性亦尒我等第六識見分及耳識見分如同甘露葉如來大乗教法如似霧露耳識第六識熏得大乗種子似潤濕落在第八識中如入土中生得連珠後數資熏至成自受用報身佛更遇濕潤生起芽莖故知佛種全自薰成初學之人爭不仗於聞法之力且眾生雖有正性因須假緣因發起第四十九卷二板問此第八識有幾種執受荅有二種攝論云一切種子心識成熟展轉和合增長廣大依二執受一者有色諸根及所依執受二者相名分別言戱論習氣執受六板金剛經云如來一合相即非一合相以從緣合即無性故無性之性是所證理如是知者是正智生是自相處轉名真現量又拂能所證迹為真現量謂若有如外之智與如合者猶有所得非真實證能所兩亡方為真現唯識論云若時於所緣智都無所得尒時住唯識離二取相故經云亦無如外智能證於如乃是為真現量也是以諸佛施為悉皆現量如守護國界主陀羅尼經云如來悉知彼諸眾生出息入息種種飲食種種資具種種相皃種種根噐種種行解種種心性死此生彼剎那流注生滅相續如來悉知如是一切現量所得非比量知云何現量謂不動念如實即知非流注心入於過去如是知時智慧具足隨眾生心種種法十二板問阿頼耶識若常則無轉變若斷則不相續如何會通得合正理荅不一不異非斷非常方契因緣唯識正理問此識既云𢘆轉如流定有生滅去來不荅此識不守自性隨緣變時似有流轉而實無生滅亦非去來如湛水起漚漚全是水華生空界華全是空識性未甞去來虛空何曾生滅如馬祖大師云若此生所經行之處及自家田宅處所父母兄弟等舉心見者此心本來不去莫道見彼事則言心去心性本無來去亦無起滅所經行處及自家父母眷屬等今所見者由昔時見故皆是第八含藏識中憶持在心非今心去亦名種子識亦名含藏識貯積昔所見者識性虚通念念自見名巡舊識亦名流注生死此念念自離不用斷滅若滅此心名斷佛種性此心本是真如之體甚深如來藏而與七識俱傅大士云心性無來亦無去緣慮流轉實無停又心無處所故云無停心體實無來去昔所行處了了知見性自虚通體無去住不用除滅此心若識此心本是佛體不須怕今有不識心人將此為妄終日除滅亦不可得滅縱令得滅證聲聞果亦非究竟只如過去諸佛𢘆沙劫事見如今日真如之性靈通自在照用無方不可同無情物佛性是生氣物不可尒無知但無心量種種施為如幻如化如機関木人畢竟無有心量於一切處無執繫無住著無所求於一切時中更無一法可得第五十卷一板夫此第八識為定是真是假荅是真是假不可定執首楞嚴經云陀那微細識習氣成瀑流真非真恐迷我常不開演釋曰梵語阿陁那者此云執持識此識體淨被無明熏習水乳難分唯佛能了以不覺妄染故則為習氣變起前之七識瀑流波浪皷成生死海若大覺頓了故則為無漏淨識執持不斷盡未來際作大佛事能成智慧海真非真恐迷者佛意我若一向真則眾生不復進修墮增上慢以不染而染非無客塵垢故又外道執此識為我若言即是佛性真我則扶其邪執有濫真修我若一向不真則眾生又於自身撥無生斷見故無成佛之期是以對凡夫二乗前不定開演恐生迷倒不達如來密旨以此根本識微細難知故二板問受生命終既依本識生時死時復住何心荅夫論生滅之事必住散動之心經云有念即魔網不動即法印魔網立生死之道法印成涅槃之門故知散亂寂靜二途皆依本識而有三板增一經云𠀍尊告阿那律曰一切諸法由食而住在眼以眠為食耳以聲為食鼻以香為食舌以味為食身以細滑為食意以法為食涅槃以無放逸為食尒時佛告諸比丘如此妙法夫飲食有九事人間有四食一𫨻食二更樂食三念食四識食復有五種是出𠀍閒食一禪食二願食三念食四八解脫食五喜食是出𠀍間之食當共專念捨除四種之食求辦出𠀍之食所以維摩經云迦葉住持等法應次行乞食為不食故應行乞食為壞和合相應取摶食為不受故應受彼食斯皆是破五䕃法成涅槃食七板阿陁那此云執持識能執持種子根身生相續即是界趣生此通一切位執持有三一執持根身令不爛壞二執持種子令不散失三執取結生相續者即有情於中有身臨末位第八識初一念受生時有執取結生相續結者繫也屬也於母腹中一念受生便繫屬彼故亦如磁毛石吸䥫䥫如父母精血二點第八識如磁毛石一剎那間便而住同時根塵等種從自識中亦生現行名為執取結生故在胎五位者初七日內名雜穢狀如薄酪父精母血相和名雜自體不淨名穢二七日內名靤猶如豌豆瘡靤之形表裏如酪未生肉故三七日內名凝結謂稍凝結形如就了血四七日內名凝厚漸次堅硬五七日內名形位內風所吹生諸根形一身四肢生差別故用此三十五日盡其五根皆足六七日內名髮毛爪齒位七七日內名具根位以五根圎滿漸次生識即未具空明等緣或名種子識問此識與心何別荅種子與心別即取第八識現行亦名種子故但是種能生現行故名種子識此識現行能起前七識即有能生法種功能邊第八識名種子識前言心者但是積習習起名心又第八識而隨別立種種名十二板九識中揔分四𫨻每識別立十名一第六識十名者一對根得名名為六識二能籌量是非名為意識三能應涉應境名攀緣識四能遍緣五塵名巡舊識五念念流散名波浪識六能辯前境名分別事識七所在壞他名人我識八愛業𭷣生名四住識九令正解不生名煩惱障識十感報終盡心境兩別名分𫨻死識二第七識十名者一六後得稱名為七識二根塵不會名為轉識三不覺習氣忽然念起名妄想識四無間生滅名相續識五障理不明名無明識六返迷從正能斷四住煩惱名為解識七與涉玄途順理生善名為行識八解三界生死盡是我心更無外法名無畏識九照了分明如鏡顯像名為現識十法既妄起恃智為懷令真性不顯名智障識三第八識十名者一七後得稱名為八識二真偽雜間名為和合識三蘊積諸法名為藏識四住持起發名熏變識五轉凡成聖名為出生識六藏體無斷名金剛智識七體非靜亂名寂滅識八中實非假名為體識九藏體非迷名本覺識十功德圎滿名一切種智識四第九識十名者一自體非偽名為真識二體非有無名無相識三䡄用不改名法性識四真覺常存體非隱顯名佛性真識五性絕虚假名實際識六大用無方名法身識七隨流不染名自性清淨識八阿摩羅識此名無垢識九體非一異名真如識十勝妙絕待号不可名目識十三板一法應機乃立異号如天帝釋千名名雖不同終是目於天主豈有聞異名故而言非實相理如人供養帝釋毀憍尸迦供養憍尸迦毀於帝釋如此供養未必得福末代弘法者亦尒或信頼耶自性清淨心而毀畢竟空或信畢竟空無所有毀頼耶識自性清淨心或言般若明實相法華明一乗皆非佛性此之求福豈不慮禍若知名異體一則隨喜之善遍於法界何所諍乎又諸經內逗緣稱機更有多名隨處安立以廣大無邊目之為海以圎明理顯稱之曰珠以萬法所宗号之曰王以能生一切名之曰母但是無之真多亦不多無心之真心一亦不一故華嚴𥝠記云取决斷以智言之取能生長以地言之取其高顯以山言之取其深廣以海言之取其圎淨以珠言之第五十一卷十二板問今談宗顯性云何廣引三支比量之文荅諸佛法尚依俗諦况三支比量理貫五明以破立為宗言生智了為體摧凡小之異執定佛法之綱宗所以教無智而不圎木非繩而靡直比之可以生誠信伏邪倒之疑心量之可以定真詮杜狂愚之妄故得正法之輪永轉唯識之旨廣行則事有顯理之功言有定邦之力如慈恩大師云因明論者元唯佛文廣義散備在眾經第五十二卷三板問末那心所何性所攝論荅云此意相應四煩惱等是染法故障礙聖道隱蔽真心名有覆非善不善故名無記若已轉依唯是善性密嚴經偈云末那緣藏識如磁石吸䥫如虵有二頭各別為其業染意亦如是執取阿頼耶能為我事業增長於我所復與意識俱為因而轉謝於身生煖觸運動作諸業飲食與衣裳隨物而受用騰躍或歌舞種種自嬉遊持諸有情身皆由意功力如火輪𡸁髮𠃵闥婆之城不了唯自心妄起諸分別身相噐𠀍間如動鞦韆勢無力不堅固分別亦復然分別無所依但行於自鏡譬如鏡中像識種動而見愚夫此迷惑非諸明智者仁主應當知此三皆識現於斯遠離處是即圎成實八板問若無末那有何等過荅若無第七則無凡可猒無聖可欣凡聖不成染淨俱失論云是故定應別有此意又契經無想有情一期生中心心所滅若無此識彼應無染謂彼長時無六轉識若無此意我執便無乃至故應別有染污末那於無想天𢘆起我執由斯賢聖同呵猒彼又契經異生善染無記心時𢘆帶我執若無此識彼不應有謂異生類三性心時雖外起諸業而內𢘆執我內執我故令六識中所起施等不能亡相故瑜伽染污末那為識依止彼未滅時相了別縛不得解脫末那滅已相縛解脫言相縛者謂於境相不能了達如幻事等由斯見分相分所拘不得自在故名相縛依如是義有伽陀言如是染污意是識之所依此意未滅時識縛終不脫釋云於無想天𢘆起我執由斯賢聖同呵猒彼者有第七於彼起我執是異生故出定已後復沉生死起諸煩惱聖賢呵彼若無第七不應呵彼無過失果猶執我故令六識中所起施等不能妄相者此我外緣行相麄動非第七起由第七故第六起此全由七生增明為論第六識中我執體有間斷通三性心間雜生故第七不緣外境生故已上略錄第七末那諸教同詮群賢共釋創入道者此意須明是起凡聖之因冝窮體性乃立解惑之本可究根原迷之則為人法執之愚悟之則成平等性之智於諸識內獨得意名向有漏中作無明主不閒不斷無想定治而不消常審常𢘆四空天避而還起雖有覆而無記不外執而內緣常起現行能蔽真而障道唯稱不共但成染而潤生是以欲透塵勞須知要徑將施妙藥先候病源若細意推尋𡨋心體察則何塵而不出何病而不消斷惑之門斯為要矣第五十四卷一板密嚴經偈云是時金剛藏復告大眾言頼耶無始來為戲論熏習諸業所繫縛輪轉無有窮亦如於大海因風起波浪𢘆生亦𢘆滅不斷亦不常由不悟自心隨識境界現若了於自心如火焚薪盡通達於無漏則名為聖人藏識變眾境綸於𠀍間意執我我所思量𢘆流轉諸識類差別各各了自境積習業為心遍積習名意了別名為識五識取現境如翳見毛輪隨見而迷惑於似色心中非色計於色譬如摩尼珠日月光所照隨其所應現各雨自類物阿頼耶亦尒如來清淨藏和合於習氣變現周𠀍間與無漏相應雨諸功德法譬如乳變異成酪至酪漿藏識亦如是變似於眾色如翳見毛輪有情亦復尒以惡習氣翳住藏識眼中於諸非色處此所見諸色猶如於陽燄遠離於有無皆頼耶所現仁者依眼色而生似色識如幻住眼中飄動猶熱𦦨色皆是藏識與色習相應變似體非有愚夫妄分別諸昬醉放逸坐臥及狂走頓起諸事業皆是頼耶識猶如盛赫日舒光照於地蒸氣如水流渴獸望之走頼耶亦復尒體性實非色而似於色現惡覺妄生著如磁石吸䥫迅速而移轉雖無於情識似情識而動如是頼耶識為生死所攝往來於諸趣非我而似我如海中漂物無思隨流水頼耶無分別依身而運動譬如二象闘被傷者永退頼耶亦如是斷染無流轉譬如淨蓮華離泥而皎潔人天皆受用莫不咸珍敬如是頼耶識出於習氣轉依得清淨佛菩所熏習譬如殊勝寶野人所輕賤若用飾旒則為王頂戴如是頼耶識是清淨佛性凡位𢘆雜染佛果常寶持如羙玉在水苔衣所緾覆頼耶處生死習氣縈不現於此頼耶識有二取相生如虵有二頭隨樂而同往頼耶亦如是與諸色相具一切諸𠀍間取之以為色惡覺者迷惑計為我我所若有若非有自在作𠀍間頼耶雖變現體性𢘆甚深於諸無智人悉不能覺了譬如於幻師幻作種種獸或行而或走似有情非實頼耶亦如是幻作於𠀍間一切諸有情體性無真實凡愚不能了妄生於取著起微塵勝性有無異分別及與於梵天丈夫等諸見又識之於根乍出乍入如鹿在網猶鳥處籠啄一捨一周而復始無暫𠇲息識在根籠亦復如是或在於耳或在於眼來去無定不可執常雖復無定相續不斷何為不斷以妙用無間故若凡夫為色塵所縛不得自在若見一法則被一法礙不能圎通法界是以金剛經云若菩心住於法而行布施如人入暗則無所見首楞嚴經云由塵發知因根有相相見無性猶若交蘆由塵發知者即見分因根有相者即相分相見無性者心境生各無自體心不自立由塵發知境不自生因根有相二虚相𠋣猶若交蘆知見立知即無明本知見無見斯即涅槃但了了見無可見無可見即通法界見即是涅槃若了了聞無可聞無可聞即通法界聞即是涅槃一切諸法本來涅槃以分別心妄見所隔不知自識作無明五板還原集自他觀門云兩身為自他彼身為他己身為自一身復為自他色身為他心即為自心復為自他心即為他智即為自智復有自他有所得智為他無所得智為自無所得智復有自他淨智為他是淨亦淨為自觀身實相觀佛亦然稽首如空無所依心淨已度諸禪定無住則無本覺此名為佛假名名為佛亦無佛可成無成可成無出可出是名佛出無所見了了見了了見無所見但有名字名字性空無所有鏡像如虚空虚空如鏡像色心如虚空虚空如色心色心如鏡像鏡像身無二亦復非是一若能如是解諸佛從中出諸佛為有名如空應響聲無心究竟道法法自然平平處亦無平無平作平此中言語斷心行處亦滅眼空保色空色空保眼空兩空自相保則無眼識賊耳空保聲空聲空保耳空兩空自相保則無耳識賊鼻空保香空香空保鼻空兩空自相保則無鼻識賊舌空保味空味空保舌空兩空自相保則無舌識賊身空保觸空觸空保身空兩空自相保則無身識賊心空保法空法空保心空還是一空能保二空亦能保一空是故号空空假名見諦若知六根淨即無六塵賊若無六塵賊心王自清淨方便持化凡題名号佛性釋曰是以若眼空色不空色空眼不空則不可相保以根境異故必為侵𡧱若同一性即無疑矣如𠀍間作保之人若是忠良人即可忠良人作保若是惡行人則不可保以情性異故六種根塵和合既尒一切萬法順旨亦然故首楞嚴經云佛告阿難根塵同原縛脫無二識性虚妄猶如空華七板夫宗鏡所錄皆是現證法門一入全真更無前後如或不信但靜思看若見一念無生自然與經𡨋合如菩念佛三昧經偈云此身常無知如草木瓦礫菩提無形色寂滅相不生身不觸菩提菩提不觸身心不觸菩提菩提不觸心而能有相觸實謂不思議釋曰故知色不至眼耳不倒聲而有見聞是不可思議以自性離中而有顯現故知六根無對皆是無諍法門諸境含虚盡𡨋不二之道即今眾生境界真不可思議矣曷用遠求諸聖作用而自鄙劣者哉此宗鏡是照眾生之癡闇同諸佛之光明使法界含生一時圎證如法集經云須菩提白佛言𠀍尊眼色二法無所諍竸以不和合故以此二法不相到故夫不合不到法皆無違諍𠀍尊法無有二是故不諍九板佛母經云阿姉眼不見色乃至意不知法如是菩提離故眼色離乃至菩提離故意法離等入楞伽經偈云如水流枯竭波浪則不起如是意識滅種種識不生又偈云此中無心識如虚空陽燄如是知諸法而不知一法究竟一乗寶寶性論偈云如一切𠀍閒依虚空生滅依於無漏界有諸根生滅火不燒虚空若燒無是處如是老病死不能燒佛性地依於水住水復依於風風依於虚空空不依地等如是䕃界根住煩惱業中諸煩惱業等住不善思惟不善思惟行住清淨心中自性清淨心不住彼諸法䕃入界如地煩惱業如水不正念如風淨心界如空依性起邪念念起煩惱業能起䕃界入依止於五䕃界入等諸法有諸根生滅如𠀍界成壞淨心如虚空無因復無緣及無和合亦無生住滅如虚空淨心常明無轉變為虚妄分別客塵煩惱染又五現識不動唯意識分別十板問意識緣境多少三境三量如何分別荅古德云第六意識即比量意識能緣三𠀍法三性法三界法一百法等法尒皆是第六意識緣也有二一明了二獨頭且明了者唯於五根門中取五塵境是初念與五同緣時率尒心中唯是現量緣其實五塵境若後念已去不妨通比量非量作行解緣其長等假色即比量或於五塵上起執時便是非量即明了意識前後許通三量三境中若緣五塵實法時是性境若後念行解心緣長等假色時即真獨影似帶質二獨頭意識有三一夢中獨頭亦緣十八界法唯是獨影境非實此夢中境唯是法處収亦無本質二覺窹獨頭而緣一切法有漏無漏有為無為𠀍出𠀍間有體無體空華兔角三𠀍一切法皆悉緣得問此覺窹意識一念緣十八界時有幾相分幾本質幾見分荅本質相分各有十八見分唯一問如何有十八相分荅十八相分從十八本質起即有十八相分如一面鏡中觀無量人影外邊有十八實人鏡即是一於鏡上現有十八人影像見分亦尒一見分能緣得十八相分若質影有十八以是所緣境則無過若一念有十八見分便有多心過三定中獨頭亦緣十八界一百法過未境及真如等若假若實皆能緣故三量分別者若是明了意識前後念通三量夢中獨頭唯非量以不稱境故覺窹通三量若緣有體法時緣五境界等通現量故若緣五根界七心界等是比量若緣空華過未境等通比量非量若定中唯是現量雖緣假法以不妄執無計度故唯現量又獨頭意識即獨生散意緣影像門影像者諸有極微是極逈極略二色皆是假影色也但於觀心扸麄色至色邊際假立極微唯觀心影像都無實體第五十五卷九板問隨境各立六識之名此依五色根未自在於自在位如何分別荅若自在位中則諸根用如法華經明鼻根即能見色觀心等論云若得自在諸根用一根發識緣一切境但可隨根無相濫矣乃至佛地經成所作智决擇有情心行差別起三業化作四記等若不遍緣無此能故釋云三業化合有十種佛地經云身化有三一現神通化二現受生化三現業果化語化亦有三一慶慰語化二方便語化三辯物語化意化有四一决擇意化二造作意化三發起意化四領受意化受化中四記者一謂一向記二分別記三反問記四默置記已上六識之相㹅成三業之門未轉依中隨流徇境發雜染之種結生死之根唯起蓋緾但縈苦集背清淨之覺性合界處之妄塵立三有之垣墻作四流之波浪至轉依位𡨋真反流隨智慧行成無漏善道諦所攝正理相應現妙觀察心决四生之疑網為成所作智起三輪之化原若也究之於心塵勞為菩提之妙用失之於旨常樂作生滅之苦輪故知染淨非他得喪在我似手反覆如人醉醒何者反亦是手覆亦是手要且反時非覆時覆時非反時然俱不離手醉亦是人醒亦是人要且醉時非醒時醒時非醉時然不離醉有醒亦不即醉是醒如迷亦是心悟亦是心要且迷時非悟時悟時非迷時然迷悟非別即時節有異唯在般若轉變臨時一體匪移千差自別迷之枉遭沉沒念念成凢悟之本自圎明心心證聖十板問如何是諸識遍計有無荅古德云五八識無執以因緣變故唯現量夫為執者必須強思計度等有執也唯第六第七有遍計分別故即六七二識有執也又四句一遍而非計即第六獨頭意識遍緣一切不計執故二計而非遍即第七識唯緣頼耶起計度故三亦遍亦計第六識因中有周遍計度四非計非遍即五識唯緣五塵無計度故前五識任運證境不帶名言唯現量故第八亦然第五十六卷七板如是七識於阿頼耶識中盡相應起如眾影像俱現鏡中亦如眾浪同集一水乃至如此識轉不離二一能分別二所分別所分別既無能分別亦無無境可取識不得生以是故唯識得成何者立唯識意本為遣境遣心今境界既無唯識又泯即是唯識成也八板楞伽經偈云譬如巨海浪斯由猛風起洪波皷溟壑無有斷絕時藏識海常住境界風所動種種諸識浪騰躍而轉生九板云何名為境界之風其形狀當如何耶謂青黃等種種顯色能起眼識寶珂等珠出現種種勝妙音聲能起耳識檀乳等香熏布種種芬芬香氣能起鼻識木羅石蜜等諸安觸著和種種善美樂具能起身識甘淡等味隨其所應出種種味能起舌識現在之華未來之果種種法塵隨為彼識所緣境界能起意識今此文中舉塵取識應審觀察彼末那識即是意微細分位無別體耳如是六塵能動心體令使散亂譬如猛風故名為風如經青赤種種色珂乳及石蜜淡味眾華果如是七識及與藏識同耶異耶荅非同非異離二邊故譬如日與光明水與波浪非同非異七識藏識非同非異亦復如是如經日月與光明非異非不異海水起波浪七識亦如是心俱和合生如是七識從何處所來入藏識作七種數流轉起動無斷絕時如是七轉識不從內來不從外來不從中間來唯藏識體變作七識譬如海水變作波浪如經譬如海水變種種波浪轉七識亦如是心俱和合生謂彼藏識處種種諸識轉謂以彼意識思惟諸相如是現識及七轉識八種心識唯有生滅無常相耶亦有實相常住相耶如是八識從無始來三際不動四相不遷真實常住自性清淨不壞之相具足圎滿無所闕少而如是等一切功德同法界故無有二相無二相故唯是一相唯一相故亦是無相皆以無相故無相亦無相九板又華嚴論云𠀍尊於南海中楞伽山法其山高峻下瞰大海傍無門戶得神通者堪能昇往乃表心地法門無修無證者方能昇也下瞰大海表其心海本自清淨因境風所轉識浪波動欲明達境心空海亦自寂心境俱寂事無不照猶如大海無風日月森羅奐然明白此經意直為根熟頓種子業識為如來藏異彼二乗滅識趣寂者故亦為異彼般若修空菩空增勝者故直明識體本性全真便明識體即成智用如彼大海無風即境像便明心海法門亦復如是了真即識成智此經異彼深密經意別立九識接引初根漸令留惑長大菩提故不令其心植種於空亦不令心猶如敗種解深密經乃是入惑之初門楞伽維摩直示惑之本實楞伽即明八識為如來藏淨名即觀身實相觀佛亦然淨名與楞伽同深密經文與此二部少別當知入胎出胎少年老年乃至資生住處若色若空若性若相皆是自識唯佛能知十一板大乗論云又此識皆唯有識都無故此中以何為喻顯示應知夢等為喻顯示謂如夢中都無其獨唯有識雖種種色聲香味觸舎林地山似義影現而於此中都無有由此喻顯應隨了知一切時處皆唯有識夫從心現境結業受生不出三細六麄九相之法如石壁釋云唯一夢心喻如有一人忽然睡著作夢見種種事起心分別念念無間於其違順深生取著為善為惡是親是踈於善於親則種種惠利於惡於踈則種種陵或有報恩受樂或有報怨受苦忽然覺來上事都遣如有一人者即真如一心也忽然睡著者即不覺無明忽起也作夢者最初三細業識相也見者第二轉識相也種種事者第三現識相也起心分別者最初六麄境智相也念念無間者第二相續相也於其違順深生取著者即第三執取相也為善為惡是親是踈者第四計名字相也於善於惡得益者第五起業相也受苦樂報者業繫苦相也忽然覺來上事都遣者即覺唯心得入宗鏡故云佛者覺也如睡夢覺如蓮華開也第五十七卷一板夫楞伽經所明三種識謂真識現識分別事識此中三識於八識中如何分別荅真謂本覺現謂第八餘七俱名分別事識雖第七識不緣外塵緣第八故名分別事真謂本覺者即八識之性經中有明九識於八外立九識名即是真識若約性収亦不離八識以性遍一切處故問但頼耶等八識俗諦已顯云何十一種識又究竟指歸唯一真實性復云何廣略等諸識荅因相顯性非無所以攝末歸本自有端由攝大乗論云若不定明一切法唯有識真實性則不得顯現若不具十一種識俗諦不盡若止前五識唯得俗諦根本不得俗諦差別若俗諦不遍真識則不明了真不明了即遣俗不盡是故具十一種識通攝俗諦是以了俗無性即達真空真空雖空而不壞相俗有雖有𢘆常體虛是知隨緣不有之真諦𢘆不異事而顯現寂滅非無之俗諦𢘆不異真而成立上來所引諸識不出一心宗二板問境不離識識不離境者何只名唯識不名唯境荅雖相生境從識變然古釋境由心分別方生由心生故名唯識識不由境分別生不由境故不可名唯境問心是境家增上緣境假心生名唯識境是心家所緣緣心假境生應名唯境荅離心執境是虚妄為遮妄心名唯識悟心無我出沉淪不約二緣名唯境又有境無境皆是自心其心悉生一若緣有境生心者即是自識相分一切實境不離能緣之心於自識外實無其境二若緣無境生心者如獨生散意緣過去未來空華兔角一切無法時心亦起故四板問覺海澄源一心湛寂云何最初起諸識浪荅雖云識浪起處無從無始無生能窮識性只為不覺忽尒念生猶若澄瀾欻然風起不出不入汹湧之洪浪滔天非內非外顛倒之狂心遍境起信論云以不知真法一故心不相應忽然念動名為無明此是現根本無明最極微細未有能所王數差別故云不相應非同心王心所相應也唯此無明為染法之原最極微細更無染法能為此本故云忽然念起也六板問經明初剎那識異於木石得生染淨各自能為無量無數染淨識本從初剎那不可劫乃至金剛定中一剎那有不可不可識生諸有情色心二法者則有染有淨有生有滅此識約生滅門中有幾種生滅荅真門順性妙合無生𠀍相隨緣似分起盡楞伽經云大慧菩白佛言𠀍尊諸識有幾種生住滅佛告大慧識有二種生住滅非思量所知謂流注生住滅相生住滅古釋云言流注者唯目第八三相微隱種現不斷名為流注由無明緣初起業識故為生相續長劫故名為住到金剛定等覺一念斷本無明流注滅相生滅住者謂餘七識心境麄顯故名為相雖七緣八望六為細具有四惑亦云麄故依彼現識自種諸境緣合生七為相生長劫熏習名為相住從末向本漸伏及斷至七地滿名為相滅依前生滅立迷悟依依後生滅立染淨依後短前長事分二別即是流注生住滅相生住滅是以海水得風變作波濤之相心水遇境密成流注之生前波引後波皷滄溟而不絕新念續念騰心海以常興從此汩亂澄源昬沉覺海六板問宗鏡搜玄云何識荅只為識性幽玄難窮本末唯佛能了下位莫知以無迹無形為萬有之本唯深唯妙作眾聖之原如菩處胎經五道尋識品云尒時𠀍尊將欲示現識所趣向道識俗識有為識無為識有漏識無漏識華識果識無報識天識龍識鬼神阿脩羅迦樓羅緊那羅摩睺羅伽人非人識上至二十八天識下至無救地獄識尒時𠀍尊即於胎中現勾𤨏骸骨遍滿三千大千𠀍界佛告阿祁陀能別此骸骨識耶對曰不別何以故未得通徹行力未至佛告勒菩汝此天中未得神通耶勒白佛言有成就者有不成就者佛告勒汝觀勾𤨏骸骨令一切眾生知識所趣分別决了令無疑滯尒時勒菩即從座起手執金剛七寶神杖攪勾𤨏骸骨聽彼骨聲即白佛言此人命終瞋恚結多識墮龍中次復攪骨此人前身十跡行具得生天上次復攪骨此人前身破戒犯律生地獄中如是攪骨有漏無漏有為無為從二十八天下至無救地獄知識所趣善惡果報白黑行報有一全身舎利無有減尒時勒以杖攪之推尋此識了不知處如是三攪前白佛言此人神識了不可知將非如來入涅槃耶佛告勒汝紹佛位當於來𠀍當得作佛成無上道何以攪舎利而不知識處耶勒白佛言佛不可思議不可限量非我等境界所能籌量今有狐疑唯願𠀍尊當解之五道神識盡能得之彼善惡所趣不敢有疑於如來所今此舎利無有減願此識令我等知佛告勒過去未來現在諸佛舎利流布非汝等境界所能分別何以故此舎利即是吾舎利何能尋究如來神識今當與汝分別如來上中下識菩茫然各各不同初住菩未立根德力雖得神通二住菩以天眼觀知識所趣退不退地亦復觀見欲界色界無色界者或復觀見生東方無數𢘆河沙佛剎供養諸佛奉律無礙亦復知彼受記劫數一劫二劫乃至百千億劫或有菩住於三地觀見舎利知識所趣於有餘涅槃無餘涅槃然復不見四住所行識趣所向四住菩見一見二三住識法然復不見五住舎利識法所趣乃至唯佛知佛神識所念又偈云識神無形法五大以為家分別善惡行去就別真偽識示善道處永到安隱道識為第六王餘大最不如八板問前已廣明識相如何是智荅分別是識無分別是智如大寶積經云佛言所言識者謂能了別眼所知色耳所知聲鼻所知香舌所知味身所知觸意所知法是名為識所言智者於內寂靜不行於外唯依智不於一法而生分別及種種分別是名為智又月燈三昧經偈云不寂者是想寂滅者是智若知想自性便離於諸想若有想可遣是則還有想彼行想戲論是人不離想若人作是心是想誰所起是想誰能證誰能滅是想起想之法者諸佛莫能得即於此處有無我離取著若其心不生何由得起想若心得解脫彼則無由起若證於解脫心則不思議心不思議故成就不思議我本作是念安住心地已弃捨一切心願成不思議白淨法果報覩見於無為一念能了知一切眾生念眾生即是心心即是如來諸佛不思議顯了於此心第五十七卷十一板問十煩惱何識相應荅第八藏識全無第七末那有四第六意識具十前五識唯三古釋云五識但三以無分別故無慢等慢等必由有隨念計度分別生故又由慢於稱量門起劣勝𧴥故疑猶豫簡擇門起見推求門起故立識無此等行相故七識具我癡等四煩惱猶具審决故疑無容起由愛著我瞋不得生無一心王中有二慧故餘見不生隨煩惱有二十釋論云唯是煩惱分位差別等流性故名隨煩惱此二十種類別有三謂忿等十各別起故名小隨煩惱無慙等二遍不善故名中隨煩惱掉舉等八遍染心故名大隨煩惱一忿謂於現在違緣令心憤發為體能障無瞋為業二恨謂於過去違緣結怨不捨為體能障無瞋為業三覆謂於過犯若他諫誨祕所作惡為體能障發露悔過為業四惱謂於過犯若他諫誨便發麄言心暴不忍為體能障善友為業五嫉謂於他所有功德名譽心妬不恱為體能障仁慈為業六慳謂積聚恡著為體能障無貪為業七誑謂惑亂於他現不實事心詭為體能障愛敬為業八為欺彼故詐現恭順心曲為體能障愛敬為業九憍謂恃𠀍間興盛等事心恃高舉無所忌憚為體能障猒離為業十害謂逼惱有情無悲無愍無哀無怜無惻為體能障不害為業十一無慙謂不耻過惡為體能障慙為業十二無愧謂於𠀍增上不耻過惡為體能障愧為業十三昬沉謂令心懵董為體能障毗鉢舎那為業十四掉舉謂依不正尋求心不寂靜為體能障奢摩他為業十五不信謂於有體有德有能心不淨信為體能障信為業十六懈怠謂心不勉勵為體能障發起正勤為業十七放逸謂揔貪瞋癡懈怠為體能障不放逸為業十八失念謂染污不記為體能障不妄念為業十九散亂謂於所修善心不喜樂為依止故馳散外緣為體能障等持業二十不正知謂於三業不正了住染污慧為體能障正知為業第五十八卷一板夫不定有四悔眠尋伺於善染等皆不定故非如觸等定遍心故非如欲等定遍地故立不定名一惡作謂於已作未作善不善事若染不染悵怏追變為體能障奢摩他為業又識論稱悔此即於果假立因名先惡所作業後方追悔故二睡眠謂略攝於心不自在轉為體能障毗鉢舎那為業三尋謂或時由思於法造作或時由慧於法推求散行外境令心麄轉為體能障心內淨為業四伺謂從阿頼耶識種子所生依心所起與心俱轉相應於所尋法略行外境令心細轉為體能障心內淨為業釋云尋即淺推伺即染度尋於麄發言伺則細發語四板古釋云煩惱為能染眾生是所染一即能所不成異即如同水火俱無合止觀云若一念煩惱心起具十法界百法不相妨礙雖多不有雖一不無多不積一不散多不異一不同多即一一即多亦如初燈與暗共住如是明暗不相妨礙亦不相破如是了達煩惱性空則四種瀑流唯正法行日之能竭七重慢阜因平等慧風之所摧能害所害俱消自縛他縛同解逢緣猶蓮華上之水歷事若虚空中之風一切時中常居宗鏡見萬法無異如太虚空因分別識生名色影現分別不起名色本虚向性空地中羙惡平等七板問色法有幾荅有四百法云一識所依色唯屬五根二識所緣色唯屬六境三揔相而言質礙名色四別相而言略有二種一者有對若准有宗極微所成大乗即用能造色成二者無對非極微成即法處所攝色如上地水火風一切色法因緣似有體用俱虚何者自體他體皆悉性空能緣所緣俱無有力以自因他立他因自生他是自他自是他自㸦成㸦奪定性俱無又能因所成所從能立能無有力則入所所無有力則入能㸦攝㸦資悉假施設緣會似有緣散還無以惟識所持終歸空性第五十九卷六板問三性中遍計是妄想即無依他屬因緣是有不荅此二性能所相生俱無自體何者因妄想故立名相因名相故立因緣若妄想不生名相何有名相不有因緣即空以萬法不出名故楞伽頌云譬如修行事於一種種現於彼無種種妄想相如是釋云此破妄想遍計性也如二乗修諸觀行若作青想觀時天地萬物莫不皆青也以無青處見青由心變故於一色境種種不同譬如凡夫妄見生死亦是無生死處妄見生死也又經頌云譬如種種瞖妄想眾色現瞖無色非色緣起不覺然此破因緣依他起性也如目瞖所見差別不同彼實非有緣所起法斯則妄想體空因緣無性即是圎成究竟一法如明眼人見淨虚空况一真心更無所有問此三性中幾法是假幾法是實荅識論云遍計所執妄安立故可為假無體相故非假非實依他起性有實有假聚集相續分位性故為假有心心所色從緣生故為實有若無實法假法亦無假法依實因而施設故圎成實性唯是有實不依他緣而施設故釋云遍計有名無體妄情安立可為假談其法體既無有相非假非實非兔角等可假實必依有體揔別法上立為假實故依他假有三種一聚集假者如瓶盆有情等是聚集法多法一時所集成故能成雖實所成是假二相續假者如過未等𠀍惟有因果是相續性多法多法上立一假法如佛言昔者鹿王今我身是所依五蘊剎那滅者雖體是實於此多法相續假立一有情至今猶在故三分位假者如不相應行是分位性故皆是假一時一法上立如一色上名有漏可見有對亦名色等並是於一法上假施設故若彼實者應有多體其忿恨等皆此假攝心心所色從因緣種生故為實又三性者即是一性一性者即是無性何者遍計無相依他無生圎成無性解深密經云瞖眼人如遍計現青黃如依他淨眼如圎成攝論云分別性如虵依他性如藤若人緣四塵相分扸此藤但見四相不見別藤但是色香味觸相故藤非實有以離四塵外無別有藤所以論偈云於藤起虵知見藤則無境若知藤分已藤知如虵知若知藤之性分是空則例如藤上妄生虵相問我見所緣影像若是依他有者應有依他性實我荅此相仗因緣生但是依他性幻有之法而非是我由彼妄執為我故名妄執此有兩重相約此相從因緣生有力能生心此乃是有名依他性法於此不稱所執法義邊名遍計所執乃名為無如人昬𡨋執石為牛石體不無我見所緣緣依他相有如石本非牛妄心執為牛此所執牛其體全無如相分本非我妄心執為我此所執我其體全無但有能執心而無所執我謂於此石處有所緣石而無所執牛於此相分上有所緣法而無所執我又况云如南方人不識駞毛曾於一處聞龜毛後忽見駞毛由不識故妄謂駞毛以為龜毛此所見駞毛是有故如依他性法其駞毛上無龜毛妄心謂為龜毛如所執實我法故論云有義一切及心所法由熏習力所變二分從緣生故名依他起遍計依斯妄執定實有無一異俱不俱等此二名遍計所執性八板問依他起相但是自心妄分別有理事雙寂名相俱虚云何有憂喜所行境界荅譬如夜行見為鬼疑繩作虵虵之與鬼名體都無性相𢘆寂雖不可得而生怖心以體虚而成事故問三性中幾性不可滅幾性可滅耶荅准佛性論云二性不可滅一性可得滅何以故分別性本來是無故不可滅真實性本來是真故不可滅依他性雖有不真實是故可滅第六十卷一板夫此三性法為當是一是異若道是一不合云依圎是有遍計是無若道是異又云皆同一性所謂無性荅此三性法門是諸佛密意所諸識起處教網根由若即之取之即落凡常之見若離之捨之俱失聖智之門所以藏法師依華嚴宗釋三性同異義一圎成真如有二義一不變二隨緣二依他二義一似有二無性三遍計所執二義一情有二理無由真如不變依他無性所執理無由此三義故三性一際又約真如隨緣依他似有所執情有由此三義亦無異也是故真該妄末妄徹真原性相融通無障無礙五板是以三性無際隨一全収真妄互融性相無礙如來一代時教𢘆沙義門密意揔在三性門中真俗本末一時収盡以顯唯識正理更無異轍以依他性是唯識體從依他起分別即是遍計從依他悟真實即是圎成由分別故一分成生死由真實故一分成涅槃了分別性空即生死成涅槃迷真實性有即涅槃成生死都是一法隨情顯義成三三非三而一理圎一非一而三性具卷舒不失隱顯常如非一非三泯性相於實地而三而一耀行布於義天撮要所歸莫先斯旨第六十一卷三板又立况解自證分見相二分者且如自證分起見相二分更執二分為我法如結巾成兔手巾是有喻自證分結手巾為兔頭手巾上本無兔頭今結出之是故名無如自證分上本無見相二分由不證實故似二分起是故名無如所結手巾為兔頭已是一重假更結出二耳又是一重假如從自證分變起見相二分已是一重假更執二分為我法又是一重假則見相二分雖假似從種生故其我法二執非有是遍計妄執故五板天王般若經偈云揔持無文字文字顯揔持大悲方便力離言文字思益經云汝等比丘當行二事一聖法二聖默然但正時了不可得即是默然不是杜口無故昔人云幻人法幻人聽由來兩箇揔無情時無從君聽處無聽一任聽楞伽經云大慧復白佛言如𠀍尊我從某夜得最正覺乃至某夜入般涅槃於其中間不一字亦不已當不是佛大慧白佛言𠀍尊如來應正等覺何因言不是佛佛告大慧我因二法故作是云何二法謂緣自得法及本住法是名二法因此二法故我作如是云何緣自得法若彼如來所得我亦得之無增無减緣自得法究竟境界離言妄想離文字二趣云何本住法謂古先聖道如金銀等性法界常住若如來出𠀍若不出𠀍法界常住如趣彼城道譬如士夫行曠野中見向古城平坦正道即隨入城受如意樂偈云我某夜得道至某夜涅槃於此二中間我都無所緣自本住故我作如是彼佛及與我悉無有差別釋云此有二因一即緣自得法自所得法即是證道證法在己離過顯德二即緣本住法本住即古先聖道傳古非作此上是據理約證云不若但是自心聞則佛常不七板問但云方便則無妨若約正宗有言傷𣅀荅我此圎宗情解不及豈同執方便教人空有不融通體用兩分理事成隔常住則成常見無常則歸斷滅邊則成邊執存中則著中理今此圎融之𣅀無礙之宗常則無常之常無常則常之無常言空則不空之空言有則幻有之有談邊則即中之邊談中則不偏之中立理則成事之理立事則顯理之事是以卷舒在我隱顯同時不乖於無無不乖於八板勝天王般若經云尒時眾中有一菩名須真𦙘白勝天王言如來為大王受記乎勝天王荅言善男子我受記如夢相又問大王如此受記當得何法荅曰佛授我記竟無所得又問無所得者為是何法荅曰不得眾生壽者我人養育䕃界入悉無所得若善不善若染若淨若有漏若無漏若𠀍間若出𠀍間若有為若無為若生死若涅槃悉無所得又問若無所得何用受記荅曰無所得故則得受記九板問虚妄分別以何為本荅攀緣為本又問何所攀緣荅緣色聲香味觸法又問云何不緣荅若離愛取則無所緣以是故如來常諸法平等是以法平等故無差別此方法十剎皆然即一處遍一切處故所以同證同宣互為主伴若論至理無佛無眾生豈云感應若於佛事門中機應非一若無眾生機諸佛則不應豈可執自執他論內論外而生邊見耶如法華云玄問眾生機聖人應為一為異若一則非機應若異何相交𨵿而論機應荅不一不異理論則同如是故不異事論有機感是故不一譬如父子天性相𨵿骨肉遺體異則不可若同者父即子子即父同又不可只不一不異而論父子也眾生理性與佛不殊是故不異而眾生隱如來顯是故不一不一不異而論應機也又同是非事非理故不異眾生得事聖人得理又聖人得事凢夫有理故論異問為用法身應用應身應若應身應無本何能應若用法身應應則非法荅至論諸法非去來今非應非不應而能有應亦可言法應亦可言應應法應則𡨋益應應則顯益十二板眾生根性百千諸佛巧應無量即是機應不同意也今略言為四一者𡨋應二者𡨋機三者顯機顯應四者顯機𡨋應其相云何若言修三業現在未運身口籍往善力此名為𡨋機也雖不相見靈應而密為法身所益不見不聞而覺而知是為𡨋益也二𡨋機顯益者過去植善而𡨋機已成便得值佛聞法現前獲利是為顯益如佛最初得度之人現在何常修善諸佛照其宿機自往度之即其也三顯機顯應者現在身口精勤不懈而能感降如須達長跪佛往祇洹月蓋曲躬聖居門閫如即行人道塲禮懺能感靈瑞即顯機顯應也四顯機𡨋應者如雖一𠀍勤苦現善濃積而不顯感𡨋有其利此是顯機𡨋益若解四意一切低頭舉手福不虛弃終日無感終日無悔若見喜殺壽長好施貧乏不生邪見不解此者謂其徒功喪計憂悔失理釋論云今我病苦皆由過去今生修福報在當來正念無僻得此四意也第六十二卷一板廣略之教遮表之詮雖開合不同揔別有異然皆顯唯心之旨終無識外之文證若𢘆沙豈唯一二所以法華經偈云知第一寂滅以方便力故雖種種道其實為佛乗又偈云今我亦如是安隱眾生故以種種法門宣示於佛道釋曰知第一寂滅者真如一心是本寂滅非輪迴生滅之滅亦非觀行對治之滅故稱第一於一寂滅之中即無法可敷揚無道可建立為未了者以方便大慈力故雖種種別門異道若尅而論唯但指歸一心佛乗更無餘事今我亦如是者今我與十方佛同證此法悉皆如是以此安樂一切有情示三乗五性種種法門宣揚於唯心佛道二板文所緣唯識所現者汝謂識外所緣我即是內識上所現𠀍親謂識所緣唯識所現乃至佛告慈氏無有少法能取少法無作用故但法生時緣起力大即一體上有二影生更互相望不即不離諸心心所由緣起力其性法尒如是而生心意識所緣皆非離自性者自性即自心法或理體即之所依三板非唯佛教以心為宗三教所歸皆云反己為上如孔子家語衛靈公問於孔子曰有語寡人為國家者謹之於廟堂之上則政治矣何如孔子曰其可也愛人者則人愛之惡人者則人惡之所謂不出圜堵之室而知天下者知反己之謂也是知若定己以徇物則無事而不歸自然取捨忘懷羙惡齊旨九板阿毗達磨經菩成就四智能隨悟入唯識無境即是地前小菩雖未證唯識之理而依佛及見地上菩成就四般唯識之智遂入有漏觀觀彼十地菩所變大地為黃金攪長河為酥酪化肉山魚米等事此小菩入觀觀已即云如是所變實金銀等皆不離十地菩能變之心更無外境既作觀已亦能隨順悟入真唯識理又如勝論祖師為守六句故變身為大石此有實用若定實境者不應隨心變身境為石問且如變大地為金時為滅却地令金種別生為轉其地便成金耶荅唯識鏡云為佛菩以妙觀察智繫大圎鏡智及異熟識令地種不起金種生現以此為增上能令眾生地滅金生名之為變非為便轉地成金又天人鬼魚所見隨業差別但唯境識變若識外別有實境云何隨變木石等亦然又如一羙色婬人見之以為淨妙心生染著不淨觀人觀之種種惡露無一淨處等婦人見之妬瞋憎惡目不欲見以為不淨婬人觀之為樂妬人觀之為苦淨行之人觀之得道無預之人觀之無所適莫如見土木若此羙色實淨四種人觀皆應見淨若實不淨四種人觀皆應不淨以是故知好醜在心外無定也第六十三卷三板諸經要集云夫云罪行妄見境染執定我人取著違順便令自他皆成惡業是以經偈云貪欲不生滅不能令心腦若人有我心及有得見者是人為貪欲將入於地獄是故心外雖無別境稱彼迷情強見起染如夢見境起諸貪瞋稱彼夢者謂實不虚理實無境唯情妄見故五板問若眾生惡業心感現地獄事理即可然且如觀佛心時云何純現地獄荅此略有二一若約理而觀佛之心性本含法界無一塵而不遍無一法而不通二若約事而觀佛唯用救苦為意以物心為心則地獄界全是佛心運無緣慈不間同體所以觀佛心品云佛告大王欲知佛心光明所照常照如此無間無救諸苦眾生佛心所緣常緣此等極惡眾生以佛心力自莊嚴故過筭數劫令彼罪人發菩提心第六十四卷二板論主言外色實無是內識之境者即可然且如他人心是實有豈非自心所緣耶意云且如此人心若親緣得他人心著即離此人心別有心為境若此人心緣他人心不著者即有境而不緣若緣著即乖唯識若緣不著者即何成他心智耶論主荅雖他心非自識境但不彼是親所緣意云雖他人心非此人境若此人親緣他人心即不得若託他人心為質自變相分緣亦有他心智但變相分緣時即不得他人本質但由他人影像相自心上現名了他心即知他心相分不離自心亦唯識意云此人心緣他人心時變起相分當情相分無實作用非如手等執物亦非如日舒光親照其境緣他人心時但如鏡中影似外質現鏡中像亦無實作用緣他人心時亦復如是非無緣他人心體故名了他心非親能了親所了者謂自所變言識之一字者非是一人之識㹅顯一切有情各各皆有八識即是識之自體五十一心所識之相應何獨執一人之識四板問觀他心智者為實知他心為不實知二俱有過荅如前已若立自他於宗俱失此皆約𠀍諦識心外分別故識論頌云他心知於境不如實覺知以非離識境唯佛如實知他心智者不如實知以自心內虚妄分別以為他心以自心意意識雜故如彼佛地如實果體無言語處勝妙境界唯佛能知餘人不知以彼𠀍間他心智者於彼二法不如實知以彼能取境界虚妄分別故此唯是識無量無邊甚深境界非是心識可測量故如上約法相宗若約法性宗先德云知他心者皆如實知審於事實見理實故亦非心外可見亦非無境可知若自他相絕則與眾生心同一體故無心外也不壞所故能知也六板不知外質即佛心故所以諸佛如來隨多心念意能頓了如金剛經云尒所國土中所有眾生若干種心如來悉知華嚴頌云無量億劫勤修學得是無上菩提智云何不於一念中善知一切眾生心此是意圎對如來一念之中皆一時頓應無一不應故名圎對斯乃了心非心方能遍應若心在有無則成隔礙六板問眾生緣佛身時是識所變只如佛緣所化有情身土之時是何所變荅若眾生見佛是有漏轉識所變相分等流色攝若佛緣有情是無漏智所變定果色攝識智雖殊俱不出自心之境並是增上緣力互令心現第六十五卷一板夫能所之見則心境宛然聖人知見如何甄別荅雙照有空不住內外似谷荅聲而絕慮如鏡鑒像而無心妙湛圎明寂而常照故云常在正念亦名正知非是有念有知亦非無念無知有無皆想俱非正知但無念而照名曰正照無知而知名曰正知若唯無念寂而失照若但照體照而失寂並稱不正正在雙行四板問聖人見實相之妙色惑情還見不荅唯見不實不見不實之實如見為賊不見也又如一真空理見成二諦若𠀍人知者名為𠀍俗諦出𠀍人知名第一其所知處未必懸殊其所知境各從心現如瞖目見明珠有纇淨眼觀瑩淨無瑕羙惡唯自見殊珠體本末如一十二板復次四大及造色圍虚空故名為身是中內外入因緣和合生識種身得是種和合作種種事言語坐起去來空六種和合中強名為男強名為女若六種是男應有六男不可以一作六六作一既於地種中無男女相乃至識種亦無男女相若各各中無和合中亦無如六㺃各各不能生師子和合亦不能生無性故十三板佛言從本已來無我無人無有丈夫但是內心見有我人內心起時彼已害我即名為害乃至是中無有一法和合聚集决定成就得名為佛名法名僧名父名母名阿羅漢定可取者第六十六卷二板如人遠行獨宿空亭夜中有一鬼擔一死屍來放亭前復有一鬼從後而來瞋罵其鬼云是我屍何以擔來前鬼復言本是我物自擔來二鬼各以一手爭之前鬼語曰可問此人後鬼即問是誰死人誰擔將來是人思惟此之二鬼皆有大力實語虚語皆不免死我今不應妄語荅鬼便荅後鬼前鬼擔來後鬼大瞋其手足出著地上前鬼愧之取屍補之補之便著臂手足等舉身皆易於是二鬼共食所易活人之身各各拭口分首而去其人思惟父母生身眼見食盡我今此身盡是他肉為有身耶為無身耶如是思惟心懷迷亂不知所措猶如狂人天既明矣尋路而去至前國土見有佛塔凡見眾僧不論餘事但問己身為有為無諸比丘問汝何人耶荅曰我亦不知是人非人即為眾僧廣上事眾僧皆云此人自知己身無我易可化度即語之言汝身本來𢘆自無我但以四大和合聚集計為本身如汝本身與今無異時諸比丘度為沙門斷煩惱盡得阿羅漢是故有時於他人身亦計為我已無我故有時於我謂為他人故文殊問經云有老人夜臥手捉兩𦡀而便問云那得有此兩小兒耶身若有我云何不識謂為小兒故知撗計皆無定實三板王正論偈云如人依淨鏡得見自面影此影但可見一向不真實我見亦如是依䕃得顯現如實檢非有猶如鏡面影四板古師云眾生為善惡而受其報者皆由眾生心識三𠀍相續念念相傳如今𠀍現行五蘊猶前𠀍識種為因起今𠀍果今𠀍有作業熏種而為來𠀍現行因展轉相續為因果故十板大涅槃經云外道先尼言瞿曇若無我者誰見誰聞佛言善男子內有六入外有六塵內外和合生六種識是六種識因緣得名善男子譬如一火因木得故名為木火因草得故名為草火乃至眾生意識亦復如是因眼因色因明因欲名為眼識善男子如是眼識不在眼中乃至欲中四事和合故生是識乃至意識亦復如是七板問既無我無人云何有生有死荅但生是空生死是空死畢竟無有我人可得如經云一切𠀍間法唯因果無人但是依空法還生於空法是知眾生界中但有名數名數本空萬法何有第六十六卷十一板夫外計內執我者皆於地水火風空識六大種中及身內識煖息三事等起執今觀六大三事內唯是識之一大𠀍多堅執以為實我今只用於內外三𠀍中推自然無我無識且內外推者只如執識實在身內者且何者是識若言推破云云四大各離唯是空大何者是識十三板凡夫迷夢怕怖生老病死二乗偏見猒離成住壞空若頓悟之時不猒不怖全將生死法度脫於群生以生死性空故如釋迦如來不離不著生則王宮降誕演獨尊之文老則壽八十年示遷壞之法病則背痛偃臥警泡幻之身死則示滅雙林顯無常之苦令小根者悟其遷變俾大噐者頓了圎常故知生老病死之中盡能發覺行住坐臥之內俱可證真豈同怖猒凡小之見乎第六十七卷三板如緣真如作有如解即是法執若作無解雖不稱如仍因成聖釋曰若作如解即是法執者若起能解之心即立所證之理所境既立迷現量心知解纔生便成比量皆為法執失唯識宗所以華嚴經云智外無如為智所入如外無智能證於如則心境如如一道清淨三板問涅槃經佛有真我佛性之理諸菩等皆伸懺悔我等無量劫來常被無我之所漂流今廣無我者莫不違涅槃之教不荅今言無我者謂破凡夫外道迷唯識理妄執心外實有我法如外道所執略有三等一僧佉等執我體常周遍量同虚空隨處造業受苦樂等二尼𠃵子執我其體雖常而量不定隨身大小有卷舒故三遍出執我體常至細如一極微潛轉身中作事業故餘九十種所計我等不異此三故此等妄執俱無道理唯成五見之邪思豈同四德之真我涅槃經云如出𠀍人之所知者名第一義諦𠀍間人知者為𠀍諦仁王經云於解常自一於諦常自二所以人王雖分二諦智照常一涅槃本唯一諦解惑分二斯則二而不二不二而二一二自在為真二諦故昔人頌云二諦並非雙𢘆乖未曾各即其義也
