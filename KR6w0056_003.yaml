body:
  text: 黃龍庵主祖心集十板夫經論異悉是如來善權方便知根知欲種種不同略有三異一謂隨情二隨情智三隨智隨情者情性不同隨情異如毗婆沙明𠀍第一法有無量種真際尚爾况復餘耶如順盲情種種示乳盲聞異而諍白色豈即乳耶衆師不達此意各執一聞自起見諍互相是非信一不信一浩浩亂哉莫知孰是若𠀍三及能破者有經文證皆判是隨情二諦意耶無文證者悉是邪見謂同彼外道非二諦攝也隨情智者情謂二諦二皆是俗若悟諦理乃可為真真則為一如五百比丘各身因身因乃多正理唯一經云𠀍人心所見名為𠀍諦出𠀍人心所見名第一義諦如此者即隨情智二諦隨智者聖人悟理非但見真亦能了俗如眼除瞙見色見空又如入禪者出觀之時身虛心豁似輕雲藹空已不同散心何况悟真而不了俗毗曇云小雲發障大雲發障無漏逾深𠀍智轉淨故經偈云凡人行𠀍間不知𠀍間相如來行𠀍間明了𠀍間相此是隨智二諦也若解此三意將尋經論雖種種於一一諦皆備三意也第六十八卷六板問𠀍間依想建立有為之法皆虛俗諦從識施為無體之門盡偽且如聖教文句能詮乃廣長舌相之所宣妙觀察智之所演云何俱稱不實咸是虛耶答諸聖演教談詮是依𠀍俗文字所以佛告三乘學者只令依義不依語權藉教以明心是以文字俱無自性亦從識變廣百門論云然諸𠀍間隨自心變為有衆字和合為名復謂衆名和合為句謂此名句能有所詮能詮所詮皆自心變諸心所變情有理無聖者於中如實知見云何知見謂彼法皆是愚夫虛妄識心分別所作假而非實俗有真無隨順𠀍間權為有八板西域記第七云昔有隱士結廬併迹博習伎藝究極神理能使瓦礫成寶人畜變形但未能馭風雲陪仙駕圖考古更求仙法遂得求仙方云將欲求仙當築壇場命一烈士按長劒立壇隅併息絶言自昏達署求仙者壇中而坐按長劒頌神呪收視返聽達署登仙既得此方數年之間求烈士不得後遇一人先為人傭力艱辛五載一且違失遂被笞辱又無所得悲號巡路隱士見命數加優贈烈士欲求報效隱士曰我歷多年幸而遇會奇貌應圖非有他故願一且不語耳烈士曰死尚不辭何况不語於是隱士立壇受仙依事行之日暮之後各思其事隱者誦呪烈士按劒俟將曉矣烈士忽然大叫時空中火下煙𦦨雲蒸隱士疾引此人入池避難問曰誡子無聲何乃驚叫烈士曰受命之後至夜昏然若夢見昔所事主人躬來至傍感厚恩而不語被打振怒而見致害遂要託生南印土大婆羅門家受生乃至出胎苦厄被受荷恩不語洎乎受生子每念前恩而不語闔家親戚咸見怪矣年過六十而有一子其妻謂曰汝若不語我殺汝子我自懷念今已隔生唯有一子寧忍令煞因止其妻遂發此言隱士曰我之過也被魔所撓烈士感激其事忿恚而死故知睡夢與覺所見唯心延促之時不離一念九板遠近𠀍界佛及衆生三𠀍一切事物莫不於一念中現何以故一切事法依心而現念既無礙法亦隨融是故一念即見三𠀍事物顯然所以經偈云一念普觀無量劫無去無來亦無住如是了知三𠀍事超諸方便成十力又云始從一念成終劫悉從衆生心想生一切剎海劫無邊以一方便皆清淨第六十九卷三板問何因界唯十八答雜集論云由身具等能持過現六行受用性故身者謂眼等六根具者謂色等六境過現六行受用者謂六識能持者謂六根六境能持六識所依所緣故過現六識能持受用者不捨自相故當知十八以能持義故名界九板十八界中皆因意識建立根本立處尚空所生枝末何有既無處所可得又無界分可慿事誑理虛情危執劣惡見之根株盡拔妄識之巢齊傾獨朗真心圎周法界十一板楞嚴經云性火真空者古釋云性是本覺性火是本覺火皆是衆生心變如第六識心熱遍身即狹若第八識中變起即遍同法界悟法界性皆是我心中所變之火十五板其妄最初因自心動有風因執有金因愛有水因求有火皆是自心變起四大還自分別結業受生故非他纍覺明為咎者由強覺了本體明為咎則無知覺明有知明覺如人見不淨便生猒心由分別故以豬狗見便生淨想皆由強覺無明但無分別妄見唯見法性淨土第七十卷四板問𠀍間無有一法不從緣生具幾因緣能生萬法答曾無心外法能與心為緣但是自心生還與心為相義海云明緣起者如見塵時此塵是自心現由自心現即與自心為緣由緣現前心法方起故名為緣起法也經云諸法從緣起無緣即不起乃至則知塵體空無所有今悟緣非緣起無不妙但緣起體寂起恆不起達體隨緣不起恆起如是見者名實知見何謂實知見若見緣而不見體即是常見若見體而不見緣即是斷見今從因緣而見性則不落常於真性中而緣起則不墮斷見名實知見所以廣辨因緣行相者謂因事而顯理令理不孤因理而成事令事融即然第七十一卷十板若起一念善如將甜種子下於肥田內或生一念惡似植苦種子下向瘦田中以水土因緣時節際會則抽芽布葉次第而生華發果成積漸而熟此染淨種子異熟亦然若作善因下人天之樂種或興惡行生四趣之苦田靡起善惡因終無苦樂報不下粗好種豈有華果生故知因果相酬唯識變定如鏡現像似影隨形無有影而不隨形無有鏡而不現像斯則無有作而不受報無有果而不酬因法爾如然𠀍所共悉唯有不作者業果定難羈但了一心宗諸緣皆䪺息是以了唯識理無所用心終不妄興三界業果以唯識變定故懼業之人方能信受如前定録云昔晉韓公滉之在中書也嘗召一吏不時而至怒將鞭之吏曰某別有所屬不得遽至晉公曰宰相之吏更屬何人吏曰某不幸兼屬隂官晉公以為不誠怒曰既屬隂司有何所主吏曰某所主三品已上食料晉公曰若然某明曰當以何食吏曰此雖細事不可顯言乞疏於紙過後為驗乃如之而繫其吏明旦遽有詔命既對適遇太官進食糕糜一器上以其半賜晉公晉公食之美又以賜之既退而腹脹歸于私弟召醫視之曰食物所壅冝服少橘皮湯至夜可飲漿水明旦疾愈思前吏言召之視其書云明晨相公只食一飣半糕糜橘皮湯一碗漿水一甌則皆如其言公固復問人間之食皆有籍耶答曰三品已上日支五品已上有權者旬支無則月支凡六品至一命皆季支其不食祿者年支耳故知飲啄有分豐儉無差所謂玉食錦袍鶉衣藜藿席門金屋千駟一瓢皆因最初一念而造心迹才現果報難逃以過去善惡為因現今苦樂為果絲毫匪濫孰能免之猶響之應聲影之隨形此必然之理也唯除悟道定力所排若處幻𠀍之中焉有能脫之者第七十二卷七板問般若無相不受一塵云何廣辨四緣及諸因果答夫佛道正法皆從緣生故云心法四緣生色法二緣起若執不從緣生者皆非正法悉屬外道自然邪見且心之一法若無第一因緣者無有親生現行果之義則諸法不成立若無第二等無間緣者則無開導引後生無有相續全成間斷若無第三所緣緣者則心無所慮處不能牽心用心無所託乃心境俱成斷滅若無第四增上緣者雖具前三緣若無增上即成障礙法亦不生四緣具足方成心法若能明了𠀍間因緣所生之法方乃見無生之旨以即生法達無生故且生法尚不知正因云何能了無生妙理第七十三卷一板問一切𠀍間因果相酬生死不絶於諸識中何識為主答生滅因緣最初依阿賴耶識為體以意識為用如是三𠀍因果流轉不絶功在意識以是義故意名相續識三板問生滅因緣別以何為因以何為緣而得生起答古師釋云生滅因緣體相有二阿賴耶心體不守自性變作諸法是生滅因根本無明熏動心體是生滅緣又復無明住地諸染根本起諸生滅故為因六塵境界能動七識波浪生滅是生滅緣依此二義以顯因緣諸生滅相聚集而生故名衆生而無別體唯依心體故言依心即是阿賴耶自心相也四板問生滅門中有漏位內約教所論有幾種生死答略有二種一分𫨻二變易識論云一分𫨻生死謂諸有漏善不善業由煩惱障緣助勢力所感三界粗異熟果身命短長隨因緣力有定劑限故名分𫨻二不思議變易生死謂諸無漏有分別業由所知障緣助勢力所感殊勝細異熟果由悲願力改轉身命無定劑限故名變易無漏定願正所資感妙用難惻名不思議或名意生身隨意願成故如契經如取為緣有漏業因續後有者而生三有如是無明習地為緣無漏業因有阿羅漢獨覺已得自在菩三種意生身亦名變化身無漏定力轉令異本如變化故八板若未觸途成觀諦了自心皆對境生疑執有前法一切生死盡是疑情但了唯心自然無咎若疑蛇得病豈有實境居懷猶懸砂止飢但是自心想起九板問生死之法是有是無答曰非有非無何者若言是有一身內外地水火風各各性空未曾聚散所以無生之生可為生無滅之滅可為滅如菴提女師子吼了義經云若能明知地水火風四緣畢竟未曾自得有所和合而能隨其所冝有所者是為生義乃至若能明知地水火風畢竟不自得有所散壞而能隨其所冝有所者是為死義若言是無以染淨真如不守自性不覺隨緣起幻生滅故云法身流轉五道號曰衆生如上所明凡聖二種生死須知生死中道方離斷常是以生之無生真性湛然無生之生業果宛然真性湛然不可執常業果宛然不可執斷又復諸佛出𠀍尚如空華亂生亂滅况衆生顛倒生死但如妄夢如狂醉豈是實耶第七十四卷三板般若燈論偈云生死有際不佛言畢竟無此生死無際前後不可得如般若經云復次極勇猛如涅槃無際一切法亦無際何者生死以涅槃為際涅槃以生死為際既不得生死亦不得涅槃生死涅槃既不可得則一切法悉無際如是但了本覺一心念念契圓常之道若逐無明散意塵塵成生死之輪得失在人法無邪正取捨任己道絶升沉但自內觀躡普門而頓入唯當正眼履一道以圎成四板經偈云非空非海中非入山石間無有地方所脫之不受業唯除不作則無果得道則業亡如氣歔旃陀羅造惡業而得生天鴦掘魔羅作逆罪而得解脫果是知受身已來無有不作業者設今生不作過去曾為但悟此宗無不解脫九板問於中有身處中有住及欲趣生時行相如何答準二十四不相應行中有勢速一法於勢速中有士用勢速古釋云士用勢速者如中有身往當受生處迅疾名士用勢速所言中者對前後以得名有則有其情識身為此五趣有情身在死有後生有前兩形中間故名中有亦以異熟五蘊為體為同本有身是業招故其中有身便如當生本有身形狀如人中有似於人等五趣亦爾但如五六歲等孩兒大其形量雖小然諸根猛利如本有身能作諸事業於父母起顛倒想而生愛惡此中有身唯同類及淨天眼者見於中有中唯食香氣在中有住時其不善不惡中容性者在中有位極受生不過四十九日劑此無有緣不會者第七十五卷五板顯識經云佛告賢護識之自性遍入諸處不為諸處之所染污六根六境五煩惱蔭識遍止之不為其染由此而顯識之事用賢護如木機𨵿繫執一所作種種業或行走騰躍或跳躑戲舞於意云何機𨵿所作是誰之力賢護白佛言智慧狹淺非所能了佛告賢護當知皆是作業之力作業無形但智運耳如是身之機𨵿以識之力作諸事業仙通𠃵闥婆龍神人天阿修羅等種種趣業咸悉依之識能生身如工作機𨵿識無形質普持法界智力具足乃至能知宿命之事七板問外之境色因識分別故名唯識只如夢中無境唯識云何夢中識見種種答顯識經云佛言賢護色有二種一內二外內謂眼識眼則為外乃至身識為內身則為外賢護如生盲人夢見美色手足面目形容姝麗便於夢中生大愛恱及睡覺已無所見乃至此生盲人未曾見物云何夢中而能見色賢護白佛言惟願開示佛告賢護夢中見者名內眼所是慧分別非肉眼見其肉眼所以念力故盲者夢中須而現復以念力覺而憶之識之內色亦復如是故於所見唯識聞嗅嘗觸亦然見有境界但是念慧分別若離念慧分別決定無有前塵毫末之相八板顯識經云大藥白佛言云何識離於身便速受身識捨故身新身未受當爾之時識作何相佛言大藥如有丈夫長臂勇健著堅甲胄馬疾如風乘以入陳干戈既交心亂墜馬武藝徑捷還即跳上識棄於身速即受身亦復如是又如怯人見敵怖懼乘馬退走識資善業見天父母同座而座速託生彼亦復如是大藥如汝所問識棄故身新身未受當爾之時識作何相大藥譬如人影現於水中無質可取手足面目及諸形狀與人不異體質事業影中皆無無冷無熱及與諸觸亦無疲乏肉𫨻諸大無言苦樂之聲識棄故身新身未受相亦復如是九板般若燈論云言從死有相續至生有時如授經如傳燈如行印如鏡像現如空聲響如水中日月影如種子生芽如人見酸口中生涎如是後蔭相續起時無有中蔭往來傳此向彼是故智者應如是解故知識託業現境逐心生刃利刀山誰人鍛鍊華含德水非彼開敷辨果知因見末識本故云心能作佛心作衆生心作天堂心作地獄心異則千差競起心平則法界坦然心凡則三毒縈緾心聖則六通自在心空則一道清淨心有則萬境縱撗如谷應聲語雄而響厲似鏡像形曲而影凹以知萬行由心一切在我內虛外終不實外細內終不粗善因終值善緣惡行難逃惡境蹈雲霞而飲甘露非他所授臥煙焰而噉膿血皆自能為非天之所生非地之所出只在最初一念致此升沈欲外安和但內寧靜心虛境寂念起法生水濁波昏潭清月朗修行之要靡出於斯可謂衆妙之門群靈之府升降之本禍福之原但正自心何疑別境第七十六卷一板夫論一期真妄生死約事而言還有終始不答第一義中尚無生死何有始終順𠀍諦門中隨衆生見而妄生死如古德云真妄相循難窮初後者釋云若言先妄後真真則有始若謂先真後妄妄由何生若妄依真起真亦非真若妄體即真則妄亦無始為破始起立無始言始既不存終從何立無始無終豈有中間三板華嚴經云佛子菩有十種魔何等為十所謂蘊魔生諸取故煩惱魔恆雜染故業魔能障礙故心魔起高慢故死魔捨生處故天魔自嬌縱故善根魔恆執取故三昧魔久耽味故善知識魔起著心故菩提法智魔不願捨離故是為十菩摩訶應作方便速求遠離疏釋云一蘊魔者身為道器體與佛同豈即是魔蘊魔之名特由取著下九例爾五板今且觀心王置於心所則一念心十界三科如丈一界五蘊如尺唯在識心如寸若達心具一切法已方能度入一切色心如一一尺無非是寸及一一丈無非是尺是故丈尺全體是寸故知若真諦若俗諦若有為若無為一剎一塵無非心矣今宗鏡撮其樞要蓋為斯焉分𫨻生死從正使有即是凡夫變易生死從習氣生即是二乘雖斷正使不斷習氣於中有二一煩惱習氣二業習氣一煩惱習氣者如難陀有欲習往昔數生身為國王習近五欲故舍利弗有瞋習往昔數生曾受蝎身畢陵伽婆蹉有慢習往昔數生身是大婆羅門博學多才我慢輕物乃至槃特比丘有癡餘習等二業習氣者如牛呞比丘往昔是牛身林間奔走觸著遺棄故破袈裟以是因緣雖獲道果以業習故使之然也又如迦葉聞琴起舞阿難常好歌吟俱以往昔曾為樂人以業習之餘故若煩惱餘習是變易緣有業餘習是變易因感變易生死即是果報此二乘人未得如來一心三點涅槃於無學位雖見修惑盡所有無知皆是無明之餘習亦名無明住地亦名所知之障亦名塵沙無知又菩約化門有十種習氣華嚴經離𠀍間品云佛子菩摩訶有十種習氣何等為十所謂菩提心習氣善根習氣教化衆生習氣見佛習氣於清淨𠀍界受生習氣行習氣願習氣波羅蜜習氣思惟平等法習氣種種境界差別習氣是為十若諸菩安住此法則永離一切煩惱習氣得如來大智習氣非習氣智故知染淨二業升沉兩門皆從熏習而生不是無因而得應須勤修白業淨法時熏念念功夫自成妙果所以一一衆生八識藏中各具十法界種子本自具足非從新生雖常內熏須假外緣熏發若聞十惡熏發三塗種子若聞戒善熏發人天種子若聞諦緣熏發二乘種子若聞六度熏發菩種子若聞一乘熏發諸佛種子各隨習熟濃厚處先發如今多習三塗種子人天尚少豈况佛乘然地獄現行時佛種子亦不沒只是轉更賖遠如今既在人天直須努力常親知識樂聽一乘內外資熏一生取辦故佛誡羅睺羅頌云十方無量諸衆生念念已證善誓果彼既丈夫我亦爾何得自輕而退屈十板法華經偈云更以異方便助顯第一義又云唯此一事實即是無作一實諦也以真如之性是自心之實名一實諦念念圎成更何所作名無作四諦所以八千聲聞於法華會上見如來性如秋收冬藏更無所作以達本故法爾如斯若未見性人不可安然拱手俲無作無修直須水到渠成自然任運故又但了一心自然無作非是強為故云蔭入皆如無苦可捨無明塵勞即是菩提無習可斷邊邪皆中正無道可修生死即涅槃無滅可證無苦無集故無𠀍間無道無滅故無出𠀍間純一實相實相外更無別法第七十七卷五板問一念無明心起十二有支為自生他生共生無因生答緣起甚深非四句能測了則一心𡨋寂迷則六道輪回非妄非真不常不斷若云是妄妄不可得若云是真復能流轉若云是斷相續恆生若云是常念念起滅所以從心生故生無能生無有定性六板問萬境無明與一心法性為是一為是二若是一不合分染淨二名若是二云何教中無明即法性答體一是真名二是假名因情立真以智明情智自分真原不動不可定同不壞𠀍諦故不可定異不失真諦故涅槃經云明與無明愚人為二智者了達其性無二無二之性即是實性六板問三界初因四生元始莫窮本末罔辨根由莊老指之為自然周孔詺之為混沌最初起處如何指南答欲知有情身土真實端由無先我心更無餘法謂心法剎那自類相續無始時界展轉流來不斷不常慿緣慿對非氣非稟唯識唯心肇論鈔云老子云無名天地之始有名萬物之母若佛教意則以如來藏性轉變為識藏從識藏變出根身器𠀍間一切種子推其化本即以如來藏性為物始也無生無始物之性也生始不能動於性即法性也八板經論有二種覺一性覺二本覺又有二種般若一本覺般若二始覺般若又有二種心一自性清淨心二離垢清淨心又有二種真如一在纏真如二出纏真如此四種名隨義異體即常同今一切衆生只具性覺清淨本覺自性清淨心在纏真如等於清淨本然中妄忽生於山河大地以在纏未離障故未得出纏真如等若十方諸佛二覺俱圎已具出纏真如等無有妄想塵勞永合清淨本然則不更生山河大地諸有為相等十板佛證真際實不見明若見於明即是所明既立所明便有能覺但除能所之明方稱妙明此妙之明是不明之明不同所明因明起照故般若無知論云難曰聖智之無惑智之無俱無生滅何以異之耶答聖智之無者無知惑智之無者知無其無雖同所以無者異也何者夫聖心虛靜無知可無可曰無知非謂知無惑智有知故有知可無可謂知無非曰無知也第七十八卷一板夫言一覺一切覺云何教中分其多種答覺體是一隨用分多用有淺深覺無前後如瓔珞經云妙覺方稱照寂等覺照寂又覺有三義一覺察如睡夢覺亦如人覺賊賊無能為妄即賊也二覺照即照理事也亦如蓮華開照見自心一真法界恆沙性德如其勝義覺諸法故三妙覺即上二覺離覺所覺故為妙耳非更別覺故經云無有佛涅槃遠離覺所覺又覺性無覺即根本智覺相歷然即後得智二板有情無情究其初原皆不出一心本際如法性論云問本際可得聞乎答理妙難觀故有不知之旨微罕見故發幢英之問有天名曰幢英問文殊師利所言本際為何謂乎文殊師利答曰衆生之原名曰本際又問衆生之原為何謂乎答生死之本為衆生原又問於彼何謂為生死本答曰虛空之本為生死原幢英於是抱玄音而輟問始悟不住之本若然則因緣之始可聞而不可明可存而不可論問虛空有本乎答無問若無有本何故云虛空之本為生死原答此猶本際之本耳則於虛空無本為衆本之宗化表無化為萬化之府矣三板問內外唯識心境皆空云何教中又立外相答因了相空方談唯識若執有相唯識義不成若執無相則真空理不顯以無相即相方達真空相即無相始明唯識四板攝論云如觀行人定中所見色相境界識所顯現定無境界此青等色相是定境非所憶持識憶持識有染汙此起現前所見分明清淨則唯識之旨於此彰如依鏡面但有自靣無有別影何以故諸法和合道理難可思議不可見法而令得見定心亦爾定心有二分一分似識一分似塵此二種實唯是識若憶持識是過去色此定中色若在散心五識可言緣現在外塵起若散意識緣過去塵起若在觀中必不得緣外色為境色在現前又非緣過去境當知定心所緣色即見自心不見別境以定中色比定外色應知亦無別境是知一心即萬法萬法即一心何者以一心不動舉體為萬法故五板問既稱唯有識何得立色名答一切名皆是客義名中無法法中無名名不當法法不當名經云是自性無生無滅無染無淨此色無所有為通相若有生即有染若有滅即有淨由無此四義故色無別相六板問論唯有內心實無外境者如修十善業受天堂樂作五逆罪受地獄苦升忉利則五欲恱目墮泥𥠖則萬苦攢身恱目有靈鳳翔鸞作歡樂之事攢身有鐵蛇銅狗為逼惱之殃明知非但內心實有外境答天堂地獄苦樂之相皆是自心果報業影既以自心所作為因還以自心所受為果故經云未有自作他受今且約地獄界受苦以證唯心十法界中例皆如是識論問云何名為四大轉變彼四大種種轉變動手腳等及口言令受罪人生於驚怖如有兩羊從兩邊來共殺害彼地獄衆生見有諸山或來或去剎害衆生以是故不得言唯有內心無外境界答曰偈言若依衆生業四大如是變何故不依業心如是轉變汝向言彼罪人業外四大等如是轉變何故不言依彼衆生罪業力故內自心識如是轉變又偈言業熏於異法果云何異處善惡熏於心何故離心故偈言業熏於異法果云何異處者此以何彼地獄中受苦衆生所有罪業依本心作還在心中不離於心以是故惡業熏心還應心中受苦果報何以故以善惡業熏於心識不熏彼外四大等以四大中無所熏事云何虛妄分別言四大轉變於四大中受苦果報是故偈言善惡熏於心何故離心九板問地獄既是非情云何動作答是有情不思議業力所感令受罪衆生自見有如是事如成劫風雖是無情亦能成劫如磁毛石豈有識想令鐵轉移設使衆生輪回六趣善惡升沉實無主宰人法俱空所以先德云往復無際動靜一原含衆妙而有餘超言思而逈出者其唯法界乎問凡所施為皆是自心者云何殺生而得殺罪也答曰皆是依於自心分別強執善惡之因妄受苦樂之果若究三輪之體能殺所殺本空十一板問經中所云一切法如夢以證唯心者云何夢中事虛窹中事實果報不等法喻不齊云何引證答所伸譬況皆為不信之人假此發明所以智不難喻但求見道證會自心何用檢方便之詮執圎常之理此夢喻一法證驗最親識論答外難云汝言夢中所見飲食飢飽刀杖毒藥如是等事皆悉無用窹時所見如是等事皆悉有用此義不然頌云如夢中無女動身失不淨如夢交會漏失不淨衆生如是無始𠀍來虛妄受用色香味等外諸境界皆亦如是實無而成又問若夢中無境窹亦爾者何故夢中窹中行善惡法受與不受果報不等答唯有內心無外境界以夢窹心差別不同是故不依外境成就善不善業是以在夢位心由睡眠壞勢力羸劣心弱不能成善惡業覺心不爾故所造行當受異熟勝劣不同非由外境設覺中所受苦樂實果報亦無作者受者悉如幻夢第七十九卷一板夫心外無法法外無心如是了知則真善知識一心妙理圎證無疑何故聞外善惡知識而生聽受答皆是增上因緣和合虛妄分別而成彼此情生無有真實識論問云何故遇善知識聞善法值惡知識聞惡法若無一切外境者彼云何若不者云何得聞若不聞者此云何成偈答帶共增上因彼此緣心合以一切衆生虛妄分別思惟憶念彼我聞而實無有彼前境界是以若執內外則心境對治尚未入於信門何乃稱於聽法三板問若約見聞外境則色不至眼眼不至色可謂唯心無相可得只如飲噉之時根境相入若言無相不可以心喫心答六根六境雖則離合不同皆唯識變味性本空若非是識誰知醎淡古師云只喫相分本質自在問如喫了質亦亡如何答能隨既亡所隨亦滅如二十人共一株樹一人伐之十九人所隨亦滅又唯識義鏡釋云共果同在一處不相障礙者問且如一樹有情共變而一有情伐用之時為用自變為兼用他若唯自者餘人變者應存不亡樹何不見若亦用他何名唯識答有云樹等既是共相種生皆相隨順互相增益彼一有情自所變者所緣親用他所變者與自所變為增上緣亦踈緣用一切相望自為所順他為能順由所順無能順亦滅由斯樹喪唯識亦成問何以得知互相增益答對法論云有情共業為增上緣六板大乘本生心地觀經云爾時佛告勒菩摩訶言汝善男子當修學者但有一德是人應住阿蘭若處求無上道云何為一謂觀一切煩惱根原即是自心了達此法堪能住止阿蘭若處七板問內外唯心是平等理云何身土不同內身有覺外境無知答𠀍界身土法爾如然不可執一執異自生情見若言法爾者即法如是或云法性者若是法性即以本識如來藏身為所依持恆䪺變起外諸器界不出此二一法應如是二藏識變起又衆生業力亦菩萬行為因等所現世界皆是藏識相分相分之中半為外器而不執受半為內身執為自性生覺受故如來藏識何緣如此法如是故行業引故上雖分執受不執受二義俱無自性全以佛法界如如一真心為體當知依即正正即依不出一心真性矣八板問世人多執有情動作有識無情不動作無識且如葵藿向日而轉芭蕉聞雷而生橘得尸而敷榮鐵因石而移動又如麴發酒醋火山林此等皆是無情云何動作答有情無情各有二義若有情生死一是衆生業力所為二是法界性自然生若無情轉動一是異法性自爾二是法作故知法法無心塵塵本寂寂而常用用而常寂法無心而隨緣成壞人無心而諸行遷流如芭蕉聞雷葵藿向日無明不取諸行諸行不吸識心則法法不相到法法不相知法法不相待法法不相借皆性自爾故法法如是故是以金剛三昧經云心不生境境不生心何以故凡所見境唯所見心即不相到也華嚴經頌云諸法無作用亦無有體性是故彼一切各各不相知即不相知也維摩經云一切法生滅不住如幻如電諸法不相待乃至一念不住即不相待也寶藏論云火不待日而熱風不待月而涼堅石處水天鼓遊光明暗自爾乾濕同方物尚不相借豈况道乎即不相借也如火以熱為性風以涼為性豈假藉他緣乎天鼓者日也常遊光照四天下日出即明日沒即暗皆是法爾非𨵿造作堅石處水者石雖處水水不入石雖同一處石自乾而水自濕故知法法標宗塵塵絶待則非因緣亦非自然矣十板華嚴經頌云世間種種法一切皆如幻若能如是知其心無所動諸業從心生故説心如幻若離此分別普滅諸有趣譬如工幻師普現諸色像徒令衆貪樂畢竟無所得世間亦如是一切皆如幻無性亦無生示現有種種度脫諸衆生令知法如幻衆生不異幻了幻無衆生衆生及國土三世所有法如是悉無餘一切皆如幻幻作男女形及象馬牛羊屋宅泉池類園林華果等幻物無覺知亦無有住處畢竟寂滅相但隨分別現菩能如是普見諸世間有無一切法了達悉如幻衆生及國土種種業所造入於如幻際於彼無依著如是得善巧寂滅無戲論住於無礙地普現大威力十三板即有之空方為具德之空即空之有方為具德之有又盡有之空盡空之有方為具德又四句齊照成解境故四句齊泯成行境故皆言忘慮絶方為具德耳所以昔人云巫山臺上託雲雨以去來舒姑水側寄泉流而還往故知聚沫之身非有如幻之心本空豈有欲情而成實事十四板問一切法如幻云何有垢淨能所對治答只為如幻故垢淨不定由心廽轉凡聖法生故思益經云垢法説淨見垢實性故淨法説垢貪著淨相故又莊嚴經論云問若諸法同如幻以何義故一為能治一為所治偈答云譬如強幻王令餘幻王退如是清淨法能令染法盡第八十卷二板問若一切法皆空如化何以故有種種説法別異答曰如佛所化及餘人所化雖不實而有種種形相別異夢中所見種種亦如是人見夢中好惡事有生喜者有生怖者如鏡中像雖無實事而隨本形像有好醜諸法亦如是雖空而各各有因緣如佛此中説於是化法中有聲聞變化有辟支佛變化有菩變化有佛變化有煩惱變化有業變化又云如化者化主無定物但以心生便有所作皆無有實人身亦如是本無所因但從先世心生今世心身皆無有實以是故諸法如幻化問凡有相法皆從變化心無形相云何化現答心本是化理不思議從心現心如化起化佛地論云心化唯二一自身相應謂自心上化現種種心及心法影像差別二他身相應謂令他心亦現種種心及心法影像差別此並相分似見分現有定力能令自心解非分法名化自心加被有情令愚昧者解深細法令失念者得正憶念名化他心七板經云三世佛種以無性為性一切處隨了無性即為佛性不以有性故有不以無情故無今獨言有情者遍世勸人為器常於一毛一塵之處明見一切理事無非如來性是開如來性起功德名為佛性是知六道四生山河大地情與非情皆同一性如世尊最後垂示應盡還原品三告之文經云𠇍時世尊如是逆順入諸禪已普告大衆我以甚深般若遍觀三界一切六道諸山大海大地含生如是三界根本性離畢竟寂滅同虛空相無名無識永斷諸有本來平等無高下想無見無聞無覺無知不可繫縛不可解脫無衆生無壽命不生不起不盡不滅非世間非非世間涅槃生死皆不可得二際平等諸法如故十一板佛佛性生五種功德一起正勤心二生敬事三生般若四生闍那五主大悲由五功德能翻五失由正勤故翻下劣心由恭敬故輕慢意由般若故妄想執由生闍那俗智能顯實智及諸功德故謗真法由大悲心慈念平等故我執乃至由般若故不捨涅槃由大悲故不捨生死由般若故成就佛法由大悲故成就衆生是以若了一切衆生皆有佛性自然不謗不慢無失無違何者以衆生妙故皆不可思議故十二板慧眼所見無法可見故名為見者見法空故名為慧眼非獨慧眼能見五眼俱現如是五眼照如千日十方之中無𠁅不見於一眼處地平如掌無諸穢惡若有可見即是生盲何以故無所有故當知無空色空俱遣十三板問佛眼者皆是圎修圎證方具十住菩尚未分明云何無明煩惱凡夫尚未得天眼云何得同佛眼答如來五眼衆生悉具非待證聖方有涅槃經云若學大乘人雖是肉眼而明佛眼二乘雖具天眼不明佛眼又云見如來性者雖有煩惱如無煩惱若實明宗見性即肉眼而明佛眼以智照為眼故台教約五品初位中以凡夫心同佛所知用所生眼齊如來見若論明昧淺深即落修證今直論見性即無前後第八十一卷四板經云雖讚發菩提心而知心性即是菩提雖讚大乘經而知一切諸法皆是大相雖菩道而不分別阿羅漢辟支佛諸佛摩訶衍論釋云若真若偽唯自妄心現量境界無有其實無所著故又若真若偽皆一真如皆一法身無有別異不斷除故是以但了一心不忘正念一切境界自然消滅可謂應念斷除豈勞功行此乃西來的旨諸佛正宗圓信圓修不同權漸直下得力如師子就人一捶便成猶王之寶器可謂等賜高廣大車悉與如來平等滅度豈同貧所樂法下劣之乘者哉六板思惟彼我哽痛自他即起大悲興兩誓願衆生無邊誓願度煩惱無邊誓願斷雖知衆生如虛空誓度如虛空之衆生雖知煩惱無所有誓斷無所有之煩惱雖知衆生數甚多而度多多之衆生雖知煩惱無邊底而斷無底之煩惱雖知衆生如如佛如而度如佛如之衆生雖知煩惱如實相而斷如實相之煩惱何者若但拔苦因拔苦果此誓雜毒故須觀空若偏觀空則不見衆生可度是名著空者諸佛所不化若偏見衆生可度即墮愛見大悲非解脫道今則非毒非偽故名為真非空邊非有邊故名為正八板楞嚴三昧經問諸佛法中有合散耶答曰凡法尚無合散况佛法耶云何修習若見凡法佛法不二是名修習是以了一心成現之門則無修而修達萬法具足之體乃不習而習出入無際心境一如即於一切差別法中念念入念念起問一心旨趣蓋是惣門法義難明廣須開演如何是法如何是義答法本無差隨義有別從法生義差別難明因義顯法一心易了第八十二卷五板普賢品明一障一切障經云以普賢眼見一切衆生皆已究竟矣故知但了真心無惑可斷設有餘習還以一心佛知見而治之不入此宗皆成權漸以此懺罪何罪不消除三毒根如大地以此發行何行不成徹十地源似窮海底遊行奮迅猶師子之王自在翱翔若金翅之鳥八板居一切時不起妄念者念雖即空不可故起或串習而生或接續而起或覺前念非別生後念改悔惣皆是病但一坐之時內外心不生即是真如定設有異境𭷣生唯明正念正念者即一心本法心境俱虛了無所得於諸妄心亦不息滅者即推初念不見起處何須斷滅不見起處是名真滅住妄想境不加了知者妄想內外諸境皆空何須強生分別則不取不捨妙定相應於無了知不辨真實者亦不住無分別非實非虛心無所寄則得本之正宗還原之妙性矣九板首楞嚴經云一切衆生從無始來迷己為物乃至含受十方國土夫轉物者物虛非轉唯轉自心以一切法皆從分別生因想而成隨念而至所以金剛三昧經偈云法從分別生還從分別滅滅諸分別法是法非生滅第八十三卷一板問摩訶衍論云一即是心心即是一無一別心無心別一一切諸法平等一味一相無相作一種光明心地之海者云何復同相異相答若同若異俱一心作故如海涌千波千波即海以衆生差別性故不能同種以如來平等性故不能異種衆生雖差別不能自異如來雖平等不能自同不能自異故即異無異也不能自同故即同非同也三板起信論云譬如種種瓦器皆同微塵性相如是無漏無明種種業幻皆同真如性相是故契經中佛問文殊汝久遠來恆無休息普遍遊行十方剎中見何殊事文殊答曰我久遠來不見餘事唯見微塵又佛問言汝百年中居于輪家不見種種瓦器相耶文殊對曰我唯見塵不見瓦器又佛問言汝實不見地水火風山川樹等種種相耶對曰我實不見如是等相唯見微塵如是如是𠀍尊問訖文殊答曰至一百數佛問文殊見微塵耶文殊對曰我久遠來不見微塵爾時𠀍尊告文殊言善哉善哉汝是大士能覺一相能覺一相即無相法七板有識之身無情之士皆是內外四大悉皆無體且如地大唯依風輪衆微所成本無自性但是有情心變更無異理安庠動止皆在心中似鳥飛空不離空界如魚水豈越水源八板問楞伽經云佛語心為宗既立一心為宗云何復云無心是道也答心為宗者是真實心此心不是有無無住無依不生不滅有佛無佛性相常住為一切萬物之性猶如虛空體非一切而能現一切只為衆生不了此常住真心以真心無性不覺而起妄識之心遂遺此真心妙性逐妄攀緣只令息緣心所以云無心是道也第八十四卷五板但了一念空諸塵自然破所依既不有能依何得生如源盡流乾根危葉謝所以阿難七處執而無據故知邪法難扶二祖直下求而不生可驗解空方悟祖佛大約只指斯宗既不得能起之心亦不得所生之境心不可得故即我喪境不可得故即法亡若能人法俱空即顯一心妙理六板問人法俱空識又不立即今見聞從何而有答一切前塵所現諸法盡隨念而至皆對想而生念息境空意虛法寂故知見聞但是緣起見畢竟空可明起處八板問論云智及智處俱名為般若智處即是境云何成般若答般若有二種一真實常住般若二觀照有用般若若真實般若性遍一切處寂而常照唯一真心不分能所即不同𠀍間頑境以為所照亦不同偏小妄心以為所照又亦不同假立真如以為所照今則一體通心心互照以無心外境亦無境外心以心是境心境是心境故如是融鎔豈非般若乎第八十五卷三板問雖然心即是業業即是心既從心生還從心受如何現今消其虛妄業報答但了無作自然業空所以云若了無作惡業一生成佛又云雖有作業而無作者即是如來祕密之教又凡作業悉是自心撗計外法還自對治妄取成業若了心不取境自不生無法𭷣情云何成業四板學人問安國和尚云若未悟時善惡業緣是有不答非有喻如夜夢被惡人逐或作梵王帝釋將為是有豁然睡覺寂然無事信知三界本空唯是一心又有問大珠和尚若為得知業盡答現前心通前生後生猶如眼見前佛後佛萬法同時五板太虛空藏菩所問經云山相擊王菩曰譬如有孔隙處風入其中搖動於物有往來相菩亦爾若心有間隙心則搖動以搖動故魔則得便是故菩守護於心不令間隙若心無間隙則諸相圎滿以相圎滿故則空性圎滿是為菩超魔法門六板問入唯識門觀一切境自然無相何用更言破相顯理復有棄有觀空若有所破之宗則立能空之理既存空法還成有相之因若守觀門豈合無為之道答夫言破相者是未入唯識去其妄執雖言破相實無所破既無所破之有亦無能破之空情執若消空有俱寂前塵無定破立隨心迷真之妄不生對妄之真亦絶七板問見聞覺知不出俗諦心量真諦無得無生還出心量不答夫量者是能緣心但有對俗真因虛立實差別論平等遣異相建如如盡是對待得名破執設教若能真俗雙拂空有俱消了邊即中無邊可離達中即邊無中可存能證之智既亡所證之理亦寂方超心量入絶待門若有得無得有生無生盡不出於心量九板問本始二覺從何立名答本覺者因始得名始覺者從本而立如起信鈔云未審始覺從何而生為本所對故此云也原其始覺是本所生斬新而有故名為始反照其體元來有之敵對於始故名為本苟無其始何所待耶如母生子對子稱母乃至問本覺始覺既殊何因無二又既同本覺因何名始答即是本覺初顯相用名為始覺相用非別外來故得融同一體又若非本覺舉體之相用即不是始覺以心外有法故若不然者但名相似覺亦名隨分覺是知直待合同本體方得名真始覺也既合於本始即非始既無於始即無於本本始之名既喪但可名為覺焉九板問上真心無生妄念起滅如何會妄歸真入一乘平等之道答妄元無體本自全真何須更會今謂情見妄執之人引祖佛善巧洞心原之智搜經論微細窮性海之詮令頓豁情塵便成真覺如釋摩訶衍論云一心真如體大通於五人平等平等無差別故云何名為五種假人一者凡夫二者聲聞三者緣覺四者菩五者如來是名為五如是五名人自是五真自唯一所以者何真如自體無有增減亦無大小亦無有無亦無中邊亦無去來從本以來一自成一同自作同猒異捨別唯一真如是故諸法真如一相三昧契經中作如是譬如金剛作五趣像五人平等亦復如是第八十九卷九板問既是真如何分身土耶答據義立之於真如中以性成萬德為身以空之理為土約義即別體不相離又真理中具四德常淨二德為土我樂二德為身故云我此土淨而汝不見則真身含萬法為土耳若心外取土見相迷真成妄想之垢故稱為穢若見心性則名淨耳是以一法不動異見常生迷有作塵勞悟空成佛國非移妙喜匪變娑婆亦非神力所為法性何曾遷變猶眩翳之者同處各觀蠅髮毛輪所見差別如執外境界皆是妄心如經云例如今目覩山河皆是無始見病問心外無法道外無心云何諸佛自稱出𠀍得道廣教門答只為衆生不了唯心妄生外境以不實故所以諸佛出𠀍若有一法是實則諸佛終不出𠀍所方便教門不為知者但為未知者破執除疑似形言教若執喪疑消則無道可得無法可思益經云佛言我坐道場時唯得顛倒所起煩惱畢竟空性以無所得故得以無所知故知第八十九卷十板衆生者即是諸雜雜心識念念起滅故號衆生經云佛告比丘汝等日夜常生無量百千衆生若能智照不起相續之念即是度衆生又了念即空無有起處即是度盡無量百千衆生不見有一衆生而得滅度者台教云無明為父貪愛為母六根為男六塵為女識為媒嫁出生無量煩惱為子孫故經云有念即生死無念即泥洹十一板問若如上成佛度衆生不離一念諸佛何以發願更度他衆生答雖發願度生皆令倣此真修究竟同此指歸一念所以先發誓度盡一切衆生方成正覺則念盡心澄天真獨朗即成佛義也先佛已如是自度竟然後轉示他人即是真實之慈離此興悲皆成妄想如舍利弗問菴提女何不轉女身偈答言自男生我女徒生妄想悲則是不了自是非男錯認衆生之相却乃執生他女徒興彼我之情於一真內而妄立自他向同體中而強分愛見如古師云有二義門俱無可度一契空如性空寂滅故無可度二契不空同一法性法性平等故無可度故金剛三昧經云若化衆生無生於化不生於化其化大焉又大虛空藏菩所問經偈云猶如於幻師害多幻化衆實無有所害所度生亦然幻化及有情諸佛法亦爾若悟同一性無自性為性所以先德云八地已上菩得無生忍恆河沙𠀍界外有衆生求救菩都不起念衆生自然見菩到其前與其法四事供養菩得如是智由是無心之心量故我為心量亦為無量之量耳第九十卷一板問如上所涅槃非有故經云設有一法過涅槃者我亦如幻如夢即後學之人徒勞景慕答斯言破著非壞法性如觀和尚云難一切法如幻者妄法緣生可許如幻涅槃真實又不從緣如何同幻故牒釋有二意一明雖真而亦從緣雖非緣生而是緣顯亦空無性二明涅槃非幻為破著涅槃心云如幻耳是則破心中涅槃亦顯涅槃體即真而成妙有故知四種涅槃初後俱有所以唯識論云一本來自性清淨涅槃謂一切法相真如理雖有客塵而本性淨具無數量微妙功德無生無滅湛若虛空一切有情平等共有與一切法不一不異離一切相一切分別尋思路絶名言道斷唯真聖者自內所證其性本寂故名涅槃二有餘依涅槃謂即真如出煩惱障雖有微苦所依未滅而障永寂故名涅槃三無餘依涅槃謂即真如出生死苦煩惱既盡餘依亦滅衆苦永寂故名涅槃四無住處涅槃謂即真如出所知障大悲般若常所輔翼由斯不住生死涅槃利樂有情窮未來際用而常寂故名涅槃問夫言法身者心為法家之身身是積聚義積集含藏一切萬法故名為心即何用更立般若及解脫二法答法身即是人人須有靈智故名般若若得般若照則顯現法身故經云隱名如來藏顯名為法身又若得般若則一切處無著不為境縛即是解脫若顯法身得解脫功全由般若非唯此二法一切萬行皆因般若成立故五度如盲般若如導若布施無般若唯得一𠀍榮後受餘殃債若持戒無般若暫生上欲界還墮泥犁中若忍辱無般若報得端正形不證寂滅忍若精進無般若徒興生滅功不趣真常海若禪定無般若但行色界禪不入金剛定若萬善無般若空成有漏因不契無為果故知般若是險惡徑中之導師迷暗室中之明炬生死海中之智楫煩惱病中之良醫碎邪山之大風破魔軍之猛將照幽途之赫日警昏識之迅雷抉愚盲之金鎞渴愛之甘露截癡之惠刃給貧乏之寶珠若般若不明萬行虛設祖師云不識玄旨徒勞念靜不可剎那忘照率爾相違以此三法不縱不撗非一非異能成涅槃祕藏如大涅槃經云佛言我今當令一切衆生及以我子四部之衆悉皆安住祕密藏中我亦復當安住是中入於涅槃何等名為祕密之藏猶如伊字三點若並則不成伊縱亦不成如摩醯首羅面上三目乃得成伊三點若別亦不得成我亦如是解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃三法各異亦非涅槃我今安住如是三法為衆生故名入涅槃所以云法身常種智圎解脫具一切皆是佛法無有優劣故不縱三德相𡨋同一法界出法界外何處別有法故不撗能種種建立不一同歸第一義故不異雖三而一雖一而三一則壞於三諦異則迷於一實在境則三諦圎融在心則三觀俱運在因則三道相續在果則三德周圎如是本末相𭣣方入大涅槃祕密之藏古德云此之三德不離一如德用分異即寂之照為般若即照之寂為解脫寂照之體為法身如一明淨圎珠明即般若淨即解脫圎體法身約用不同體不相離故此三法不縱不撗不並不別如天之目似𠀍之伊名祕密藏為大涅槃三板淨名經云諸佛解脫當於衆生心行中求若不觀自心非己智分不能開發自身寶藏今欲論凡夫地之寶即聞修故明觀心也第九十一卷一板夫凡聖之道同一法身彼此俱亡物我咸絶則心內無得身外無餘如何起應化之身攝機冝之衆答只為衆生不了自他唯心撗生彼此若自達真空則諸佛終不出𠀍菩亦無功夫古德問云若言自他俱是自心現離心無實我人者諸佛亦見有衆生豈可有妄心未盡耶答諸佛見有衆生俱是緣生幻有不知謂實有我所以造業受報枉有輪回此由無實我感諸佛慈悲若實有我非是妄有者諸佛何故妄救衆生以我實有不可救故今為救者定知無我妄計有也故知衆生不離佛界迷不覺知古德云十方諸佛皆我本師海印頓現且法華分身有多淨土如來何不指己淨土而令別往陀妙喜思之故知賢首陀等佛皆本師矣復何怪哉言賢首者即壽量品中過百萬阿僧祇剎最後勝蓮華𠀍界之如來也經中偈云或現蓮華勝妙剎賢首如來住其中若此不是歎本師者他如來在他國土為何用耶且如揔持教中亦三十七尊皆那一佛所現謂毗盧那如來內心證自受用成於五智從四智流出四如來謂大圎鏡智流出東方阿閦如來平等性智流出南方寶生如來妙觀察智流出西方無量壽如來成所作智流出北方不空成就如來法界清淨智即自當毗盧那如來又問若依此義豈不達於平等意趣若言即我者依於平等意趣而非即我身如何皆為本師耶答平等之言乃是一義唯識尚一切衆生中有屬多佛多佛共化以為一佛若屬一佛佛能示現以為多身十方如來一一皆爾今正一佛能為多身依此而讚本師耳如華嚴不思議解脫境界品頌云佛智通達淨無礙剎那普了三𠀍法皆從心識因緣現生滅無常無自性於一剎中成正覺一切剎處悉亦然一切入一一亦爾隨衆生心而示現四板大乘大集經云佛告賢護如火未生或時有人發如是言我於今日先滅是火賢護於意云何彼人是語為誠實不賢護答言不也𠀍尊佛告賢護如是諸法從本已來畢竟無得云何於今乃作斯我能證知一切諸法我能了達一切諸法我能覺悟一切諸法我能度脫一切衆生於生死中此非正言所以者何彼法界中本無諸法亦無衆生云何言度但𠀍諦中因緣度耳故知心外無法何所得耶佛身無為但隨緣現問經云菩關閉一切諸惡趣門者夫一切衆生隨自心業各受苦報所以經偈云假使百千劫所作業不亡因緣會遇時果報還自受云何菩能關一切惡趣門答只約自心常開六識門何曾暫閉日夜計校緣想一切不善事遍諸境界念念恆造生死地獄經云集起心想名為地獄若能觀自心識性無所有即是開善趣門若不起心想即是閉惡趣門若得自在智現前即現身生五道入地獄餓鬼畜生等界救苦衆生故禪門中立無念為宗以為要學故經偈云勤念於無念佛法不難得何謂不難得以無念故萬境不生當處解脫若有念起非獨開惡趣之門二十五有一時俱現故知萬質皆從念異十二之類縱撗千差盡逐想生八萬之門竸起如信心銘云眼若不睡諸夢自除心若不異萬法一如以諸法無體從自心生心若不生外境常寂故云萬法本間時人自閙六板問如上所衆生自心造業自受苦報又云何代一切衆生苦答約古德釋代苦有七意一起悲意樂事未必能二修諸苦行能與物為增上緣即名代苦三留惑潤生受有苦身為物法令不造惡因亡果喪即名代苦四若見衆生造無間業當受大苦無畏方便要須斷命自墮地獄令彼脫苦五由初發心常處惡道乃至飢𠀍身為大魚即名為代六大願與苦皆同真性今以即真之大願至即真之苦七法界為身自他無異衆生受苦即是菩初唯意樂次二為緣次二實代後二理觀然約有緣方能代耳還原觀云普代衆生受苦德者謂菩修諸行法不為自身但欲廣益群生怨親平等普令斷惡備修萬行速證菩提又是菩本行菩道時大悲大願以身為質於三惡趣救贖一切受苦衆生要令得樂盡未來際心無退屈不於衆生希望毛髮報恩之心也經頌云廣大悲雲遍一切捨身無量等剎塵以昔劫海修諸行令此𠀍界無諸垢謂衆生妄執念念遷流名之為苦菩教令了蘊空寂自性本空故言離苦問曰衆生無邊苦業亦無邊云何菩而能代受答菩代衆生受苦者由大悲方便力故但以衆生妄執不了業體從妄而生無由出苦菩教令修行止觀兩門心無暫因亡果喪苦無由生但念不入三塗名為代衆生受苦也是以三界生死之苦者皆是衆生妄受以不了根塵無性本末常空於畢竟無中執成究竟之有因資貪取結業受生於無量劫來受輪回苦無明所莫省莫知菩於是𡸁大悲心愍茲顛倒性空之法藥破情有之病根則達苦無生不造惡業知諸受互起能破惑因妄受之苦既空對治之藥自絶所以先德云苦是樂樂是苦只箇修行斷門戶亦無苦亦無樂本來自性無繩索以茲妙悟入一際門遂得人法俱空不為心境所縛當處解脫永出苦原豈非代苦乎又經云法是大神變能令即凡成聖變禍為祥於地獄火輪之中踊淨剎蓮臺之上豈非神變耶問一切境界因心分別若有分別即屬無明故云無心分別一切法正有心分別一切法邪諸佛如來已斷無明無有心相云何能知真俗差別之境名一切種智答以法無自體故即分別無分別以體不礙緣故無分別即分別第九十二卷一板夫約𠀍諦門中凡聖夭絶凡夫心外立法妄執見聞聖人既了一心云何同凡知見答聖雖知見常了物虛如同幻生無有執著如大涅槃經云迦葉菩白佛言𠀍尊若以因此煩惱之想生於倒想一切聖人實有倒想而無煩惱是義云何佛言善男子云何聖人而有倒想迦葉菩言𠀍尊一切聖人牛作牛想亦是牛馬作馬想亦是馬男女大小舍宅車乘去來亦爾是名倒想善男子一切凡夫有二種想一者𠀍流布想二者著想一切聖人唯有𠀍流布想無有著想一切凡夫惡覺觀故於𠀍流布生於著想一切聖人善覺觀故於𠀍流布不生著想是故凡夫名為倒想聖人雖知不名倒想又以境本自空何須壞相以心靈自照豈假緣生不同凡夫能所情執知見故二板淨名經云所見色與盲等者崇福疏云譬如五指塗空空無像現不以空無像現便言指不塗空豈以五指塗空便欲令空中像現事亦不然不妨熾然塗空空中元無像現豈以眼根見色便令如盲豈以眼根如盲而便都無所見不妨滿眼見色了色本自性空雖然見色之時元來與盲無異但息自分別心非除法也法本自空無所除也又所聞聲與響等者豈是不聞但一切聲皆如谷響無執受分別也所以滿眼見色滿耳聞聲不隨不壞了聲色之正性故何者若隨聲色之門即墮凡夫之執分別研醜之相深著愛憎領受毀讚之音妄生欣猒若壞聲色之相即同小乘之心則有三過一色等性空無可壞故若壞方空非本空故二由空即真同法性故若壞方真事在理外故三由即空不待壞故壞則斷滅是以如來五眼洞照無遺豈同凡夫生盲二乘眇目都無見耶但不隨不壞離二見之邊邪非有非空契一心之中理則逢緣無礙觸境無生矣三板大智度論云佛有不言無無不言有但諸法實相譬如日光不作高下平等一照佛亦如是非令有作無非令無作有是知若迷大旨則見有無四板問六塵境界但依妄念而有差別若無念之人還見一切境界不答妄念執有前塵作實知解妙性不通遂成差別若無念之人非是離念但是即念無念念無異相雖有見聞皆如幻化又一念頓圎常見十法界萬法中道之理古德問云若言念唯無念豈得揔不見不聞人畜聲色等耶答恆聞見以聞見即不聞見故何者以但聞見聲色等法即是眼耳等識見聞也知是畜等色聲自是意識分別也然眼等識見聞性無別但稱色等法得更無異緣也意識妄有了知無體所知如幻也故云所見色與盲等六板華嚴經頌云若有知如來體相無所有修習得明了是人疾作佛故經云一切衆生無始已來常入涅槃菩提非可修相非可生相畢竟無得無有色相而可得見見色相者當知皆是隨染幻用非是智色不空之相以智相不可得故問一切衆生無始無明種子堅牢現行濃厚云何一念而得頓除答根隨結使體性本空愚夫不了自生纏縛若明佛知見開悟本心更有何塵境而能障礙乎八板華嚴論問一切衆生本有不動智何故不應真常何故隨染答一切衆生以此智故而生三界者為智無性不能自知是智非智善惡苦樂等法為智體無性但隨緣現如空中響應物成音無性之智但應緣分別以分別故癡愛隨起因癡愛故即我所病生有我所故自他執業便起因執取故號曰末那執取不斷名之為識因識種子生死相續以生死故衆苦無量以苦無量方求不苦之道迷不知苦者不能發心知苦求真者還是本智會苦緣故方能知苦不會苦緣不能知苦故知苦緣故方能發心求無上道有種性菩以宿𠀍先已知苦發信解種強者雖受人天樂果亦能發心求無上道是故因智隨迷因智隨悟是故如人因地而倒因地而起正隨迷時名之為識正隨悟時名之為智九板問此自他權實二門於正理中決定耶答但隨化門無有決定經云無有定法故號阿耨菩提若執一門皆成外道或定一相即是魔王是以一切法權一切法實一切法亦權亦實一切法非權非實台教云若一切權法何所不破如來有所尚復是權况復人師若一切法皆實者何所不破唯此一事實但一究竟道寧得衆多究竟道耶若一切法亦權亦實復何所不破一切悉有權有實不得一向權一向實若一切法非權非實復何所不破何得紛紜強生建立古德云即實而權則有而不有即權而實則無而不無若雙權實即有無俱非若雙照權實則有無俱是若非非照則是非俱非而而照則是非俱是若是非俱是終日非而不非若是非俱非終日是而不是若是而不是則非是非非之非若非而不非則非是是是之是是則心該色末色徹心原心色一如何非何是故知心外有法是非竸生法外無心取捨俱喪問此宗鏡録何教所攝答直唯識性理無偏圎約見不同略分五教一小乘教唯六識不知第八賴耶二初教有賴耶生滅亦不言有如來藏三終教有如來藏生滅不生滅和合為賴耶識四頓教揔無六七八識等何以故以一心真實從本已來無有動念體用無二是故無有妄法可顯五一乘圎教普賢圎明之智不言唯識次第又言佛子三界虛偽唯一心作亦攝入故此宗則圎教所攝乃是如來所法門之根本以如來依此心成佛故此心得為如來根本之義無有一法不收無有一理不具如明鏡照物曷有遺餘若寶印文成更無前後問凡立五乘之道皆為運載有心若境識俱忘則無乘可今約方便乘理不無此宗究竟何乘所攝答於諸乘中一乘所攝亦云最上之乘出過諸法頂故亦云不思議乘非情識測量故今所言一乘者即一心也以運載為義若攀緣取境則運入六趣之門若妄想不生運至一實之地十四板首楞嚴經云諸可還者自然非汝不汝還者非汝而誰則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍故知一切衆生即今見精明心非定真妄昧之則粗明之則妙只於八種不還之中了了見性常住云何隨境流轉失本真常永沒苦輪常漂死海大聖憐愍非不驚嗟阿難示起疑心寄破情執釋迦微細開演直指覺原可謂不易凡身頓成聖體現於生滅顯出圎常宗鏡前後明文一一全證於此又江西馬祖問亮座主蘊何經業對云講三十本經論師云正講時將什麼講對曰將心講師云心如工伎兒意如和伎者爭解講他經對云不可是虛空講也師云却是虛空講得座主於言下大悟遂下階禮拜驀目汗流師云這鈍根阿師用禮拜作什麼其座主却回本寺語學徒言某一生學業將謂天下無人敵者今日被開元寺尊宿一唾淨盡我爾許多時皆是誑謕汝遂散學徒一入西山更無消息又如有學士問馬祖云如水無筋骨能勝萬斛舟時如何師云我這裏水亦無舟亦無什麼筋骨又學人問龍潭和尚云久響龍潭及至到來為什麼龍亦不現潭又不見師云却是子親到龍潭又俗官王常侍問先洞山五十二位菩中為什麼不見妙覺菩師云却是常侍親見所以智者大師一生弘教雖廣垂開示唯顯正宗如止觀中云究竟指歸何處言語道斷心行處滅永寂如空又觀心論中云復以傷念一家門徒隨逐積年看心稍久遂不研核問心是以不染內法著外文字偷記注而奔走負經論而浪行何不絶言語置文破一微塵讀大千經卷若能如上聽法講經提宗問答方諧祖意稱可佛心如遇此機可歸宗鏡第九十三卷一板夫宗鏡是實相法門若信得何福若毀得何罪答此一心實相之門般若甚深之旨於難信之中或有信者法利無盡唯佛能知若有毀者謗般若罪過莫大焉現𠀍受殃生身陷獄何以受報如此廣大以般若是一切𠀍出𠀍間凡聖之母猶如大地無物不從地生或若謗之則謗一切佛地三寶功德如十法界中一切衆生若升若沉若愚若智無不皆從般若中來若不得般若威光實無一塵可立如般若經云欲尊貴自在乃至欲得菩提當學般若又云若欲得六根完具當學般若乃至鬼畜亦要完具以此鬼畜皆從學般若來故知不信宗鏡無有是處如諸法無行經云爾時文殊師利言𠀍尊師子吼鼓音王如來滅度之後爾時有菩比丘名曰喜根時為法師質直端正不壞威儀不捨𠀍法爾時衆生普皆利根樂聞深論其喜根法師於衆人前不稱讚少欲知足細行獨處但教衆人諸法實相所謂一切法性即是貪欲之性貪欲性即是諸法性瞋恚性即是諸法性愚癡性即是諸法性其善根法師以是方便教化衆生衆生所行皆是一相各不相是非所行之道心無瞋礙以無瞋礙因緣故逮得法忍於佛法中決定不壞世尊爾時復有比丘法師行菩道名曰勝意比丘護持禁戒得四禪四無色定行十二頭陀世尊是勝意比丘有諸弟子其心輕動樂見他過世尊後於一時勝意菩入聚落乞食誤至喜根弟子家見舍主居士子即到其所敷座而坐為居士子讚少欲知足細行説無利語過讚歎遠衆樂獨行者又於居士子前復説喜根法師過失是比丘不實以邪見道教化衆生是雜行者説欲無礙瞋恚無障礙愚癡無障礙一切諸法皆無障礙是居士子利根得無生法忍即語勝意比丘大德汝知貪欲為是何法勝意言居士我知貪欲是煩惱居士子言大德是煩惱為在內在外耶勝意言不在內不在外大德若貪欲不在內不在外不在東西南北四維上下即是無生若無生者云何説若垢若淨爾時勝意比丘瞋恚不喜從座起去作如是言是喜根比丘以妄語法多惑衆人是人以不學入音法門故聞佛音聲則喜聞外道音聲則瞋於梵行音聲則喜於非梵行音聲則瞋以不學入音聲法門故乃至爾時喜根菩於衆僧前説是諸偈云貪欲是涅槃恚癡亦如是如此三事中有無量佛道若有人分別貪欲瞋恚癡是人去佛遠譬如天與地菩提與貪欲是一而非二皆入一法門平等無有異凡夫聞怖畏去佛道甚遠貪欲不生滅不能令心惱若人有我心及有得見者是人為貪欲將入於地獄貪欲之實性即是佛法性佛法之實性亦是貪欲性是二法一相所謂是無相若能如是知則為𠀍間導若有人分別是持戒毀戒以持戒誑故輕蔑於他人是人無菩提亦無有佛法但自安住立有所得見中若住空間處自貴而賤人尚不得生天何况於菩提皆由著空間住於邪見故邪見與菩提皆等無有異但以名字數語言故別異若人通達此則為近菩提分別煩惱垢即是著淨見無菩提佛法住有得見中若貪著佛法是則遠佛法貪無礙法故則還受苦惱若人無分別貪欲瞋恚癡入三毒性故則為見菩提是人近佛道疾得無生忍若見有為法與無為法異是人終不得解於有為法若知二性同必為人中尊佛不見菩提亦不見佛法不著諸法故降魔成佛道若欲度衆生勿分別其性一切諸衆生皆同於涅槃若能如是見是則得成佛其心不間靜而現間靜相是於天人中則為是大賊是人無菩提亦無有佛法若作如是願我當得作佛如是之凡夫無明力所𭷣佛法湛清淨其喻如虛空此中無可取亦無有可捨佛不得佛道亦不度衆生凡夫強分別作佛度衆生是人於佛法則為甚大遠若見衆生苦則是受苦者衆生無衆生而有衆生住衆生相中則無有菩提若人見衆生是畢竟解脫無有淫恚癡知是為𠀍將若人見衆生不見非衆生不得佛法實佛同衆生性若能如是知則為𠀍間將乃至是諸偈法時三萬諸天子得無生法忍萬八千人漏盡解脫即時地裂勝意比丘墮大地獄以是業障罪因緣故百千億那由他劫於地獄受諸苦毒從地獄出七十四萬𠀍常被誹謗若千百千劫乃至不聞佛之名字自是已後還得值佛出家學道而無志樂於六十二萬𠀍常返道入俗亦以業障餘罪故於若干百千𠀍諸根暗鈍𠀍尊爾時喜根法師於今東方過十萬億佛土有國名寶莊嚴於中得阿耨多羅三藐三菩提號曰勝光明威德王如來應供正遍知今現在彼其勝意比丘今我身是𠀍尊我未入如是法相門時受如是苦分別苦顛倒苦是故若發菩心者若發小乘心者不欲起如是業障罪不欲受如是苦惱者不應拒逆佛法無有處所可生瞋癡佛告文殊汝聞是諸偈得何等利𠀍尊我畢是業障罪已聞是偈因緣故所在生處利根智慧得深法忍巧深法文殊師利為誰力故能憶如是無量阿僧祇劫罪業因緣𠀍尊諸菩有所念有所有所思惟皆是佛之神力所以者何一切諸法皆從佛出故知若不信宗鏡中所實相之理則如勝意比丘沒魂受裂地之大苦若有信如是則如文殊師利智慧演深法之妙辨信毀交報因果無差普勸後賢應深信受十板華嚴經中真如相回向有一百句一一句中無不同旨皆為成就一心妙門釋曰是知百句之內一一中無一字而不約心明無一行而不隨性起可謂真該行末無一一行而非真行徹真原無一一真而非行如是則理事周備心境融通匪著有以凝空免滯真而染俗能令頓生正信步步成菩之因門直顯圎修念念滿諸佛之果海所以具録百句廣大全文究竟證明宗鏡妙旨今則普勸十方學士一切後賢但願道富人貧情踈德厚以法為侣以智為先用慈修身開物成務為法施主匪吝家風無問不從有疑咸決則佛行處免負本心妙行恆新至道如在所以證道歌云窮釋子口稱貧實是身貧道不貧貧則身常披縷褐道則心藏無價𭹀無價𭹀用無盡利物應時終不三身四智體中圎八解六通心地印斯則以法界為身虛空為量情亡取捨見泯自他以物心為心何門不順以彼意為意何法能違入宗鏡中法爾如是故書云以兆人之耳聽以四海之目視以己身知人身以己心知人心聖人無常心以百姓心為心又云攝己從他萬事消和攝他從己諸事競起則內外指歸證明無盡問信受毀謗此宗鏡法罪福何重答此乃群賢之父諸佛之母萬善由生信謗豈不獲報重耶所以法華經云又如大梵天王一切衆生之父此經亦復如是一切賢聖學無學及發菩心者之父起信鈔云若謗此法以深自害亦害他人斷絶一切三寶之種一切如來皆依此法得涅槃故一切菩因之修行得入佛智故第九十四卷一板大涅槃經云信於二諦一乘之道更無異趣為是衆生速得解脫又云道者雖無色像可見稱量可知而實有用善男子如衆生心雖非是色非長非短非粗非細非縛非解非是見法而亦是有二板知幻即離不作方便者以幻無定相自性常離離即空也即一切凡聖垢淨萬法皆同幻如空故何用更作方便而求離離幻即覺亦無漸次者當離之時全成大覺即離即覺平等一照既無前後豈有漸次耶四板金剛三昧經云如是衆生之心實無別境何以故心本淨故理無穢故以染塵故名為三界三界之心名為別境是境虛妄從心化生心若無妄即無別境大力菩言心若在淨諸境不生此心淨時應無三界佛言如是菩心不生境境不生心何以故所見諸境唯所見心心不幻化則無所見七板虛空孕菩經偈云一切諸法相真實無知者若人住諸蔭六根皆蔽塞釋曰故知諸法皆真無知無見才有知見即落識蔭則一心不通六根暗塞終不能見無見之見知無知之知若有見之見則不見一切若無知之知則無所不知所以賢護經云若菩觀四念處時無法可見無聲可聞無聞見故則無有法可得分別亦無有法可得思惟而亦非瞽盲聾故但是諸法無可見故以唯一真心見外無法八板須真天子經云須真天子問文殊師利菩不從三解脫門而求道耶文殊答言天子不可從空而成道亦不可於無相而成道亦不可於無願而成道也所以者何於是中無心意識念亦無動故有心意識念念動者乃成其道也釋曰若取三解脫門作證即是溺實際之海背靈覺之原遺性徇空何成大道若直了神解心性念念菩提果圎不墮斷見之邪無豈涉常見之實有介爾起意大用現前無得無依非取非捨從真起行體用相收以行契真卷舒一際可謂心心合道念念𡨋真矣故還原觀云用則波騰海沸全真體以運行體則鏡淨水澄舉隨緣而會寂斯則不離體之用乃波騰不離用之體體常湛寂體雖湛寂常在萬緣用雖波騰恆𡨋一際大方廣師子吼經云佛告電鬘菩善男子法唯一字所謂無字本無言何所言善男子當知無是為真爾時淨身菩承佛威神白佛言𠀍尊若無所是為真啞默不言皆應法佛言如是善男子如汝所非唯啞默者法不啞默者亦皆法而不知法𠀍尊云何一切衆生法而不知法善男子如生盲人處日光中而不見日傍人為以他聲故乃知有日如是諸法悉入法界法界無字離諸字性非諸衆生而能宣辨釋曰審知未達宗人依通見解隨他語轉妄有所如彼盲者不見日光聽傍人聲豈窮日體若眼開親見即知本無名字言故知有言傷旨不達法界是以經云如是諸法悉入法界法界無字離諸字性若能深達一字唯心法界自然言語道斷法爾知解情亡豈是無辨智不能窮也如肇論云釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無以顯道釋梵絶聽而雨花斯則理為神御故口以之而默豈曰無辨辨所不能言也普超三昧經決狐疑品云於是阿闍𠀍王曰唯願濡首解我狐疑濡首答言大王所疑恆河沙等諸佛𠀍尊所不能決時王自省無救護從榻而墮如斷大樹摧折躃地大迦葉曰大王自安莫懷恐據勿以為懼所以者何濡首童真被大智鎧善權方便而設此言可徐而問時王即起問濡首曰向者所恆河沙諸佛不能為我而決狐疑濡首報曰王意云何假若有人而自言我以塵灰煙雲霧汙染虛空寧堪任乎答曰不能汙濡首又問設令大王取此空洗之使淨寧堪任乎答曰不能淨濡首報曰吾以是向者言恆河沙等諸佛𠀍尊所不能決也釋曰一切衆生不了自性清淨心故妄生垢淨迷悟自沒遂於無疑中起疑於無決中求決若能諦了豁爾意消即見一切染淨諸法皆同虛空性既達虛空性不可染淨方悟本心未曾迷悟設有無生無得之理皆是一期隨冝方便若入宗鏡妙旨了然尚無疑與無疑何懷決不決耶第九十五卷二板大樹緊那羅王所問經云爾時天冠菩問於大樹緊那羅王如是琴中妙偈從何而出答言善男子從諸衆生音聲中出又問諸衆生音聲從何而出答言善男子衆生音從虛空出乃至當知是聲即虛空性聞已便滅若其滅已同空性住是故諸法若不同虛空性是故應當不捨空際如音聲分諸法亦爾乃至又以音聲名為言語然是音聲無有住處若無住處則無堅實則名為實若其是實則不可壞若不可壞則無有起若無有起則無有滅若無有滅是名清淨若是清淨是則白淨若是白淨是則無垢若是無垢則是光明若是光明則是心性若是心性則是出過若是出過則出過諸相若出過諸相則是正位若菩在正位是則名得無生法忍釋曰入一心正位是究竟指歸最後𡸁示言窮理極更無過矣三板佛升忉利天為母法經云佛告月氏天子何謂菩曉了一切猶如虛空其三界者心之所為不計斯心無有色像亦不可覩無有處所無有教令猶如幻化因其心本而求諸法則不可得若以於心不求于心則無所獲心不可逮以不得心一切諸法亦不可得諸法則無有法無形類想亦無有影而無所有及與實諦亦無所覩無所覩者於一切法心無所入知一切法無所成就亦無所生譬如虛空演道俗業經云佛告長者智慧有四事一曰解於身空四大合成散壞本無主名二曰其生三界皆心所為心如幻化倚立衆形三曰了知五蘊本無處所隨其所著因有斯情四曰曉十二緣本無根原因對而現是為四佛於是頌曰悉解其身空四大而合成散滅無處所從心而得生五蔭本無根所著以為名十二緣無端了此至大安四板但了無生即入平等言平等者即一切有為無為如實之性見此性故以無住義住一切法中若不遠一切法是一心真如平等無生之性在染離染俱為煩惱所染若了諸法無生則一切有為無為皆是菩提之道何所染耶五板大莊嚴法門經云佛言復次長者子清淨攀緣方便行菩於一切衆生心法中悉有菩提何以故若彼心無色離色分別體性如幻彼此內外不相續者是名菩提復次長者子菩不應覺於餘事但覺自心何以故覺自心者即覺一切衆生心故若自心清淨即是一切衆生心清淨故如自心體性即是一切衆生心體性如自心離垢即是一切衆生心離垢如自心離貪即是一切衆生心離貪如自心離瞋即是一切衆生心離瞋如自心離癡即是一切衆生心離癡如自心離煩惱即是一切衆生心離煩惱作此覺者名一切智知覺釋曰若了一心遍知一切夫一切者是一之一切故名一切智知覺若各隨相解則不得名一切智知覺以不覺諸法自性故六板大乘本生心地觀經云善男子自覺悟心有四種義云何為四謂諸凡夫有二種心諸佛菩有二種心善男子凡夫二心其相云何一者眼識乃至意識同緣自境名自悟心二者離於五根心心所法和合緣境名自悟心善男子賢聖二心其相云何一者觀真實理智二者觀一切境智善男子如是四種名自悟心釋曰凡夫二心者一根境同緣心此則和合而生無有自體凡夫執實故為空二離根境心即是真心不從緣生若了此心即真發菩提之道賢聖二心者一理智心即第一義諦空有兩亡性相俱寂二境智心即隨緣俗諦真俗雙照理事相含若入宗鏡之中揔前凡聖四心或入相資門若聖若凡交徹無礙或入相泯門若一若多𡨋同性海第九十五卷七板文殊悔過經云文殊師利言人民所作衆得本者志性各異使入揔持光明之慧其有諸天一切人民愁憂苦惱為除衆患悉入揔持光明之耀一切諸論文字本際入於揔持光明之耀一切諸行諸想所應悉入揔持光明之耀使致普門諸根轉輪使入揔持光明之門一切莊嚴清淨衆飾使入揔持光明之門乃至住於一事普見衆事住於衆事悉見一事以一事入一切事以一切事入於一事則以一義告誨開化一切諸義以一切義興發一義以無因緣入於諸緣化于諸緣令入無緣以無事法入于衆生性行各異從其相行而教誨之釋曰夫能泯異性永拔苦輪融諸行門清淨嚴飾者悉令入一心揔持之門被宗鏡光明之耀故能住一事而見衆事以一成多用諸義而發一義以多成一一成多而用遍多成一而體融體用交羅一多自在九板寶頂經云佛言迦葉譬如有人怖畏虛空捶叫呼作如是言善友汝等為我除此虛空迦葉於汝意云何此空為可除不迦葉言不可𠀍尊佛言迦葉若有如是沙門婆羅門怖畏性空我是人失心狂亂所以者何迦葉一切諸法並是空方便若畏此空云何不畏一切諸法若惜諸法云何不惜此空佛性論問云此經為顯何義答為示一切諸法本性非有故法空非關法滅然後得空故於空性不應生怖釋曰一切諸法並是空方便者夫有所皆為顯空所以空則一切法法則一切空非先有而後無寧歸斷滅豈先無而後有不墮無常是以性本常空空無間斷應諸有有自繁興能入斯宗聞諸法空心大歡喜不了此義聞諸法空心大怖畏以不了法空違現量境執為外解聞唯心之旨恐墮空見之門心境俱迷遂生怖畏度一切諸佛境界經云佛言文殊師利菩提者無相無緣云何無相無緣不得眼識是無相不見色是無緣不得耳識是無相不聞聲是無緣乃至意法亦如是釋曰無相則無能緣之心無緣則無所緣之境能所俱亡真心自現文殊師利行經偈云過現未來法唯語無真實彼若於實處一相無差別釋曰若三𠀍所有之法皆是𠀍諦語言若了一心真實之處一道自無差別何言之所議意之所緣耶第九十六卷一板菩處胎經云譬如泉源陂池五河駛流各各有名悉歸于海便無本名亦如須跱立難動雜色衆鳥往依附山皆同一色便無本色菩摩訶教化衆生淨佛國土亦復如是衆生心識所念不同若干思想能令一切至解脫門想定意滅便無本念同一解脫十善業道經云爾時𠀍尊告龍王言一切衆生心想異故造業亦異由是故有諸趣輪轉龍王汝見此會及大海中形色種類各別不耶如是一切靡不由心造乃至又觀此諸大菩妙色嚴淨一切皆由修集善業福德而生又諸天龍八部衆等大威勢者亦因善業福德所生今大海中所有衆生形色粗鄙或大或小皆由自心種種想念作身語意諸不善業是故隨業各自受報二板文殊菩問法身經云如言摩𡰱寶舍有四角從一角視悉見諸角無所減是故見諸本際釋曰若了一心本際何法不通以諸法從心所生皆同一際住此際中一一圎滿舉目咸是何待意思智不能知言不能及故云金剛寶藏無所減無所希望經云時舍利弗知諸衆會心之所念即時告此諸比丘言仁等何故發於斯言吾等之身從今已往無佛𠀍尊因從異學出為沙門時諸比丘報舍利弗吾從今始敬事六師一切所歸為一相耳不倚六入是以不見若千種師不想出家沙門也釋曰倚六入而為差妄分邪正歸一相而為本彼我雙亡如是解者可謂真出家矣四板寶網經偈云普遍諸佛土法王之境界釋師子人尊一毛光所照釋曰如無量無邊諸佛土不出一毛頭心地以智了達者故云光所照五板若欲除結當於結心釋曰左右偏掣况有無二見當於結心即正明中道所以昧真空而有無情起執根塵而一六義生諦了自心解縛俱泯故知垢淨解縛悉從自心以心垢故見垢心淨故見淨心縛故見縛心解故見解若無於心何垢何淨六板守護國土陀羅𡰱經云爾時𠀍尊告一切法自在王菩摩訶言此深三昧以菩提心而為其因以大慈悲而為根本方便修習無上菩提以為究竟善男子此中何者名為菩提善男子欲知菩提當了自心若了自心即了菩提何以故心與菩提真實之相畢竟推求俱不可得同於虛空故菩提相即虛空相是故菩提無所證相無能證相亦無能所契合之相何以故菩提畢竟無諸相故善男子以一切法即虛空相是故菩提畢竟無相爾時一切法自在王菩復白佛言𠀍尊若此菩提同虛空一切智體當何所求云何證得菩提現前一切智智當於何生佛告一切法自在王菩言善男子一切智體當於心求一切智智及與菩提從心而生何以故心之實性本清淨故善男子此心之性不在外不在內不在中間善男子一切如來此心相非青非黃非赤非白非紅非紫亦非金色非長非短非圎非方非明非暗非男非女非非男女亦復非是亦男亦女善男子此心非欲界性非色界性非無色界性非天龍非夜義非𠃵闥婆非阿修羅非迦樓羅非緊那羅非摩睺羅伽人非人等一切同類善男子此心不住於眼亦復不住耳鼻舌身意於三𠀍中亦不可見何以故此心同於虛空相故以是義故遠離一切麁細分別何以故此虛空性即心性故如其心性即菩提性如菩提性即陀羅𡰱性善男子是故此心虛空菩提陀羅𡰱性無二無二分無別無斷如是一切皆以大慈大悲而為根本方便波羅蜜之所攝受善男子是故當知我今於此諸菩等大衆之中如是法為淨廣大菩提心故為令一切了自心故是故一切法自在王若有善男子善女人欲知菩提真實性者當了自心如其心性即菩提性云何而能了知心性謂此心性於一切相若形若顯乃至若五蔭若六入若十二處若十八界如是等法觀察推求竟不可得善男子若諸菩如是了知即得成就第一清淨法光明門住此門已任運得此不可思議一切智智諸佛境界甚深三昧文殊般若經云佛告文殊師利汝已供養幾所諸佛文殊師利言我及諸佛如幻化相不見供養及與受者佛告文殊師利汝今可不住佛乘耶文殊師利言如我思惟不見一法何當得住於佛乘佛言文殊師利汝不得佛乘乎文殊師利言如佛乘者但有名字非可得亦不可見我云何得佛言文殊汝得無礙智乎文殊師利言我即無礙云何以無礙而得無礙佛言汝坐道場乎文殊師利言一切如來不坐道場我今云何獨坐道場何以故現見諸法住實際故釋曰若了一心實際則一切無所得於無所得中故能成辦無邊佛事於事事中皆不違實際故若如是解者未必是不坐道場是坐道場當坐道場時是不坐道場矣何以故道場等不出實際故九板雜藏經云譬如兩木相揩則自生火還燒其木火不從風出不從水出不從地出其四魔者亦復如是皆從心生不從外來譬如畫師畫作形像隨手大小雖因緣合有彩有板有筆畫師不畫不能成像四魔如是心已堅固便無所起釋曰是以一心不動法不現前如畫師不畫且無形像故不動一心有大功德如法句經云佛言善男子善知識者有大功德能令汝等於貪欲瞋恚愚癡邪見五蓋五欲衆塵勞中建立佛法不起一心得大功德譬如有人持堅牢船度於大海不動身心而到彼岸第九十八卷二板高僧解脫和尚依華嚴作佛光觀於清霄月夜光中忽見化佛偈云諸佛祕密甚深法曠劫修行今乃得若人開明此法門一切諸佛皆隨喜解脫和尚乃禮拜問云此法門如何開示於人化佛遂隱身不現空中偈云方便智為燈照見心境界欲知真實法一切無所見七板高城和尚歌云無相心能運耀應聲應色隨方照雖在方而不在方任運高揔能妙尋無頭復無尾𦦨光暈暈從何起只這如今全是心心用明心心復爾不居方何處覔運用無蹤復無迹識取如今覔底人終朝莫謾別求的勤心學近叢林莫將病眼認花針教本窮無相理廣讀元來不識心識取心了取境識心了境禪河靜若能了境便識心萬法都如闥婆影九板牛頭下佛窟和尚云若人不信一文殊十方文殊一時一佛涅槃一切諸佛俱涅槃何以故不達色根本故問了色性無所有是本不答此是住觀語非是即事見根本若即事見者只汝生老病身及無明怒是色根本事外無理故是以若了一色根本即舉十方色同名為一一切一涅槃一切涅槃當知色體無性性無不包又云雖同凡夫而非凡夫不得凡夫不壞凡夫謂別有殊勝在心外者即墮魔網我今自觀身心實相作佛即是見十方佛同行同證處問佛身無漏戒定熏修五蔭不縛不脫不敢有疑且如大品經云衆生不善五蔭之身亦不縛不脫甚令人驚疑答若向衆生五蔭外別有諸佛解脫無有是處只了衆生自性從本已來無有一法可得誰縛誰脫何得更有縛脫之異問經云衆生與佛平等無有縛脫何得六道衆生沉淪不得解脫答衆生不了色心清淨妄想顛倒不得解脫若知人法常空其中實無縛脫問作何觀行懺悔臨終免被業𭷣答汝須深信諸佛所行所處與我今日所行所處無別乃至成佛尚不得涅槃相何况中間罪福妄業可得此是真實正知正見真實修行真實懺悔但於行住坐臥不失此觀臨終自然不失正念十板大珠和尚云心性無形即是微妙法身心性體空即是度空無邊身示行莊嚴即是功德法身此法身是萬化之本隨處立名智用無盡是無盡藏問何者是法身答心能生恆沙萬法故號法家之身經云一念心塵中演出恆沙偈時人自不識問真法幻法各有種性不答佛法無種應物而現若心真也一切皆真若有一法不真真則不圎若心幻也一切法皆幻若有一法不是幻幻法則有定若心空也一切皆空若有一法不空空則不圎迷時人逐法悟了法由人森羅萬像至空而極百川衆流至海而極一切聖賢至佛而極十二部經五部毗𡰱四圍陀論至心而極心是揔持都院萬法之原亦是大智慧藏無住涅槃百千名號皆是心之異名靈辨和尚云夫一心不思議妙義無定相應時而用不可定執經云一切賢聖皆以無為法而有差別用有差別隨處得名究竟不離自心此心能壞一切能成一切故云一切法皆是佛法心作天心作人心作鬼神畜生地獄皆心所為好惡皆由心要生亦得要不生亦得即是無礙義只今一切施為行住坐臥即是心相心相無相故名實相體無變動亦名如來如者不變不異也無中現有有中現無亦曰神變亦曰神通揔是一心之用隨處差別即多義一中解無量無量中解一了彼互生起當成無所畏又東方入正定西方從定出若了心外無法一切唯心即無一法當情無有好惡是非即不怖生死一切處皆是解脫故云當成無所畏縱然心外有一切境法亦從自心妄想因緣而生無有自性其體本空如幻如化先雲居和尚云佛法有什麼多事行得即是但知心是佛莫愁佛不解語欲得如是事還須如是人若知如是人愁箇什麼若云如是事即不難自古先德淳素任真元來無巧設有人問如何是道或時答㼾甎木頭作麼衆仰皆重元來他根本腳下實有力即是不思議人把土成金若無如是事饒你得蔟花蔟錦相似直道我放光動地𠀍間更無過也盡却了合殺頭人揔不信受元來自家腳下虛無力釋曰雲居和尚乃物外宗師此土七生為善知識道德孤邁智海弘深具大慈悲常盈千衆所示徒云但知心是佛莫愁佛不解語者此為今時學人一向外求但學大乘之語不能返本內自觀心明見天真之佛若了此心佛即自然智無師之智現前何煩外學如云從門入者非寶又云從天降下即貧窮從地涌出即富貴若從心地涌出智寶有何窮盡故云無盡之藏但若得心真實去根腳下諦去自然出語盡與實相相應言下救人生死變凡為聖捉礫成金道有亦得道無亦得句句悉成言教若也心中未諦圎信不成空任虛浮只成自狂直饒辨縱撗只增狂慧設或得天花亂墜頑石點頭事若不真揔成妖幻所以志公見雲光法師講法華經感得天華亂墜云是咬蚤之是以先聖誠言實為後學龜鏡可以刻骨可以書紳今遍搜揚深有意矣第九十九卷二板俱舍論云眼所現見名為所見從他傳聞名為所聞自運己心諸所思搆名為所覺自內所受及自所證名為所知佛地論云現見虛空雖與種種色相相應而無諸色種種相故如煙霧等共相應故有時見空有種種相由虛妄分別力故但見煙等有種種相非見虛空以虛空性不可見故乃至心淨法界離名言故一切名言皆用分別所起為境然諸法教亦不唐捐是證法界展轉因故如見字書解所由此法教是諸如來大悲所流能展轉離言如以衆彩彩畫虛空甚為希有若以言離言復過於彼三板釋摩訶衍論云一切諸法一心量無心外法以無心外法故豈一心法與一心法作障礙事亦以一心法作解脫事無有障礙無有解脫一心之法一即是心心即是一無一別心無心別一一切諸法平等一味一相無相作一種光明心地之海寶生論偈云微笑降伏大魔軍明智覺了除衆欲於此大乘能善住深識愛源為自心六板頓教五位門云第一識心者語是心見是心聞是心覺是心知是心此是第一悟一一能知如許多心皆是一心一心能遍一切處第二知身同無情身不知痛癢好惡一切皆是心不干身事心能作人畜心能作魚鳥第三破四大身身即是空空即是無生空無內外中間離一切相第四破五蔭色蔭若有四蔭不虛色蔭若無四蔭何有第五見性成佛湛然常住十住經序云以靈照故統名一心以所緣故揔號一法若夫名隨數變則浩然無際統以心法則未始非二十二門論序云論之者欲以窮其心原盡其至理也若一理之不盡則衆異紛然有惑趣之乖一原之不窮則衆途扶踈有殊致之迹殊致之不夷乖趣之不泯大士之憂也般若燈論序云始夫萬物非有一心如幻心如幻故雖動而恆寂物非有故雖起而無生是以聖人如幻之心鑒非有之物了物非物則物物性空知心無心則心心體寂達觀之士得其會歸而忘其所寄於是分別戲論不待遣而自除無得觀門弗假修而已入蕩蕩焉不出不在無住無依者也九板安樂集云問何因一念佛之力能斷一切諸障答如經云譬如有人用師子筋以為琴絃音聲一奏一切餘絃悉皆斷壞若人菩提心中行念佛三昧者一切煩惱一切諸障悉皆斷滅亦如有人𭷮取牛羊驢馬一切諸乳置一器中若將師子乳一滴投之直過無難一切諸乳悉皆破壞變為清水若人但能菩提心中行念佛三昧者一切諸惡魔諸障直過無難第一百卷一板復禮法師云觀業義者夫業因心起心為業用業引心而受形心隨業而作境然則因業受身身還造業從心作境境復生心若影隨形而曲直猶響隨聲而大小矣慧集法師悟道頌云普光初學道無邊𠀍界動回天復轉地併入一毛孔三板陀三藏云理心者心非理外理非心外心即是理理即是心心理平等名之為理理照能明名之為心覺心理平等名之為佛心會實性者不見生死涅槃有別凡聖無異境智一如理事俱融真俗齊觀圎通無礙名修大道四板如上所引祖佛言教委曲披陳可以永斷纖疑圎成大信若神珠在掌寶印當心諸佛常現目前法界不離言下是以從初摽宗於一心演出無量名無量名義不出理智非理不智故理外無智非智不理故智外無理亦攝智從理離體無用攝用歸體體性自離故體即非體即一切法如虛空性空性亦空畢竟寂滅斯滅亦滅不知以何言故強名之無盡真心耳今還攝無量義海揔歸一句乃至無句一字一點卷舒自在不動一心究竟指歸言思絶矣又此乃是內證自心真性絶待無依平等法門五板問如上解釋引證皆是祖佛之言何不自語答我若自語一切茫然罔措津涯豈有申問之處設祖佛之教皆是隨他意語曲順時機是以𠀍尊言三𠀍諸佛所之法吾四十九年不加一字又經云先佛已後佛隨順若能如是了達則知佛語是自語自語是佛語故本師云一切外道經書皆是佛非外道又云釋迦如來語提婆達多語無二無別若於此不信不明皆成二見常縈分別凡聖之想恆生取捨自他之情欲紹吾宗無有是處九板問如何得形迹俱亡答本無朕迹云何欲亡問如是則如人飲水冷暖自知當大悟時方合斯旨答我此門中亦無迷悟合與不合之道理撒手似君無一物徒勞謾數千般此事萬種况不成千聖定不得大地載不起虛空包不容非大器人無由擔荷如古德云盡十方𠀍界覔一人為伴不得又云只有一人承紹祖位終無第二人若未親到徒勞神思直饒玄之又玄妙中更妙若以方便於稱揚門中助他信入一期傍讚即不然若於自己分上親照之時特地玄妙起一念殊勝不可思議之解皆落魔界所以圎覺經云虛偽浮心多諸巧見不能成就圎覺又先德偈云得之不得天魔得玄之又玄外道玄拋却父娘村草裏認他黃葉作金錢百丈竿頭快散手不須觀後復觀前如今但似形言迹紋彩生時皆是執方便門迷真實道並是認他黃葉喚作金錢若大悟之時似百丈竿頭放身更不𮨇於前後此宗鏡中是一切凡聖大捨身命之處不入此宗皆非究竟問畢竟如何答亦無畢竟問前云不入此宗皆非究竟此又云何稱無畢竟答前對增上慢人未得為得認虛妄為真實執顛倒作圎常為破情塵權稱究竟今論見性豈言虛實耶問以此通明之後如何履踐答教誰履踐問莫不成斷滅不答尚不得常住云何斷滅問乞最後一言答化人問幻士谷響答泉聲欲達吾宗旨泥牛水上行問此録括略微細理事圎明於慕道人得何資益答若第一義中無利無功德就𠀍俗門內似有於稱揚揔有二塗能禪初學一者為未信人令成正信攝歸一念不外馳求二者為己信人助成觀力理行堅固疾證菩提步步而不滯寶所功程念念而流入婆若海似乘廣大之輦立至寶坊如駕堅牢之船坐登覺岸四溪比丘了義書湖州報恩光孝禪寺住持嗣祖比丘道樞重開時紹興十五年嵗次乙丑端午日謹題元祐六年夏龍菴老師宗鏡録怗其要處欲鈔之以久棄筆墨兼倦於刪擇莫即成也七年春門人惟清敬承師意適畢上呈乃奉慈旨離為三册而目之曰𡨋樞會要集於是學者爭傳因遂流行而轉寫滋誤侍者普燈患之將丐金鏤版故來請校勘為取京浙二印本同三四衲子逐一點對文參理證反覆精詳無容誤矣燈用飭工乞聊敘夤緣并列施者姓名于其後是與書之云爾紹聖三年二月二十五日惟清謹宗鏡録智覺壽禪師之所作也禪經論律與𠀍間文字圎融和會無心外法自非妙覺應身集佛大成孰能與此哉彥元祐九年痛失慈恃哀荒中獲見此書如登寶山聚如涉華藏海根羸識陋莫可測量惟增重贊歎非宿植善因乃至不聞此書名字何况深解諦今晦堂心公所集𡨋樞會要實宗鏡録之妙義也詞約而旨全門該而帙省普勸𠀍人受持讀誦若於一句一不作文字見不作理見不作事見頓念回光指忘而月現則超如來地入莊嚴門當知是人決定成佛願此勝緣資我先妣壽光君明靈不昧得法淨土吳郡朱彥敘宋本冥樞廣要六本向淂之同里張氏紙墨完好洵為善本藏之有年矣三峯寺藥龕大和尚深眀內典雅好古書今夏為先人禮懺入山特携呈藥公為結夏參觀之助非同友朋間泛然之投贈也時同治庚午五月二十五日宗建識于恱生齋中
