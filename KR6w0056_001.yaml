body:
  text: 黃龍庵主祖心集第一卷十板若欲研究佛乘披尋寶藏一一須消歸自己言言使𡨋合真心但莫執上之文隨語生見直須探詮下之旨契會本宗則無師之智現前天真之道不昧如華嚴經云知一切法即心自性成就慧身不由他悟十一板我此無礙廣大法門如虛空非相不拒諸相發揮似法性無身匪礙諸身䪺現須以六相該攝斷常之見方消用十玄門融通去取之情始絶又若實得一聞千悟獲大揔持即胡假言詮無勞解釋船筏為渡迷津之者導師因引失路之人凡𨵿一切言詮於圓宗所示皆為未了文字性離即是解脫迷一切諸法真實之性向心外取法而起文字見者今還將文字對治示其真實若悟諸法本原即不見有文字及絲毫發現方知一切諸法即心自性則境智融通色空俱泯當此親證圓明之際入斯一法平等之時又有何法是教而可離何法是祖而可重何法是䪺而可取何法是漸而可非則知皆是識心撗生分別所以祖佛善巧密布權門廣備教乘方便逗會才得見性當下無心乃藥病俱消教觀咸息十一板大涅槃經云若人聞大涅槃一字一句不作字相不作句相不作聞相不作佛相不作相如是者名無相相釋曰若云即文字無相是常見若云離文字無相是斷見若執有相相亦是常見若執無相相亦是斷見但亡情即離斷常四句百非一切諸見其旨自現當現入宗鏡之時何文言識智之能詮述乎所以先德云若覔經了性真如無可聽若覔法雞足山中問迦大士持衣在此山無情不用求專甲斯則豈可運見聞覺知之心作文字句之解若明宗達性之者雖廣披尋尚不見一字之相終不作言詮之解以迷心作物者生斯紙墨之見耳十二板以要言之但一切無邊差別佛事皆不離無相真心而有如華嚴經頌云佛住甚深真法性寂滅無相同虛空而於第一實義中示現種種所行事所作利益衆生事皆依法性而得有相與無相無差別入於究竟皆無相第三卷一板問悟道明宗如人飲水冷暖自知云何其行相答諸佛方便不斷今時密布深慈不令孤已明達者終不發言只為因疑故問因問故答楞伽會上為求法者親二通宗通為菩通為童蒙祖佛俯為初機少𡸁開示此約通只為從他覔法隨語生解恐執方便為真實迷於宗通是以分開二通之宗通者謂緣自得勝進相遠離言文字妄想乃至緣自覺趣光明輝發若親到自覺地光明發時得云如人飲水冷暖自知如群盲眼開分明照境驗象真體終不摸其尾牙見乳正色豈在談於鵠雪當此具眼人前若更示則非知時大法師也第四卷七板百門海云入法界者即塵緣起是法法隨智顯用有差別是界此法以無性故則無分劑融無二相同於真際與虛空等遍通一切隨處顯現無不明了然此一塵與一切法各不相見亦不相知何以故由各各全是圓滿法界普攝一切更無別法可知見也經云即法界無法界法界不知法界若如是更無別法可知見者云何言入以悟了之處名為入故又𨿽入而無所入若有所入則失諸法性空以無性理同故則處處入法界若約情智凡小所見隨染淨緣成十法界者即成其過若依華嚴性起法門悉為真法界若成若壞若垢若淨全成法界如經云分別諸色無量壞相是名上智者古釋云六道之色壞善壞定二乘之色壞因壞果菩之色壞有壞無佛色者壞上諸壞壞為法界非壞非不壞悉是法界第五卷六板隨染緣之時迷作阿賴耶隨淨緣之時悟成如來藏本末展轉唯是一心畢竟無別如無生義云衆生身中有涅槃即是末中含有本衆生是涅槃家用即是本中含有末貪欲即是道即是末中含有本貪欲即是道家用即是本中含有末故經云一切凡夫常在於定問言常在何定答言以不壞法性三昧故此是末中含有本法性中含有衆生即是本中含有末如氷與水八板勝思惟梵天所問經云梵天謂文殊言仁者所皆是真實文殊曰善男子一切言皆是真實問曰虛妄言亦真實耶答曰如是何以故是諸言皆為虛妄無處無方若法虛妄無處無方即是真實以是義故一切言皆是真實善男子提婆達多所有言與如來語無異無別何以故諸有言皆是如來言不出如故諸有言語所之事一切皆以無所故得有所先德云未念之時念則未生未生則是不有不有之法亦無自相現在之念從緣而生念若自有不應待緣待緣生故即無自體故知心無自性緣起即空如欲斷其流但塞其源欲免其生但斷其根不用多功最為省要第六卷八板問不覺妄心元無自體今已覺悟妄心起時無有初相則全成真覺此真覺相為復隨妄俱遣為當始終建立答因妄真真無自相從真起妄妄體本虛妄既歸空真亦不立九板問既云真心絶跡理出有無云何教中廣無生無相之旨答一心之門微妙難究功德周備理事圓通知解罕窮分別不及目為無相實無有法可稱無相之名詺作無生亦無有法以顯無生之理十板問以心為宗禪門正脉且心是名以何為體答近代以來今時學者多執文背旨昧體認名認名忘體之人豈窮實地徇文迷旨之者何契道原則心是名以知為體此是靈知性自神解不同妄識仗緣託境作意而知又不同太虛空廓斷滅而無知也問諸法所生唯心所現者為復從心而變為復即心自性答是心本性非但心變華嚴經云知一切法即心自性成就慧身不由他悟法華經偈云三千世界中一切諸群萌天人阿修羅地獄鬼畜生如是諸色像皆於身中現即知心性遍一切處所以四生九類皆於自性身中現以自真心為一切萬有之性故隨為色空周遍法界循業發現果報不同處異生則業海浮沉生死相續在諸聖則法身圓滿妙用無窮隱顯雖殊一性不動矣問若一切法即心自性云何又性亦非性答即心自性此是表詮由一切法無性故即我心之實性性亦非性者此是詮若能超遮表之文詮泯即離之情執方為見性己眼自然圓明第七卷三板夫無常有二一者敗壞無常二者念念無常人只知敗壞無常而不覺念念無常論云若動而靜似去而留經無常速疾猶似流動據理雖則無常前後不相往來故如靜也雖則念念謝往古今各性而住當處自寂故如留也又雖今古各性而住當處自寂而𭓩然念念不住前後相續也則非常非斷非動非靜見物性之原也古德問云各性而住似如小乘執諸法各有自性又何異衲衣梵志言一切衆生其性各異答為破去來明無去來所以據體言之故云各性而住非決定則以無性而為性不同外道二乘執有決定自性從此向彼若不執有定性去來亦不各性而住故論云言往不必往間人之常想稱住不必住釋人之所謂往耳又劉湛注云莊子藏山仲尼臨川莊子意明前山非後山夫子意明前水非後水半夜有力𧴥之而趨者即生住異滅四時念念遷流不停也是以若心外取法妄夢所見情謂去來則念念輪回心隨境轉尚不覺無常粗相焉能悟不遷之密旨乎若能見法是心隨緣了性無一法從外而入無一法從內而生無一法和合而有無一法自然而成如是則尚不見一微毫住相寧觀萬法往來斯乃徹底明宗透峯見性心心常合道念念不違宗去住同時古今一貫故法華經云我觀久遠猶若今日維摩經云法無去來常不住故若了此無所住之真心不變異之妙性方究竟明不遷矣七板是中無能現亦無所現物則妄心分別情計謂有然有即不有故云一切空無性常有常空是即萬物之自虛豈待宰割以求通哉因緣無性論云阿難調達並為世尊之弟羅睺善星同是如來之㣧而阿難常親給侍調達每興害逆羅睺則護珠莫犯善星則破器難收以此而推諒可知矣若云各有自性不可遷者此殊不然至如鷹化為鳩本心䪺盡橘變成枳前味永消故知有情無情各無定性但隨心變唯逐業生遂有從凡入聖之門轉惡為善之事八板首楞嚴三昧經云爾時長老摩訶迦葉語文殊師利言仁者乃能施作如此希有難事示現衆生文殊師利言迦葉於意云何是耆闍崛山誰之所造是𠀍界者亦從何出迦葉答言文殊師利一切𠀍界水沫所成亦從衆生不可思議業因緣出文殊師利言一切諸法亦從不可思議業因緣有我於是事無有功力所以者何一切諸法皆屬因緣無有主故隨意所成若能解此所為不難釋曰若了一切法悉屬因緣皆無自性但是心生則凡有施為何假功力以無性之理法爾之門隨緣舒卷自在無礙第八卷四板維摩經云我及涅槃是二皆空以何為空但以名字故空如此二法無決定性得是平等無有餘病唯有空病空病亦空無性緣生故空者雙𤗊前四句中兩種空也此二種空並離斷見謂定有則著常定無則著斷今緣生故空非是定無無性故空亦非定無定無者一向無物如龜毛兔角今但從緣生無性故非定無無性緣生故有者亦雙𤗊前四句中二有並非常見常見之有有是定性有今從緣有非定性有况由無性有豈定有耶從緣無性如幻化人非無幻化人幻化非真故亦云幻有亦名妙有以非有為有故名妙有又幻有即是不有有大品經云諸法無所有如是有故非有非不有名為中道是幻有真空是不空空者謂不空與空無障礙故是故非空非不空名為中道是真空經云空不空不可名為真空六板居見聞之地即見聞之不及處思議之際即思議之不測皆由不思議體自不可得故即思不可思經云所思不可思是名為難思第九卷三板華嚴疏云由迷境唯心方能現妄境正由無性方成萬境也故云諸法性如是應觀法界性者即真如理觀一切唯心造者即唯識事觀以理觀唯識之性諸佛證此為成佛之體以事觀唯識之相衆生達此為出離之門如華嚴演云良以一文之妙攝無遺一偈之功能破地獄故普賢菩告善財言我此法海中無有一文無有一句非是捨施轉輪王位而求得者非是捨施一切所有而求得者釋曰以一是一切之一故稱性之一故纂靈記云有京兆人姓王失其名本無戒行曾不修善因患致死被二人引至地獄地獄門前見一僧云是地藏菩乃教誦偈云若人欲了知三𠀍一切佛應觀法界性一切唯心造菩授經已謂之曰誦得此偈能破地獄苦其人誦已遂入見王王問此人有何功德答云唯受持一四句偈具如上王遂放免當誦此偈時聲所至處受苦之人皆得解脫後三日方憶持此偈向諸道俗之參驗偈文方知是華嚴經夜摩天宮無量菩雲集所即覺林菩偈意明地獄心造了心造佛地獄自空耳故知若觀此心言下離苦不唯破地獄界乃至十法界一時破以入真空一際法故則平等真法界無佛無衆生此非妙術神通假於他勢以法如是故可驗自心不可思議神妙之力高而無上淵而不深延而不長促而非短廣而無相顯而無蹤有而不常無而不滅照體獨立稱性普周妙萬物故稱之為神孕一切故名之為母統御該攝通變無窮任照忘疲若明鏡之寫像應緣無作猶虛谷之傳聲居方而方相分明處圓而圓文顯現在悟而悟成諸佛墮迷而迷作衆生跡任千途本地不動七板經云舍利弗問何故諸賢復發此言從今日始不以佛為聖師諸比丘報曰從今日始自在其地不在他鄉自歸於己不歸他人以為師主不用他師是以故往不以佛為聖師乃至於是𠀍尊讚諸比丘善哉善哉其於諸法無所得者乃為真得此乃但可自知方見真實所以千聖拱手作計校不成七板問若言無師自證者即墮自然之計執從他解者仍涉因緣之門且大道之性非是自然亦非因緣云何開示而乖道體答為破他求故須自證為執自解故從他印可若當親省之時迷悟悉空自他俱絶非限量之所及豈言論之能詮所以牛頭初祖云夫道者若一人得之道即不遍若衆人得之道即有窮若各各有之道即有數若㹅共有之方便即空若修行得之造作非真若本自有之萬行虛設何以故離一切限量分別故明知自他言得失者若約聖教則是隨𠀍語言破執方便若依意解盡是限量分別不出情塵但不執教以徇情則方見性而達道問初心學人悟入此宗信解圓通有何勝力答若正解圓明決定信入有超劫之功獲䪺成之力雖在生死常入涅槃恆處塵勞長居淨剎現具肉眼而開慧眼之光明匪易凡心便同佛心之知見如太子具王儀之相似迦陵超衆鳥之音將師子筋為琴絃餘音斷絶似善見藥而治病衆患消若那羅箭之功勢穿䥫鼓似金剛鎚之力擬碎金山則煩惱塵勞不待斷而自滅菩提妙果弗假修而自圓乃至等冤親和諍論齊凡聖泯自他一去來印同異融延促混中邊𠀍出𠀍間不可稱不可量不可不可之力莫能過者亦名佛力亦名般若力亦名大乘力亦名法力亦名無住力所以先德釋云無住力者則持大劫不離一念又云色平等是佛力色既平等則唯心成故知觀心之門理無過者最尊最貴絶妙絶倫有剎那成佛之功䪺絶苦輪之力十五板入法界體性經云文殊師利復白佛言以何因緣名以三昧為寶積耶佛告文殊師利譬如大摩尼寶善磨瑩已安置淨處隨彼他方出諸珍寶不可窮盡如是文殊師利我住三昧觀於東方見無量阿僧祇𠀍界現在諸佛如來阿羅訶三藐三佛陀如是南西北方四維上下如是十方無量阿僧祇𠀍界我皆現見是諸如來住此三昧為衆法文殊師利我住此三昧不見一法然非法界釋曰寶積三昧者即一切衆生心是無量功德聚猶如𠀍間寶積若能住此一心寶積三昧有何功德寶而不知故能見十方佛寶普照無餘所以云不見一法然非法界是以萬類之中唯心為貴第十卷一板夫凡聖一心境界如何是自在出生無礙之力答一是法爾二由諸佛菩行願三即衆生信解自業感現又揔具十力一法如是力二空無性力三諸佛神力四菩善根力五普賢行願力六衆生淨業力七深信勝解力八如幻法生力九如夢法生力十無作真心所現力九板不壞者諸法緣集起無所從不異真如故不可壞如鏡中影以因鏡故不可壞也十二板問今宗鏡録以録為者是約法相宗立約法性宗立答若約因緣對待門以法相宗即本識為鏡如楞伽經云譬如明鏡現衆色像現識處現亦復如是現識即第八識以法性宗即如來藏為鏡如起信論云復次覺體相者有四種大與虛空等猶如淨鏡又占察善惡經立二種觀門為鈍根人立唯心識觀為利根人立真如實觀又起信論云心若馳散即當攝來令住正念其正念者當知唯心無外境界即復此心亦無自相念念不可得故若唯心識觀及正念唯心當法相宗若真如實觀與其心念念不可得即法性宗若約法性融通門皆歸一旨無復分別今論正宗取勝而言約法性宗若揔包含如海納川以本攝末豈唯性相無有一法而遺所照問此宗鏡如何信入答但不動一心不住諸法無能所之證亡智解之心則是無信之信不入之入十三板大法炬陀羅𡰱經云佛言憍尸迦如來弟子見諸世間猶如幻化無有疑網所以者何彼信如來即自見法是故自信不唯信他何以故若世間人既自見已彼人終不更取他言憍尸迦如人裸露在道而行設有一人語衆人言此人希有錦衣覆身憍尸迦於意云何彼雖有言自餘衆人信此言不不也𠀍尊何以故眼親見故佛言如是如是憍尸迦諸佛如來諸有弟子自見法故不取他言其亦爾第十一卷四板大乘本生心地觀經觀心品云文殊師利白佛言𠀍尊如佛所唯將心法為三界主心法本元不染塵穢云何心法染貪嗔癡於三𠀍法誰為心過去心已滅未來心未至現在心不住諸法之內性不可得諸法之外相不可得諸法中間都不可得心法本來無有形相心法本來無有住處一切如來尚不見心何況餘人得見心法一切諸法從妄想生以是因緣今者𠀍尊為大衆三界唯心願佛哀愍如實解爾時佛告文殊師利言如是如是如汝所問心心所法本性空寂我衆喻以明其善男子心如幻法由遍計生種種心想受苦樂故心如水流念念生滅於前後𠀍不暫住故心如大風一剎那間遍歷方所故心如燈熖衆和合而得生故心如電光須之頃不久住故心如虛空客塵煩惱所覆障故心如猿猴遊五欲樹不暫住故心如𦘕師能𦘕𠀍閒種種色故心如僮僕為諸煩惱所䇿役故心如獨行無第二故心如國王起種種事得自在故乃至善男子如是所心心所法無內無外亦無中間於諸法中求不可得去來現在亦不可得九板問一心平等理絶偏圓云何教中又諸法異答隨情異雖異而同對執同雖同而異將同破異將異破同雖同雖異非異非同如云捉子之矛刺子之楯亦如騎賊馬逐賊以聲止聲所以云朝四暮三令衆狙而喜恱苦塗水洗養嬰兒以適時皆是俯順機冝善權方便如莊子云勞神明為一而不知其同也謂知朝三第十二卷四板問唯心妙旨一切無名者若衆生之號乃假施為諸佛之名豈虛建立答因凡立聖聖本無名從俗顯真真元不立並依𠀍俗文字對待而生文字又空空亦無寄若是上機大士胡假名相發揚對境而念念知宗遇緣而心心契道如大智度論云如經師子雷音佛國寶樹莊嚴其樹常出無量法音所謂一切法畢竟空無生無滅等其土人民生便聞此法音故不起惡心得無生法忍當此之時何處有三寶名字但了無生之旨自然一體三寶常現𠀍閒若取差別之名即失真常之理但了一切法無自性則一切處佛出𠀍無一法而非宗七板古德歌云只為無心學無學亦復正修於不修若人不知如此處不得稱名為比丘洞山和尚云吾家本住在何方鳥道無人到處鄉君若出家為釋子能行此路萬相當所以初祖大師云若一切作處即無作處無作法即見佛若見相時則一切處見鬼何者若作時無作者無作法即人法俱空覺此成佛若迷無作法則幻相現前故經云凡所有相皆是虛妄如熱病所見豈非鬼耶九板以理在一為內在多為外事亦以一為內以多為外何故如是一多內外相遍相在而無障無礙唯是一心圓融故寄理事以彰之以體寂故目之為理以用動故目之為事以理是心之性以事是心之相性相俱心故所以一切無礙第十三卷一板由此真理全為事故如事顯現如事差別大小一多變易無量又此真理即與一切千差萬別之事俱時歷然顯現如耳目所對之境亦如芥瓶亦如真金為佛菩比丘及六道衆生形像之時與諸像一時顯現無分毫之隱亦無分毫不像今理性亦爾無分毫隱亦無分毫不事不同真空但觀理奪事門中唯是空理現也故菩雖復看事即是觀理四板先德云證佛地者為塵空無我無性是也乃至稱理而言非智所知如空中鳥飛之時迹不可求依止跡處也然空中之迹既無體相可得然迹非無此迹尋之逾廣要依飛鳥方詮迹之深廣當知佛地要因心相而得證佛地之深廣然證入此地不可住於寂滅一切諸佛法不應爾當示教利喜學佛方便學佛智慧夫佛智慧者即一切種智所以般若經中以種智為佛則無種不知無種不見斯乃以無知知一切知以無見見一切見十板問如何是一切法皆是佛法答一切法唯心心即是佛心即是法如學人問忠國師經云一切法皆是佛法殺害還是佛法不答一切施為皆是佛智之用如人用火香臭不嫌亦如其水淨穢非污以表佛智也是知火無分別蘭艾俱焚水同上德方圓任器所以文殊執劒於瞿曇鴦掘持刃於釋氏豈非佛事乎若心外見法而生分別直饒廣作勝妙之事亦非究竟第十四卷一板夫釋迦文佛開衆生心成佛知見達磨初祖直指人心見性成佛若體此一心云何是成佛之理答一心不動諸法無性以無性故悉皆成佛華嚴經云佛子如來成正覺時於其身中普見一切衆生成正覺乃至普見一切衆生入涅槃皆同一性所謂無性無何等性所謂無相性無盡性無生性無滅性無我性無非我性無衆生性無非衆生性無菩提性無法界性無虛空性亦復無有成正覺性知一切法皆無性故得一切智大悲相續救度衆生佛子譬如虛空一切𠀍界若成若壞常無增減何以故虛空無生故諸佛菩提亦復如是若成正覺不成正覺亦無增減何以故菩提無相無非相無一無種種故佛子假使有人能化作𢘆河沙等心一一心復化作𢘆河沙等佛皆無色無形無相如是盡𢘆河沙等劫無有休息佛子於汝意云何彼人化心化作如來凡有幾何如來性起妙德菩言如我解於仁者所化與不化等無有別云何問言凡有幾何普賢菩言善哉善哉佛子如汝所設一切衆生於一念中悉成正覺與不成正覺等無有異何以故菩提無相故若無有相則無增減佛子菩摩訶應如是知成等正覺同於菩提一相無相六板華嚴經直以全佛果不動智等十智如來示凡信修如有凡夫䪺升寶位身持王位遍知臣正一切群品無不該含華嚴經中法門菩行相亦復如是從初發心十住之始䪺見如是如來法身佛性無作智果遍行普賢一切萬行隨緣不滯悉皆無作九板百門海云發菩提心者今了達一切衆生及塵毛等無性之理以成佛菩提智故所以於佛菩提身中見一切衆生成等正覺又衆生及塵毛等全以佛菩提之理成衆生故所以於衆生菩提中見佛修菩提行是故佛是衆生之佛衆生即佛之衆生縱有開合終無差別如是見者名菩提心起同體大悲教化衆生也又䇿林問云衆生為迷諸佛為悟體雖是一約用有差若以衆生通佛佛亦合迷若以佛通衆生衆生合悟答𢘆以非衆生為衆生亦以非佛為佛不礙存而𢘆奪不妨壞而常成隨緣且立衆生之名豈有衆生可得約體權施法身之號寧有諸佛可求莫不妄徹真原居一相而𢘆有真該妄末入五道而𢘆空情談則二界難通智乃一如易就然後雙非雙是㸦壞㸦成見諸佛於衆生身觀衆生於佛體仰山和尚問溈山禪師云真佛住何處溈山云以思無思之妙反思靈焰之無窮思盡還原性相常住事理不二真佛如如斯則無住無離能見真佛履平等道矣故云六道之道離善之惡離惡之善二乘之道離漏之無漏菩之道離邊之中諸佛之道無離無至何以故一切諸法即是佛道故所以先德云夫大道唯心即心是佛只依一心而修即是根本之智亦是無分別智即能分別無窮自具一切智故不同起心遍計故知凡有心者悉皆成佛如今行是佛行坐是佛坐語是佛語默是佛默所以云阿鼻依正常處極聖之自心諸佛法身不離凡下之一念此非分得可謂全收以不信故决定為凡以明了故舊來成佛然成佛之約性虛玄隨相對機即有多種十二板如悟入宗鏡中成佛不離一念若前念是凡後念是聖此猶別教所收今不動無明全成正覺故華嚴論云如將寶位直授凡庸如夜夢千秋覺以隨滅傅大士白梁武帝云今欲將如意寶珠清淨解脫照徹十方光色微妙難可思議意欲施於人主若受者疾至阿耨多羅三藐三菩提故知若一念决定信受者不隔剎那便登覺位如維摩經云維摩詰言然汝等便發阿耨多羅三藐三菩提心是即出家是即具足又法華經云爾時龍女有一寶珠價直三千大千𠀍界持以上佛佛即受之龍女謂智積菩尊者舍利弗言我獻寶珠𠀍尊納受是事疾不答言甚疾女言以汝神力觀我成佛復速於此故知一切含生心珠朗耀理無前後明珠隨機或因鬪而隱膚中對明鏡而顯現或因遊而沉水底在安徐而得之或處輪王髻中建大功而受賜或繫貧人衣裏醒智願而猶存宗鏡明文同證於此如是信者究竟無餘即是一念知一切法是道場成就一切智故據此諸聖開示心佛了然設有抱疑退屈之者雖未信受若成佛之理未曾暫如人不識真金認為銅䥫銅䥫但有虛名金性未曾暫變如今執者不知本是却謂今非亦匪昔迷而方始悟如上廣引委曲證明只謂即生死中有不思議性於塵勞內具大菩提身以障重之人聞皆不信甘稱絶分唯言我是凡夫既不能承紹佛乘弘持法器遂乃一向順衆生之業背覺合塵生死之海深煩惱之籠轉密所以遍集祖佛言教䪺釋群疑令於言下發明直見無生自性方知與佛無異萬法本同始信真詮有茲深益問六祖云善惡都莫思量自然得入心體洞山和尚云學得佛邊事猶是錯用心今何廣論成佛之旨答今宗鏡録正論斯義以心𡨋性佛理合真空豈於心外妄求隨他勝境如華嚴記云若達真空尚不造善豈况惡乎若邪空謂豁達無物或言無礙不妨造惡若真知空善順於理恐生動亂尚不起心慕善惡背於理以順妄情豈當可造若云無礙不礙造惡何不無礙不礙修善而斷惡耶猒修善法尚恐有著心恣情造惡何不懼著明知邪見惡衆生也乃至入理觀佛猶恐起心更造業思特違至理故楞伽經云佛告大慧前聖所知轉相傳授妄想無性菩摩訶獨一靜處自覺觀察不由於他離見妄想上上升進入如來地是名自覺聖智相又云一切無涅槃無有涅槃佛無有佛涅槃遠離覺所覺是相能覺是見遠離覺所覺名自覺聖智以亡能所處成佛故夫限量所知從他外學欲窮般若海莫得其原如於𢘆河中投一升鹽水無鹽味飲者不覺若內照發明徹法原底無理不照無事不該如經云佛言我住於無念法中得如是黃金色身三十二相放大光明照無餘𠀍界第十五卷七板問若不具神變將何攝化答若純取事相神通有違真趣如輔行記云修三昧者忽發神通須急之有漏之法虛妄故也故止觀云能障般若何者種智般若自具諸法能泯諸相未具已來但安於理何須事通若專於通是則障理又不唯障理反受其殃如鬱頭勝意之徒即斯類矣夫言真實神變者無非演一乘門談無生理一言契道當生死而證涅槃目擊明宗即塵勞而成正覺剎那而革凡為聖須而變有歸空如此作用豈非神變耶所以寶積經云文殊師利白佛言𠀍尊夫法者為大神變若是下劣根機之者諸佛大慈不令孤弃一期方便黃止啼如維摩云以神通慧化愚癡衆生若上上根人只令觀身實相觀佛亦然如昔有彭城王問諸大德等貴若證果即得成聖者與我左腋出水右腋出火飛騰虛空放光動地我即禮拜汝為師牛頭融大師答云善哉善哉不可思議今若責我如此證果者恐與道乖審如是成佛者幻師亦得作佛且與諸大德及諸人士證者昔釋迦在於僧中演無上道與僧不異維摩在俗解脫果與俗不殊勝鬘女人大乘法女相不改善星比丘行闡提行僧相不移此乃證據其內心解與不解以為差隔何𨵿色身男女相貌衣服好醜若言形隨證改貌逐悟遷是聖者則瞿曇形改方成釋迦維摩相遷乃成金粟即知證是心證非是形遷悟是智變非𨵿相異譬如𠀍閒任官之人為遷改官官高豈即貌別又古云不改舊時人只改舊時行履處設或改形換質千變萬化皆是一心所為乃至神通作用出沒自在易小令大展促為長豈離一心之內故知萬事無有不由心者但證自心言下成聖若不識道具相奚為故金剛經云若以三十二相見如來者轉輪聖王即是如來又偈云若以色見我以音聲求我是人行邪道不能見如來古人云若不達此理縱然步步腳踏蓮華亦同魔作龐居士偈云色聲求佛道結果反成魔若决定取神通勝相作佛者不唯幻士成聖乃至天魔外道妖𤜶精魅鬼神龍蜃等皆悉成佛彼咸具業報五通盡能變化故若不一一以實相勘之何辨真僞但先悟宗鏡法眼圎明則何理而不通何事而不徹一切佛事攝化之門自然成就十一板清涼華嚴疏曰經云了知境界如幻如夢如影如響亦如變化若諸菩能與如是觀行相應於諸法中不生二解一切佛法疾得現前初發心時即得阿耨多羅三藐三菩提知一切法即心自性成就慧身不由他悟者夫初心為始正覺為終何以初心便成正覺故云知一切法即心自性故覺法自性即名為佛故經頌云佛心豈有他正覺覺𠀍間斯良證也斯則發者是開發之發非發起之發也何謂現前之相夫佛智非深情迷謂遠情亡智現則一體非遙既言知一切法即心自性則知此心即一切法性今理現自心即心之性已備無邊之德矣成就慧身者上觀法盡也正法當興今諸見亡也佛智爰起覺心則理現理現則智圎若鏡淨明生非前非後非新非故寂照湛然不由他悟者成就慧身即無師自然智也又不由他悟是自覺也知一切法是覺他也成就慧身為覺滿也成就慧身必資理發見夫心性豈更有他若見有他安稱為悟既曰心性自亦不存寂而能知名為正覺故法華經云為一大事因緣故出現於𠀍開示悟入佛之知見夫一者古今不易之一道大者是凡聖之心體故十方諸佛為此一大事出現於𠀍皆令衆生於自心中開此知見若立種種差別是衆生知見若融歸一道是二乘知見若一亦非一是菩知見若佛知見者當一念心開之時如千日並照不俟更言即是祖師西來即是諸佛普現故云念念釋迦出𠀍步步勒下生何處於自心外別求祖佛則知衆生佛智本自具足若欲起心別求即成遍計之性故六祖云本性自有般若之智自用智慧觀照不假文字若如是者何用更立文字今為未知者假以文字指歸今見自性若發明時即是豁然還得本心於本心中無法不了第十六卷五板問若一切衆生即心是佛者則諸佛何假三祇百劫積功纍德方成答為復學一乘實法為復趣五性權機此論自證法門非述化儀方便且楞伽經有四佛一化佛二報生佛三如如佛四智慧佛隨機赴感名之為化酬其往因名之為報本覺顯照名曰智慧理體無二故曰如如華嚴經明十種佛所謂於安住𠀍間成正覺佛無著見願佛出生見業報佛深信見住持佛隨順見涅槃佛深入見法界佛普至見心佛安住見三昧佛無量無依見本性佛明了見隨樂佛普授見又佛㹅具十身一衆生身二國土身三業報身四聲聞身五緣覺身六菩身七如來身八智身九法身十虛空身若別依五教隨教不定一小乘教有二身佛一生身二法身二大乘初教有三身佛一法身二應身三化身三終教有四身佛一理性身二法身三報身四應化身四䪺教唯一佛身一實性佛五一乘圎教有十身佛又約性成佛五教差別不同小乘唯悉達一人為佛性初教半成半不成以有性無性分故為佛終教凡有心者當得作佛除草木等䪺教無佛無性離言相為佛圎教無所不有佛性以三種𠀍間皆是為佛若三種𠀍間皆是為佛者則內外心境無非佛矣又約心成佛小乘以善心修所得為佛初教以心性為佛終教以心性相泯為佛䪺教以心本不生為佛圎教以心無礙無盡為佛又天台四教佛一藏教佛二通教佛三別教佛四圎教佛若以如如佛心佛本性佛誰人不具若以國土身法身虛空身何法不圎則處處而皆是寶坊丘陵誰立念念而咸成證覺妄想何分如盲者不覩光明非朝陽夕𩲸之過咎似小果不聞圎䪺豈佛心妙旨之親踈但以法弱由於根微道廣在乎量大淺機自感妙有證作無常薄福所冝珍寶化為瓦礫空迷己眼錯認他身分實際以千差致化儀之百變六板華嚴經云不離覺樹而升釋天者疏釋云佛得菩提智無不周體無不在無依無住無去無來然以自在即體之應應隨體變緣感前後有住有升𨶒浮有感見在道樹天宮有感見升天上非移覺樹之佛而升天宮故云不離覺樹而升釋殿法慧偈云佛子汝應觀如來自在力一切𨶒浮提皆言佛在中此不離也我等今見佛住於須頂此而升也不思議經云若我分別佛即現前若無分別都無所見想能作佛離想無有如是三界一切諸法皆不離心十一板就佛身上自有十身一菩提身二願身三化身四力持身五相好莊嚴身六威勢身七意生身八福德身九法身十智身第十七卷二板但悟本體五現量識一切萬行皆悉具足即是菩提如涅槃經云一切衆生本來成佛無漏智性本自具足又䪺從漸得名俱稱方便古釋云若據䪺亦是方便若云䪺漸俱是亦謗於佛俱不是亦謗於佛是以本覺體上離䪺離漸離言何處有䪺漸名字第六識動有分別不動即等周法界五現量識等一一根皆遍法界眼見色時色不可得元來等法界法華經云是法住法位𠀍間相常住即知𠀍間一切諸相本來常住何行位能知唯佛於道場知已導師方便為衆生迷不知故若知不俟更方知有皆屬方便六板佛在時三人為伯仲聞毗耶離國女名菴羅婆利舍衛國有女須曼那王舍城女名優鉢羅盤那有三人各各聞人讚三女端正無比晝夜專念心著不捨便於夢中夢與從事覺已心念彼女不來我亦不往而事得辦因是而悟一切諸法皆如是耶於是往到陀婆羅菩所問是事陀婆羅答諸法實爾皆從念生如是種種為此三人方便巧諸法空是時三人即得阿致是知人不來往而樂事宛然當如是念佛九板問三寶如虛空相非見聞之所及者教中云何見道又稱見佛答約本智發明假稱名見非眼所覩唯證乃知離見非見方明真見十板大涅槃云有業有報不見作者如是空法名第一空所以見性之時性本離念非有念而可除觀物之際物本無形非有物而可遣故云離念之智等虛空界第十八卷四板問衆生業果種子現行積劫所熏猶如膠漆云何但了一心䪺斷成佛答若執心境是實人法不空徒經萬劫修行終不證於道果若䪺了無我深達物虛則能所俱消有何不證猶如微塵揚於猛風輕舸隨於迅流只恐不信一心自生艱阻若入宗鏡何往不從且如勇施菩因犯欲尚悟無生性比丘𡰱無心修行亦證道果何況信解一乘之法諦了自心而無尅證乎或有疑云豈不斷煩惱耶解云但諦觀煞盜妄從一心上起當處便寂何須更斷是以但了一心自然萬境如幻何者以一切法皆從心幻生心既無形法何有相所以高城和尚歌云教本窮無相理廣讀元來不識心識取心了取境識心了境禪河靜若能了境便識心萬法都如闥婆影第十九卷一板因覺有不覺若無真妄無所依故如煙無火不起又覺因不覺若隨器之金還待器顯事能顯理故所以唯真不立單妄不成唯真不立者佛果無生故單妄不成者無所依故二板處胎經云魔梵釋女皆不捨身不受身悉於現身得成佛故偈云法性如大海不有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌五板寶篋經云佛界衆生界一界無別界此是圎智圎覺諸法遍一切處無不明了雖五無間皆生解脫想雖惛盲倒惑其理存焉斯理灼然𠀍間常住有佛不能益無佛不能得之不為高失之不為下故言衆生即佛此理也六板經云衆生身中有佛三十二相八十種好坐寶蓮華與佛無異但為煩惱所覆故未能得用此是具有佛知見根性未有知見用即時猶故愚乃至譬如小兒具有大人六根與大人不異在其身中而未能有大人用至漸長大復須學問乃有大人知見力用也若根性是有作用豈無如種子本甘結果非苦只恐不知有自認作凡夫真性常了然未曾暫隱覆如佛言如來實無祕藏何以故如秋滿月處空顯露清淨無翳人皆覩見十板李長者論云此華嚴經云為十住為見道十行十向十地十一地為加行修行令慣熟故佛果於初先現以普賢悲願令智悲大用慣熟自在故以自如來根本普光明智光現故始終本末揔無延促時日分劑故以法身根本智如實而言不同三乘權教情所解故皆須約本而觀之畢竟佛果慣習已成普賢行願已滿一往但以教化一切衆生為常𢘆從初至末無始無終無成無壞但以普遍十方一切六道以智對現利生為永業也第二十卷七板大集經云住一心中能知一切衆生諸心觀衆生心悉皆平等如幻化相本性清淨觀諸衆生身業平等皆如水月見諸衆生悉在己身己身亦在衆生身中猶如影現能令衆生悉作佛身亦令己身作衆生身一切無有能轉動者又經頌云諸佛一似大圓鏡我身猶若摩尼珠諸佛法身入我體我身常入諸佛軀雖然互入而無所入若有所入即成二法八板維摩經觀衆生品文殊師利問維摩詰言菩云何觀於衆生維摩言譬如幻師見所幻人菩觀衆生為若此如智者見水中月如鏡中見其面像如熱時炎如呼聲響如空中雲如水聚沫如水上泡如芭焦堅如電久住如第五大如第六䕃如第七情如十三入如十九界菩觀衆生為若此如無色界色如焦穀芽如須陀洹身見如阿那含入胎如阿羅漢三毒如得忍菩貪恚毀禁如佛煩惱習如盲見色如入滅盡定出入息如空中鳥迹如石女兒如化人煩惱如夢所見已窹如滅度者受身如無煙之火菩觀衆生為若此文殊師利言若菩作是觀者云何行慈維摩詰言菩作是觀已自念我當為衆生如斯法是即真實慈也淨名私記釋云今明觀衆生品大精只依其中一句行則足得一句攝心常照行之一切萬行足只令汝自觀觀汝身心如此畢竟空則是菩觀衆生菩名道道能通通汝色心本性令離虛妄即是菩菩只在汝身中觀汝身心如第三手為畢竟無身心九板天台淨名疏釋不觀色不觀色如不觀色性不觀色者心如幻師幻作種種色若知幻師是誑則不得所幻之色今色從心幻師幻出尚不得此心何處見有此色故不應觀色不觀如者若見色與如異是則泯色入如今不見色如之別故不觀如不觀性者即不觀佛性不觀色是空俗不觀如是空真不觀佛性是空中道以其計中道有佛性而起順道愛生是為頂墮故經云我及涅槃是二皆空唯有空病空病亦空今不觀性是無順道愛故夫受𠀍間差別果報皆為一念心異分別情生取衆生相為凡執諸佛境為聖如經所觀衆生如幻師見幻觀如來則三際體空二見於是雙消情量為之俱泯則可以成諸佛之喜除菩之憂信此一心能入宗鏡第二十一卷五板於一心實相中不見有𠀍間過患障礙之法則何所捨亦不見有出𠀍殊勝尊妙之法則何所取得自己法身之髓到一心智海之原初阿已攝無邊過茶無字可七板淨名經云佛怒癡性即是解脫又云不斷怒癡亦不與俱故云得之者隱傍之者現若於怒癡情生味著得其事者則道隱若傍善觀之了其性者則道現雖了而不著故云亦不與俱若非久行根熟菩方能理事無礙如先德偈云久種善根深逢塵塵不侵不是塵不侵自是我無心清涼疏問法性身土為別不別別則不名法性性無二故不別則無能依所依答經論異統收法身略有十種一依佛地論唯以清淨法界而為法身亦以法性而為其土性雖一味隨身土相而分二別智度論云在有情數中名為佛性在非情數中名為法性假能所而實無差唯識論云雖此身土體無差別而屬佛法性相異故謂法性屬佛為法性身法性屬法為法性土性隨相異故云爾也今言如虛空者唯識論云此之身土俱非色攝雖不可形量大小然隨事相其量無邊譬如虛空遍一切處故如虛空言通喻身土十板肇法師云萬事萬形皆由心成心有高下故丘陵是生又云佛土常淨豈待變而後飾蓋是變衆人之所見耳是以衆生見為土石山河皆是自業之影起菩純為妙慧即是真智之所為離凡聖心無真俗境如華嚴論云此華嚴經明緣起法界門理事無二無緣不寂無事不真十方𠀍界一真性海大智圎周為國土境界揔為性海為一真法界非有情無情隨業故為華嚴中純真境界揔為智故十住菩以慧為國十行菩以智為國十回向十地以妙為國不情與無情二見差別以華嚴經為彰本法異三乘權學教故是無情是有情有生有滅故十三板夫一切諸法隨緣幻生體用俱無隱顯起或多中現一一中現多若不知起盡之根原則任運但隨境轉或隨好境而欣集或逐惡緣而怖生若能明了一切凡聖等法悉是自心境界以此一印衆怖消所以持地經云佛告阿逸多菩於一切法於一菩法莫生恐怖於一切辟支佛法亦莫恐怖於一切聲聞法亦莫恐怖於一切凡夫法亦莫恐怖乃至於靜於亂亦莫恐怖於假於實亦莫恐怖於信不信亦莫恐怖於善念不善念亦莫恐怖於住不住亦莫恐怖如是菩於一切法莫生恐怖阿逸多我於往昔修如是等無畏法故得成正覺悉能了知一切衆生心之境界而於所知不起知相以我所證隨機演能令聞法諸菩等獲得光明陀羅𡰱印得法印故永不退轉釋曰了一無畏法能除五怖畏入此一心門當生歡喜地第二十二卷四板不動真際建立諸法則性不可壞不壞假名而實相則相不可壞斯則天魔外道等皆法印故無能壞且五逆四魔尚法界印況無漏淨智一真相好而能障實相之妙旨耶六板寶積經化樂天王白佛言𠀍尊彼實際者遍一切處無有一法而非實際𠀍尊謂菩提者亦是實際𠀍尊何者是菩提一切法是菩提離自性故乃至五無間業亦是菩提何以故菩提無自性五無間業亦無自性是故無間業亦是菩提是以了心本性自體無生從無生中建立諸法觀無性之心無性之教隨淨緣而無性成佛隨染緣而無性為凡不見纖塵暫出性空之理未有一念能違平等之門所以大般若經偈云有法不成有法無法不成無法有法不成無法無法不成有法八板問菩提即自身心者云何教中菩提者不可以身心得答夫言菩提之道即心者乃是自性清淨心湛然不動蓋是正覺無相之真智其道虛玄妙絶常境聰者無以容其聽智者無以運其知辨者無以措其言像者無以狀其儀以迷人不了執色隂為自身認能知為自心故云菩提者不可以身心得也十板經云佛言菩提心者非有非造離於文字菩提即是心心即是衆生若能如是解是名菩修菩提心是則心外無菩提何所求耶菩提外無心何所得耶第二十三卷一板問有念即衆生無念即佛云何言凡聖一等答衆生雖起念不覺念本無念與佛無念等妄墮有念中佛得無念知念本無衆生雖現在念中佛知念即無念斯佛無念與衆生無念同又以衆生不知念空於念成事似有差別若實了念空則於苦樂境不生執受何者以境從念生心空則境何有既無有境相縛自除能所俱空誰生取著既不取著生死自無如經云知是空華即無流轉亦無身心受彼生死二板最勝王經云佛言修菩提行者於諸聖境體非一異不捨於俗不離於真依於法界行菩提行時善女天白佛言𠀍尊如上所菩提正行我今當學時梵天王問曰此菩提行難可修行汝今云何於菩提行而得自在善女天曰我今依於此法而得安樂住是實語者願令一切五濁惡𠀍無量無數無邊衆生皆得金色三十二相非男非女坐寶蓮華受無量樂乃至作是語已一切五濁惡𠀍所有衆生皆悉金色具大人相非男非女坐寶蓮華受無量樂猶如他化自在天宮問如常所論猶敘古引文如何是即今之佛答如今一念才起了不可得無有處所是過去佛過去不有未來亦空是未來佛即今念念不住現在佛但一念起時莫執莫斷不取不捨則三際無蹤一念圎具十法界非因非果而因而果之法若能如是一念而達者則念念相應念念成佛凡聖悉等今古皆齊故云了了識心惺惺見佛是佛是心是心是佛念念佛心心心念佛欲得早成戒心自律淨戒律心淨心即佛除此心王更無別佛欲求萬法莫染一物心性雖空貪嗔體實入此法門端坐成佛三板問一念成佛已入信門如何得目前了了分明而見答目前無物是真見佛如文殊師利巡行經以經中文殊遍巡五百比丘房皆見寂定因以為名最後難舍利弗以顯甚深般若問舍利弗言我時見汝獨處一房結加趺坐折伏其身汝當為坐禪耶不耶答云坐難云為當欲令未斷者斷故坐禪耶等因此廣顯性空無得之理意五百比丘從坐而起於𠀍尊前高聲唱言從今已去更不復見文殊身不復聞其名字如是方處速應捨離所有文殊一切住處亦莫趣向所以者何文殊煩惱解脫一切故等舍利弗令文殊為决了文殊言實無文殊而可得故若實無文殊而可得者彼亦不可見等廣為法四百比丘漏盡得果一百比丘更謗陷入地獄後還得道廣如彼所以無見是真見無聞是真聞不見不聞文殊是真見真聞文殊矣若不信此雖起謗而陷獄以曾聞故終熏種而得道何况聞而信耶則成道不隔於一念故知宗鏡見聞無不獲益矣六板問既衆生已成理事圎備則諸佛何以出𠀍更化衆生答衆生不如是知所以須化故經云俱同一性所謂無性大悲相續救度衆生隨門不同種種有異約成佛門一切成也同一無性故得現成妄性本虛生元是佛真性叵得非今始成故皆成也物物無性故成種智證斯同體而起大悲一得永常故云相續只由不知無性故教化不絶雖現報化法體不遷如隨色之摩𡰱衆相現而本體不動似應聲之虛谷群響發而起處無心不著自他豈見衆生之相本非出沒常𡨋大覺之原八板問絶待真心本無名相云何成佛又作異生若云隨順𠀍法立此假名又因何法而得成立答實際理中本無凡聖可得以一切衆生迷無性理以無性故不覺起妄於真空中妄立名相故名為凡了名相空復稱為聖凡聖之號因五法成猶如幻化名相非真且如幻以術成形因業有術業俱假形幻同空但有迷悟之名本無凡聖之體五法者瑜伽論云一名二相三妄想四正智五真如古釋云名相妄想三法成凡正智真如成聖名相妄想者是凡夫法名相二法是凡夫境妄想一法是凡夫六識迷事緣境而起故名妄想經偈云不了心及緣則生二妄想正智真如者是聖人法正智是聖人對治金剛緣修無漏斷惑智亦名能覺智真如是聖人心中所證之理真如是體正智是用異者未曾異同者未曾同同者是真如異者是正智正智常用故障生滅真如常體故無生滅體用無礙法界不思議真實也又凡夫心惑不達名相空故妄計為有不空名之為妄從妄起心名之為想正智者覺知名相本來空寂以知空故妄想自息息妄歸真顯理分明正智現前不立名相故名正智經偈云了心及境界妄想不復生真如者即此正智心性真故即名真如故知但是一法無中執有成凡達有本空成聖不唯五法乃至𢘆沙出無邊理𢘆一道此唯心之道即是如來行處步步履法空故亦是摩訶衍處念念無所得故問云何入此宗鏡一念相應見道速疾超過劫量答實有斯理𠀍況可知若不直下䪺悟自心功德圎滿即於心外妄求徒經劫數若能內照如船遇便風一念圎成所作無滯故知不遇宗鏡之風有為行船終不能速渡生死之波直至涅槃之岸有茲大利廣集無勞唯囑後賢轉相傳授十板問此一心宗成佛之道還假歷地位修證不答此無住真心實不可修不可證不可得何以故非取果故不可證非著法故不可得非作法故不可修以本淨非瑩法爾無成若論地位即在𠀍諦行門亦不失理以無位中論其地位不可起決定有無之執經明十地差別如空中鳥跡若圎融門寂滅真如有何次第若行布門對治習氣升進非無又染淨階位皆依𠀍俗名字分別則似分階降不壞一心譬如衆生位如土器菩位如銀器諸佛位如金器土銀金等三種器量雖殊然一一器中虛空遍滿平等無有差別虛空即喻一心法身平等之理諸器即況根器地位階降不同道本無差隨行有異十四板不思議佛境界經云爾時須菩提又問言大士汝决定住於何地為住聲聞地為住辟支佛地為住佛地耶文殊師利菩言大德汝應知我决定住於一切諸地須菩提言大士汝可亦决定住於凡夫地耶答曰如是何以故一切諸法及以衆生其性即是决定正位我常住此正位是故我言决定住於凡夫地也須菩提又問若一切法及以衆生即是决定正位者云何建立諸地差別而言此是凡夫地此是聲聞地此是辟支佛地此是佛地耶文殊師利言大德譬如𠀍閒以言故於虛空中建立十方所謂此是東方此是南方乃至此是上方此是下方雖虛空無差別而諸方有如是如是種種差別此亦如是如來於一切法决定正位中以善方便立於諸地所謂此是凡夫地此是聲聞地此是辟支佛地此是菩地此是佛地雖正位無差別而諸地有別耳所以天台云四教如空中四點四點雖歷然不壞虛空性然此地位至究竟位中若理若行方可窮盡十七板問若即心是佛者則一切含生皆有此心盡得成佛教中云何不見授劫國名號之記答劫國名號乃是出𠀍化門之中現前別記欲知真記者淨名經云一切衆生亦如也一切法亦如也華嚴經頌云顯佛自在力如圎滿經無量諸衆生悉受菩提記又頌云一一心念中普觀一切法安住真如地了達諸法海又頌云一一微塵中能證一切法如是無所礙周行十方國斯則人法心境悉記成佛以一念具足一塵不念念證真塵塵合體同居常寂光土俱號毗盧那終無異土別身聖強凡劣與三𠀍佛一時成道前後情消共十類生同日涅槃始終見盡免起有情無情之妄解不生心內心外之邪思可謂上無所求下無可化𡨋真履實得本歸宗俱登一際解脫之門盡授平等菩提之記又古德問既色心不二修性一如何不見木石受菩提記耶答一一諸色但唯心故心外無法豈唯心滅而色猶存但佛記有情攝無情也譬如幻事要藉幻心心在幻中能持幻事若其心滅幻事同無故但滅心不復滅事衆生色心亦復如是皆如幻相一切外境從幻心生豈猶滅心而存幻色此則有情得記無情亦然是故無情不須別記夫立劫國名號授記作佛者為引未發心者令嚮慕耳第二十四卷一板夫成佛本理但是一心者云何更立文殊普賢行位之因釋迦勒名號之果乃至十方諸佛國土神通變現種種法門答此是無名位之名位無因果之因果是心作因是心成果是心摽名是心立位普賢觀經云大乘因者即是實相大乘果者亦是實相釋論云初觀實相名因後觀境名果故知初後皆心因果同證只為根機莫等所見不同若以一法逗機終不齊成解脫須各各示現引物歸心雖開種種之名皆是一心之若違自心取外佛相勝妙之境則是顛倒所以華嚴經頌云若以威德色種族而見人中調御師是為病眼顛倒見彼不能知最勝法八板香積佛國之香飯經云無盡戒定慧解脫解脫知見功德具足者所食之餘終不可盡以一心真如無盡之理五分法身資熏之功自體性空無作妙用豈有盡乎又云食此飯者發大乘意乃至一生補處然後乃消猶飲藥攻毒毒滅藥消耳諸大菩雖復捨生受生後身之中識中有種子種子遇緣還生香飯相續不斷流至初地發無漏心斷惑證真名之為消非是食滅名為消也故知食此飯何法不消也九板華嚴經中具足優婆夷得菩無盡福德藏解脫門能於如是一小器中隨諸衆生種種欲樂出生種種美味飲食又如明智居士得隨意出生福德藏解脫門爾時居士知衆普集須繫念仰視虛空如其所須悉從空下一切衆會普皆滿足然後復為種種法且如優婆器內明智空中隨意而出無限𭹀羞繫念而雨衆多美食凡來求者皆赴所須得之者盡證法門食之者咸成妙道可謂無一塵而不具足佛事無一法而不圎滿正宗但隨衆生心應所知量循業發現所見不同外道見為自然凡夫見為生死聲聞見為四諦緣覺見為因緣小菩見為但空大菩見為中道諸佛見為實相若入宗鏡諸見並融色塵為佛事也十五板現相品云爾時諸菩光明中同時發聲此頌言諸光明中出妙音普遍十方一切國演佛子諸功德能入菩提之妙道乃至逆順善惡無非佛事如從二乘至佛是順行從地獄至魔王是逆行又如釋迦純行善調達純行惡身子志誠信善星堅不信等妍醜同歸無非佛事故經云平等真法界諸佛不能行不能到又云實際理地大魔王不能行不能到以佛魔俱不出法界之門實際之地以是一法故若有行有到則有人有法在法之外成二見故第二十五卷三板維摩經者此云淨名即是一切衆生自性清淨心此心弗澄而自清弗磨而自瑩處凡而不垢在聖而不淨故云自性清淨所言名者以心無形但有名故文中所以四海之渺瀰攝歸毛孔用須之高廣納入芥中飛佛土於十方未移本處擲大千於界外含識莫知日月懸於毫端供具現於體內腹納劫燒之火事如然口吸十方之風身無减斯皆自心轉變不動而遠近俄分一念包容無礙而大小相入天台疏云以須之高廣納芥子中無所增减須山王本相如故而四天王不覺不知己之所入唯應度者乃見須入芥子中是名不可思議解脫法門又以四大海水入一毛孔等此是明不思議大用也正以實慧與真性合故得有斯莫測之用此如大智論偈云水銀和真金能塗諸色像功德和法身處處應現往若須高廣納於芥子而無增减亦不迫迮不覺不知者具不思議解脫者迹居依報之境得自在也此難解有師言神力能爾今謂不思議性非天人修羅佛之所作神力何能爾有師言小無小相大無大相故得入也今謂小是小大是大是自性小大不得相入者小大大小既是他性之小大何得入也今解華嚴經明一微塵有大千經卷觀衆生一念無明心即是如來心若見此心則能以須入芥子無相妨也下諸不思議事窮劫不能盡皆是此意耳四板輔行記釋云且約一念剎那心所起故言小也即此一念具足法身一切佛法即是能容須之大大小常遍理事無礙本來相即故所以不斷煩惱而入涅槃只指凡夫一念剎那心具足難思法身之體本來相在故六板經云凡所有相皆是虛妄若見諸相非相即見如來以瞥有一毫起處悉落見聞從分別生俱非真實若不達無相即相則是取相凡夫若了相即無相則成唯心大覺既不可取相求悟亦不可離相思真不即不離覺性自現入宗鏡中理當絶學百氏之一教能明萬化之端一言可蔽八板華嚴經云一念於一切處為一切衆生示成正覺是菩園林法身周遍盡虛空一切𠀍界故又云一切菩行遊戲神通皆得自在是菩宮殿善遊戲諸禪解脫三昧智慧故是以正報依報皆成佛法所以淨名𥝠記云取妙喜來此土者辨於淨穢無二也雖來入此土亦不增减本性如故雖來畢竟不動何意如此好自思之故知萬法施為隱顯往復若事若理皆不出一真心矣九板華嚴頌云金剛鐵圍數無量悉能置在一毫端若明至大有小相菩以此初發心以大小無性廣狹隨緣若能明見至大無外之相即至小無內之相皆是一毫端心地法門名為見道故云菩以此初發心如是解者不易凡身生如來家成佛真子問如上所芥納須毛吞巨海既唯一心須為復入芥子不入芥子若言入經何故云須本相如故若言不入又云唯應度者見之答若有所入處即失諸法自性若言不入又成二見或又云小是大家之小大是小家之大或云芥子須各無自性此皆是以空納空有何奇特故知未入宗鏡情見難忘𢩁大小於方隅立見聞於妙道致使一真潛隱萬法不融今明正者所謂入而不入即識須之本相不入而入能了諸法之自宗還原觀云所言入者性相俱泯體同法界入無入相名為入也經偈云如來深境界其量等虛空一切衆生入而實無所入華嚴經云悉入法界而無所入若別有一入處則入時失本相不得種種諸法以當體自虛名入法界無別可入則不壞種種又經云雖諸法無一無異而一異故知要由事相歷然不入方得相資相遍耳若入則失緣則無諸緣各異不入則壞性用不得力用交徹則無遍相資若具入不入則成俱存無礙具此三緣方成緣起了此緣性則能變通遂乃方而能圎小而能大狹而能廣短而能長無非我心神德自在則觸目皆是須入芥舉足住不思議解脫矣故云吾心之常分豈假於他術也十二板若實親省現證自宗尚無能證之智心及所證之妙理豈况更存能知能解有得有趣之妄想乎近代或有濫參禪門不得旨者相承不信即心即佛之言判為是教乘所未得幽玄我自有宗門向上事在唯重非心非佛之語並是指鹿作馬期悟遭迷執影是真以病為法只要門風緊峻問答尖新發狂慧而守癡禪迷方便而違宗旨立格量而據道理猶入假之金存矩而邊隅如添水之乳一向於言語上取辦意根下依通都為能所未忘名相不破若實見性心境自虛匿跡韜光行密用是以全不悟道唯逐妄輪回起法我見而輕忽上流恃錯知解而摧殘未學毀金口所之正典撥圎因助道之修行二乘之菩提滅人天之善種但欲作探玄上士俲無礙無修不知返墮無知成空見外道唯觀影跡莫究圎常積見不𠇲徒自疲極如孔子迷津問漁父漁父曰人有畏影惡跡疾走不休絶力而死不知處隂以𠇲影之靜處以息跡愚亦甚矣何不以一心為道息諍除非自然過量超情還淳返朴若以道自養則不失以道濟他則不誑以道治國則國泰以道修家則家安故不可須刻忘道矣所以道德經云故失道而後德失德而後仁失仁而後失而後禮夫禮者忠信之薄日以衰薄而亂之首莊子云五色不亂孰為文彩五聲不亂孰為六律白玉無瑕孰為圭璋殘朴以為器者工匠之罪也毀道德而為仁者聖人之罪也君能焚符破璽賊盜自止剖斗折衡而民不諍聖人生而賊盜起聖人死而賊盜止故知仁禮智信而利天下者少害天下多矣曷如開示如是不思議大威德廣大法門普廕十方群生等潤可謂深達妙旨𡨋合真歸如香象渡河步步到底似養由駕箭一一穿楊盡為破的之文皆是窮原之此是圎䪺非權冝門如水月䪺呈更無來去猶明鏡䪺照豈有前後第二十六卷十四板經云空心不動具足六波羅蜜何者經云無可與者名為布施豈心外有法可住相耶經偈云戒性如虛空持者為迷倒寧執事法分持犯耶經云忍者於一剎那盡一切相及諸所緣又云何謂菩能行忍辱佛言見心相念念滅豈可伏捺自心對治前境而為忍受耶經偈云若能心不起精進無有涯又云何謂菩能行精進佛言求心不可得寧著有為妄興勞慮耶經云不見心相名為正定豈避喧雜而守靜塵耶經云不求諸法性相因緣是名正慧寧外徇文言強生知解耶第二十七卷一板天台教云觀於一心欻有一切心觀一切心無諸心心無有無通至實相即神通也海云謂此塵無體不動塵處𢘆遍十方剎海無來去之相是神足通不起子本座遍遊於十方又見塵法界無際而有理事教一切菩皆同證入皆同修習此法更無別路是他心通見塵法界解行現前之時即知過去曾於佛所親聞此法以觀心不斷是故今日得了是宿命通又見塵性空寂無相可得即不二見若見相即為二也由無相即無有二名天眼通經云不以二相見名真天眼又了塵無生無性空寂即執心不起是漏盡通經云斷結空心我是則無有生又聞塵法界差別之聲即知一切聲全是耳不復更聞也然此聞無緣無得於聲悟一切法是常聞一切佛法為天耳通二板於一心正觀之中最為樞要少用心力成大菩提故華嚴𥝠記云此經中揔是法身作多種名字如人天十善五戒為身聲聞四諦緣覺十二因緣菩六度佛種智為身身是聚於法身中隨行位功德聚處名身若有情身相皆是法身所起若無情國土盡從佛智所現終無纖毫於宗鏡外別有異體而能建立故七板華嚴經云文殊師利問德首菩言佛子如來所悟唯是一法云何乃無量諸法現無量剎化無量衆演無量音示無量身知無量心現無量神通普能震動無量𠀍界示現無量殊勝莊嚴顯示無邊種種境界而法性中此差別相皆不可得時德首菩以頌答曰佛子所問甚深難可了智者能知此常樂佛功德譬如地性一衆生各別住地無一異念諸佛法如是亦如火性一能燒一切物火𦦨無分別諸佛法如是亦如大海一波濤千萬異水無種種殊諸佛法如是亦如風性一能吹一切物風無一異念諸佛法如是亦如大雲雷普雨一切地雨滴無差別諸佛法如是亦如地界一能生種種芽非地有殊異諸佛法如是如日無雲曀普照於十方光明無異性諸佛法如是亦如空中月𠀍間靡不見非月往其處諸佛法如是譬如大梵王應現滿三千其身無別異諸佛法如是故知此宗鏡一心之旨名具足道是圎䪺門就緣起則無邊約真性則無二一多交徹存泯同時第二十八卷一板華嚴經有十種無礙今於事法上辨此十無礙例餘法准知一性相無礙者如經云此蓮華即具此十謂此華即同真性不礙事相宛然二廣狹無礙即此華其心普周無有邊際而𢘆不捨本位分劑此則分即無分無分即分經云此諸華普覆法界三一多無礙即此華具無邊德不可言一融無二相不可言多四相入無礙此一華舒已遍入一切差別法中復能攝取彼一切法令入己內是故即舒𢘆攝同時無礙五相即無礙此一華必廢已同他舉體全是彼一切法而𢘆攝他同己令彼一切即是己體是故己即是他己不立他即是己他不存他己存亡同時顯現六隱顯無礙此華既遍一切彼一切法亦皆普遍此能遍彼則此顯彼隱彼能遍此則彼顯此隱如是彼此各有隱顯無礙七微細無礙又此華中悉能顯現微細剎土炳然齊現無不具足經云一塵中微細國土曠然安住八帝網無礙又此華一一塵中各有無邊諸𠀍界海𠀍界海中復有微塵此微塵內復有𠀍界如是重重不可窮盡非是心識思量境界九十𠀍無礙此一華撗遍十方竪該九𠀍以時無別體依華以立華既無礙時亦如之十主伴無礙又此華理無孤起必攝無量眷屬圍繞經云此蓮華有𠀍界海微塵數蓮華以為眷屬此經中所有眷屬為主伴具德圎滿三板會通純雜文云萬行紛披比華開錦上者意取五綵相宣華色雖異一一之線皆悉通過通喻於純異喻於雜故常通常異名為無礙不同繡𦘕但異不通釋曰若異而不通失一性圎融之道若通而不異無萬行莊嚴之門常異常通無間無斷則真體𡨋寂不礙隨緣大用現前無妨正性可比華開錦上猶雲起長空矣四板三摩地經云於其一切有情身中普能示現一有情身又能於一有情身中普現一切有情之身有情身中能現法身又能於法身中現有情身乃至能以一身隨念悟入一切衆生無際劫數普現所作業果異熟隨其所應開悟有情悉令現見皆得善巧九板此重玄門名言路絶隨智所演以廣見聞唯證方知非情所解若親證時悉是現量之境處處入法界念念見那若但隨文所解只是䕃識依通當逆順境時還成滯礙遇差別問處皆墮疑情如鹽官和尚勘華嚴大師云華嚴經有幾種法界對云略而言之有十種法界廣而言之則重重無盡師竪起拂子云是第幾種法界當時低頭擬祗對次師呵云思而知慮而解是鬼家活計日下孤燈果然失照出去十一板首楞嚴三昧經云文殊言若人得聞一句之法即解其中千萬句義百千萬劫敷演解智慧辨才不可窮盡是名多聞大涅槃經云若見如來常不法是名具足多聞又云寧願少聞多解義理不願多聞於義不了即是入此宗鏡一解千從雖廣引文只證此理上根一覽已斷纖疑中下再披方能具信對根故耳非法合然所以勝天王般若經云佛復告善思惟菩言賢德天子已於過去無量百千億劫修習陀羅尼門窮劫法亦無終盡善思惟菩白佛言𠀍尊何等陀羅𡰱佛言善男子名衆法不入陀羅𡰱善男子此陀羅𡰱過諸文字言不能入心不能量內外衆法皆不可得善男子無有少法能入此者故名衆法不入陀羅𡰱何以故此法平等無有高下亦無出入無一文字從外來入亦無一字從此法出又無一字住此法中亦無文字共相見者亦不分別法與非法是諸文字亦不减不無增從本已來無起造者無壞滅者善男子如文字心亦如是如心一切法亦如是何以故法離言語亦離思量本無生滅故無出入是名衆法不入陀羅尼若能通達此法門者辨才無盡何以故通達不斷無盡法故善男子能入虛空者則能入此陀羅𡰱門十四板問信入此法還有退者不答信有二種一若正信堅固諦了無疑理觀分明乘戒兼急如此則一生可辦誰論退耶二若依通之信觀力粗浮習重境強遇緣即退如華嚴論云如涅槃經聞常住二字尚七𠀍不墮地獄如華嚴經云設聞如來名及所法不生信解亦能成種必得解脫至成佛故何故經言第六住心及從凡夫信位猶言有退此意若為和會解云十信之中勝解未成未得謂得便生憍慢不近善友不敬賢良為慢怠故久處人天惡業便起能成就大地獄業若一信不慢常求勝友即無此失若權教中第六住心可有退位實教中為稽滯者責令進修如舍利弗是示現聲聞非實聲聞所作方便皆度衆生使令進䇿如權教中第六住心可實退何以故為權教中地前三賢揔未見道所修作業皆是有為所有無明皆是折伏功不強者便生退還若折伏有力亦不退失如蛇有毒為呪力故毒不能起但於佛法中種於信心謙下無慢敬順賢良於諸惡人心常慈忍於諸勝己者咨受未聞所聞勝法奉行無妄所有虛妄依教蠲除於三菩提道常勤不息夫為人生之法法合如然但不長惡而生何須慮退華嚴疏云深心信解常清淨者信煩惱即菩提方為常淨由稱本性而發菩提心本來是佛更無所進如在虛空退至何所第二十九卷一板問法唯心者云何教立五時聽分四衆答諸佛無有色聲功德唯有如如及如如智獨存凡有見聞皆是衆生自心影像則唯心聽唯心聽離心之外何處有法如思益經云梵天言何故不聽法者乃為聽經文殊言眼耳鼻舌身意不漏是聽經法也所以者何於內六入不漏色聲香味觸法乃為聽經乃至梵天問得忍菩汝等豈不聽是經耶答如我等聽以不聽為聽古德如來演出八辨洪音聞者託起自心所現如依狀貌變起毫端本質已無影像如在群賢結集自隨見聞依所聞見結集自語良以離自心原無有外境離境亦無內心可得諸傳法者非授與他但為勝緣令自得法自解未起無以悟他自解不從他來他解寧非自起是故結集及傳授者皆得影像不得本質無有自心得他境故是知結集乃是自心所變之經至傳授者傳授自心所變之法得影非質思而可知若能常善分別自心所現能知一切外性非性此人知見可與佛同所之法與佛無異悟入自覺聖智樂故寶性論偈云天妙法鼓聲依自業而有諸佛法者衆生自業聞如妙聲遠離功用處身心令一切衆生離怖得寂靜佛聲亦如是離功用身心令一切衆生得證寂滅道又偈譬如虛空中雨八功德水到鹹等住處生種種異味如來慈悲雲雨八聖道水到衆生心處生種種解味釋曰如天鼓聲應諸天所知之量猶龍王雨隨𠀍間能感之緣證自法而不同成異味而有別法亦如是隨見差殊於一乘而開出諸乘從一法而分成多法三板聽全收生佛相在者略舉二喻一者如一明鏡師弟同對聽以師取之即是師鏡弟子取之是弟子鏡鏡喻一心師弟喻生佛是謂弟子鏡中和尚為和尚鏡中弟子法和尚鏡中弟子聽弟子鏡中和尚法諸有知識請祥斯喻此喻猶恐未曉又如水乳同和一處而為能和所和且順以能和為所和為聽且將水喻於佛乳喻衆生應言乳中之水和水中之乳水中之乳受乳中之水雖同一味能所宛然雖能所宛然而相在相遍相攝思以准之又衆生心中佛者此明衆生稱性普周而佛不壞相在衆生心內言為佛心中衆生法者此明佛心稱性普周而衆生不壞相在佛心內也更無別理但聽之異耳是知一切衆生語言皆法輪正體若離衆生言即佛無所四板昔人頌云通宗不通如日被雲曚宗通亦通如日處虛空故知若先了宗則無過又凡有證表形於言教者皆是明心不詮餘法或言廣大自在此約德相以明心或言寂滅無為此約離過以明心乃至或事是心之事或理是心之理故千經萬論皆是言心豈止宗鏡耶如法華經云為一大事因緣故出現於𠀍凡言大者莫越於心於五大中虛空最大尚為心之所含故首楞嚴經云空生大覺中如海一漚發又云寂照含虛空此大非對數量稱大又非形待稱大故云一大事又此一非一如法句經頌云森羅及萬像一法之所印一亦不為一為破諸數故是知諸佛出𠀍祖師西來皆明斯旨非為別事矣八板如尺蠖蟲食黃而身黃食蒼而身蒼且八識藏中十法界種子具有隨所聞法即發起現行若聞宗鏡之文即熏起佛乘種子然須染神入心窮源見性不俟耳入口出但記浮言如孫𡖖子云君子之學乎神著乎心布乎四支動靜皆可為法小人之學入乎耳出乎口口耳之間則四寸耳何足美七尺之軀者哉十板維摩經云法施會者無前無後一時供養一切衆生是名法施之會什法師云若一起慈心則十方同緣施中之最莫先於此故曰無前後也肇法師云夫以方會人不可一息期以財濟物不可一時周是以會通無隅者綸而不漏法澤𡨋被者不易時而同覆故能即無疆為一會而道無不潤虛心懷德而物自賔曷為存濡沫之小慧捨江海之大益置一時之法養而設前後之俗施乎夫財養養身法養養神養神之道存乎𡨋益何則群生流轉以無窮為塵路𡨋𡨋相承莫能自返故大士建德不自為身一念之善皆為群生以為群生故行願俱果行果則己功立願果則群生益己功立則有濟物之能群生益則有返流之分然則菩始建德於內群生已蒙益於外矣何必待哺養啓導然後為益乎菩提者弘濟之道也是以為菩提而起慈者一念一時所益無際矣則是承宗鏡之光遍法界之照寧有遺餘乎十二板大莊嚴論偈云遠離於法界無別有貪法是故諸佛貪出貪餘爾如佛先我不有異貪之法能出於貪瞋癡亦爾此是經旨趣又偈云於貪起正思於貪得解故貪出貪瞋癡出亦爾十三板楞伽經偈云不生現於生不退常現退同時如水月萬億國土現一身及無量然火及霔雨心心體不異故但是心心中但是心心無心而生種種色形相所見唯是心又偈云心中無斷常身資生住處唯心愚無智無物而見有又偈云佛子見𠀍間唯心無諸法種類非身作得力自在成何以故若得心王一切自在要成即成非他所礙第三十卷九板衆生心行中求得三種解脫衆生心性即真性解脫癡愛即實慧解脫諸不善行即是方便解脫是知此一心真性解脫能空煩惱繫縛九結十使等如一旃檀樹改四十由旬伊蘭林悉皆香能能令煩惱即菩提故又若斷惑懺罪比餘漸教如㲲華千斤不如真金一兩故云若欲懺悔者端坐念實相則直了無生之心當處解脫第三十一卷一板經云知見立知見即無明本知見無見斯則涅槃無漏真淨云何是中更容他物是知𠀍間生死出𠀍涅槃等無量差別之名皆從知見文字所立若無知見文字名體本空於妙明心中更有何物如六祖偈云菩提本無樹明鏡亦非臺本來無一物何用拂塵埃十板迦葉問涅槃解脫之𠀍尊答一百句解脫釋曰上來百句解脫文現不繁更釋大意只明一心真性解脫以實慧解脫顯此真性然後成方便慧解脫故能自覺覺他名之為佛即是平等法身天真之佛第三十二卷四板華嚴論云若也但修空無想法身即於智不能起用若但一向生想不見無相法身即純是有為又云如是大悲如是智慧如是萬行但為長養初發心住初生佛家之智慧大悲令慣習自在故時亦不改法亦不異智亦不遷猶如竹葦依舊而成初生與終無有粗細亦如小兒初生而後長為大無異大也是知差別行門皆入畢竟空中無有分別如龍樹菩問曰若菩知佛是福田衆生非福田是非菩法菩以何力故能令佛與畜生等答曰菩以般若波羅蜜力故一切法中修畢竟空心是故於一切法無分別如畜生五䕃十二入十八界和合生名為畜生佛亦如是從諸善法和合假名為佛若人憐愍衆生得無量福德於佛著心起諸惡因緣得無量罪是故知一切法畢竟空故不輕畜生不著心貴佛復次諸法實相是一切法無相是無相中不分別是佛是畜生若分別即是取相故第三十三卷六板論偈云不生亦不滅不常亦不斷不一亦不異不來亦不去能是因緣善滅諸戲論我稽首禮佛諸中第一今以因果會釋八不言不生者如二十時為因三十時為果若離二十有今三十可言有生若離二十則三十不可得是故不生故中論云離劫初穀今穀不可得是故不生不滅者則二十時不無故不滅若二十時滅今不應有三十時中論云若滅今應無穀而實有穀是故不滅也不常者則三十時無二十時是故不常中論云如穀芽時種則變壞是故不常不斷者因二十有三十相續是故不斷中論云如從穀有芽是故不斷若斷不應相續不一者二十不與三十同體各性而住故不一中論云如穀不作芽芽不作穀是故不一不異者不離二十有三十若二十姓張三十不異中論云若異何故分別穀芽穀莖穀葉是故不異不來者二十不至三十時是故不來不去二十時當處自寂不復更生故不去也達此理者則離一切戲論契會中道則真諦矣十二板問諸佛單住真如名無垢識者無垢淨識即是常住真心為復諸佛决定有心决定無心答據體則言亡四句意絶百非約用則唯智能明非情所及華嚴云佛子如來心意識俱不可得但應以智無量故知如來心第三十四卷一板夫境識俱遣衆生界空諸佛究竟成得何法答一切異生因識對境於生死中妄生執著起常等四倒二乘之人於涅槃中妄求解脫起無常等四倒諸佛如來因境識俱空能離八倒成得真常樂我淨四波羅蜜寶性論云依二種法如來法身有淨波羅蜜一者本來自性清淨以同相故二者離垢清淨以勝相故有二種法如來法身有我波羅蜜一者遠離諸外道邊以離虛妄我戲論故二者遠離諸聲聞邊以離無我戲論故有二種法如來法身有樂波羅蜜一者遠離一切苦二者遠離一切煩惱習氣有二種法如來法身有常波羅蜜一者不滅一切諸有為行以離斷見邊故二者不取無為涅槃以離常見邊故勝鬘經云𠀍尊見諸行無常是斷見非正見見涅槃常是常見非正見妄想見故作如是見所以如來唯證四德涅槃祕密之藏三板起信論云或有衆生無善根力則為諸魔外道鬼神之所惑亂若於坐中現形恐怖或現端正男女等相常念唯心境界則滅終不為惱是知聖者正也心正則聖故云心正可以辟邪如日月正當天草木無邪影故知此心是凡聖之宅根境之原只為凡夫執作賴耶之識成生死苦惱之因聖者達為如來藏心受涅槃常樂之果五板佛言但覺自心現量妄想不生安隱快樂𠀍事永息安隱快樂者則寂靜妙常𠀍事永息者則攀緣已斷可謂遇圎滿寶藏頓絶希求到常樂涅槃更無所至是凡聖之際如達家鄉為迷悟之依已窮根本六板心垢則娑婆現相心淨則華藏含空回轉而常起識輪交羅而匪離心網故海幢不起寂定廣作十方佛事之門善財不出道場遍歷一百十城之法是以文殊即自心能證之妙慧善財至勒一心佛果滿後却令見文殊因位將極令返照心原更無有異未始動念故再訪文殊不見其身者但了自心空般若故是真見文殊普賢是自心所證法界無盡妙行善財雖遍法界參諸善友欲見普賢不假別指便於初會始成之處如來座前而起念求隨念即見普賢在如來前初無動移此正顯觀心即見希奇之相見聞證入由覩前相即是見心所以普賢身相如虛空遍一切處故以普眼等入百千三昧求覔普賢不見只謂離念入定猒境求真不知塵塵是文殊念念即普賢故是以善財一人運悲智而撗廣十方修願行而竪窮三際從初至後因滿果圎明顯一心以為榜樣八板法華經云智者可以譬喻得解今但取正解圎明非論法喻若不悟道徒執絶言今所言者皆是提宗唱道之言極妙窮原之如云萬句浮言不及一句妙理千般魚目不及徑寸明珠夫一句妙理者即宗鏡之言也斯言不可辨而自通不可解而自釋所以云善言不辨辨言不善十一板寶藏論云知有有壞知無無敗其知之知有無不計既不計有無即自性無分之知是以此真心自體之知即無緣心不假作意任運常知非涉有無永超能所又云即體之用曰知即用之體為寂如即燈之時即是光即光之時則是燈燈為體光為用無二而二也又云知之一字衆妙之門如是開示靈知之心即是真性與佛無異故名顯示真心即性教全同禪門第三直顯心性之宗故西域傳心多兼經論無二途也但以此方迷心執文以名為體故達磨善巧揀文傳心摽舉其名心是名也默示其體知是心也喻以壁觀令絶諸緣絶諸緣時問斷滅否答雖絶諸念亦不斷滅問以何證驗云不斷滅答了了自知言不可及師即印云只此是自性清淨心更勿疑也若所答不契即但諸非更令觀察畢竟不與他先言知字直待他自悟方驗真實是親證其體然後印之令絶餘疑故云默傳心印所言默者唯默知字非揔不言六代相傳皆如此也至荷澤時他宗竸起欲求默契不遇機緣又思惟達磨懸絲之記恐宗旨滅絶遂言知之一字衆妙之門問悟此心已如何修之還依初相教中令坐禪否答若惛沉厚重難可䇿發掉舉猛利不可𢬃伏貪瞋熾盛觸境難制者即用前教中種種方便隨病調伏若煩惱微薄慧解明利即依本宗一行三昧十三板詮表詮異者謂遣其所非表謂顯其所是又者揀却諸餘表者直示當體如諸經所真如妙性每云不生不滅不垢不淨無因無果無相無為非凡非聖非性非相等皆是詮遣非蕩迹絶相祛情若云知見覺照靈鑒光明朗朗昭昭堂堂寂寂等皆是表詮若無知見等體顯何法為性何法不生不滅等必須認得現今了然而知即是我之心性方此知不生不滅等如鹽云不淡是云鹹是表水云不乾是云濕是表空宗但性宗有有表今時人皆謂言為深表言為淺故唯重非心非佛無為無相乃至一切不可得之言良由只以非之詞為妙不欲親自證認法體故如此也又若實識我心不同虛空性自神解非從他悟豈藉緣生若不對機隨𠀍語言於自性上尚無表示真實之辭焉有非方便之如今實未親證見性之人但效依通情傳意解唯取言語中妙以非泯絶之文而為極則以未見諦故不居實地一向託空隨言所轉近來尤盛莫可遏之若不因上代先賢多聞廣學深入教海妙達禪宗何能微細指陳始終和會顯出一靈之性剔開萬法之原是以具録要文同明宗鏡認名認體異者謂佛法𠀍法一一皆有名體且如𠀍間稱大不過四物如智論云地水火風是四物名堅濕暖動是四物體今且水設有人問每聞澄之即清混之即濁堰之即止决之即流而能溉灌萬物洗滌群穢此是何物舉功能義用而問之答云是水舉名答之愚者認名為己解智者應更問云何者是水徵其體也答云濕即是水尅體指也佛法亦爾設有人問每聞諸經云迷之即垢悟之即淨縱之即凡修之即聖能生𠀍出𠀍間一切諸法此是何物此舉功能義用問也答云是心舉名答也愚者認名便為己識智者應更問何者是心徵其體也答云知即是心指其體也此一言最親最的餘字餘皆踈如云非性非相能言能語等是體緣慮動用等是心即何異他之所問也以此而推水之名體名唯一字餘皆用濕之一字貫於清濁等萬用萬之中心之名體亦然知之一字亦貫於貪瞋慈忍善惡苦樂萬用萬之處直須悟得水是名不是水濕是水不是名即清濁凝流無不通也以例心是名不是心知是心不是名即真妄善惡無不通也空宗相宗為對初學及淺機恐隨言生執故但摽名而其非唯廣用而引其意性宗為對久學及上根令忘言認體故一言直示達磨云指一言以直示即是知字一言若言即心是佛此乃四言矣若領解不親照靈知之性方於體上照察用故無不通矣十六板須先約三種佛教證三宗禪心然後禪教雙亡佛心俱寂俱寂即念念皆佛無一念而非佛心雙亡即句句皆禪無一句而非禪教如此則自然聞泯絶無寄之知是破我執情聞息妄修心之言知是斷我習氣執情破而真性顯即泯絶是顯性之宗習氣盡而佛道成即修心是成佛之行頓漸顯空有相成若能如是圎通則為他人無非妙方聞他人無非妙藥藥之與病只在執之與通故先德云執則字字瘡疣通則文文妙藥如上依教依宗撮略和會挑抉宗旨之本末開扸法之差殊校量頓漸之異同融即真妄之和合對會表之回褒貶權實之淺深可謂卷教海之波瀾湛然掌內蔟天之星象奐若目前則頓釋群疑豁然妙旨若心外立法立境起鬪諍之端倪識上變我變人為勝負之由漸遂乃立空破有賔有非空崇教毀禪宗禪教權實兩道常為障礙之因性相二宗永作冤讎之見皆為智燈熖短心鏡光昏終不能入無諍之門履一實之道矣
